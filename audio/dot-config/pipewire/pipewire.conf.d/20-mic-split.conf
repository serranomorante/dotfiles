# https://gitlab.freedesktop.org/pipewire/pipewire/-/wikis/Guide-Split
# Scarlett 4i4 4th Gen Pro Audio maps AUX0/AUX1/AUX2/AUX3 to physical inputs 1/2/3/4.

context.modules = [
  {
    name = libpipewire-module-loopback
    args = {
      node.description = "Microphone"
      capture.props = {
        node.name = "capture.Mic"
        audio.position = [ AUX0 ]
        audio.rate = 48000
        stream.dont-remix = true
        target.object = "alsa_input.usb-Focusrite_Scarlett_4i4_4th_Gen.pro-input-0"
        node.passive = true
        # https://gitlab.freedesktop.org/pipewire/pipewire/-/issues/3359#note_2336268
        node.dont-fallback = true
        node.linger = true
      }
      playback.props = {
        node.name = "Mic"
        media.class = "Audio/Source"
        audio.position = [ MONO ]
        audio.rate = 48000
        node.passive = true
        # Persist the gain boost that made browser-call mic input audible.
        audio.volume = 2.5
      }
    }
  }
]
