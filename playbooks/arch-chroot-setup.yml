---
- hosts: arch_chroot
  gather_facts: true
  tasks:
    - name: lsblk
      ansible.builtin.command: lsblk -f
      register: var_lsblk
      changed_when: true

    - name: print lsblk
      ansible.builtin.debug:
        msg: "{{ var_lsblk.stdout_lines }}"

    - name: set useful facts
      ansible.builtin.set_fact:
        username: ""
        user_password: ""
        # Find whole-disk NVMe by-id entries with:
        #   ls -l /dev/disk/by-id | grep nvme
        # Then copy the disk symlink name (not a -partN one), for example:
        #   nvme-Samsung_SSD_990_PRO_1TB_S7...
        # You can paste either the bare name above or the full /dev/disk/by-id/... path.
        system_disk_by_id: ""
        home_disk_by_id: ""
        is_chroot: "{{ 'mnt' not in var_lsblk.stdout }}"

    - name: your not in chroot
      ansible.builtin.command: echo
      changed_when: true
      failed_when: not is_chroot

    - name: normalize disk by-id paths
      ansible.builtin.set_fact:
        system_disk: >-
          {{ system_disk_by_id if system_disk_by_id is match('^/dev/disk/by-id/')
          else '/dev/disk/by-id/' ~ system_disk_by_id }}
        home_disk: >-
          {{ home_disk_by_id if home_disk_by_id is match('^/dev/disk/by-id/')
          else '/dev/disk/by-id/' ~ home_disk_by_id }}

    - name: check disk by-id paths
      ansible.builtin.stat:
        path: "{{ disk_path }}"
      loop:
        - "{{ system_disk }}"
        - "{{ home_disk }}"
      loop_control:
        loop_var: disk_path
      register: var_disk_by_id_stats

    - name: fail when a disk by-id path is missing
      ansible.builtin.fail:
        msg: "Disk path {{ disk_stat.item }} does not exist. Set system_disk_by_id/home_disk_by_id to valid /dev/disk/by-id entries."
      when: not disk_stat.stat.exists
      loop_control:
        loop_var: disk_stat
      loop: "{{ var_disk_by_id_stats.results }}"

    - name: resolve selected disks to device nodes
      ansible.builtin.set_fact:
        system_disk_device: >-
          {{ (var_disk_by_id_stats.results | selectattr('disk_path', 'equalto', system_disk) |
          map(attribute='stat.lnk_source') | first) }}
        home_disk_device: >-
          {{ (var_disk_by_id_stats.results | selectattr('disk_path', 'equalto', home_disk) |
          map(attribute='stat.lnk_source') | first) }}

    - name: set some useful facts
      ansible.builtin.set_fact:
        boot_partition: "{{ system_disk_device }}p1"
        swap_partition: "{{ system_disk_device }}p2"
        root_partition: "{{ system_disk_device }}p3"
        home_partition: "{{ home_disk_device }}p1"

    - name: get root uuid
      ansible.builtin.command: blkid -s UUID -o value {{ root_partition }}
      register: var_root_partition_uuid
      changed_when: true

    - name: get swap uuid
      ansible.builtin.command: blkid -s UUID -o value {{ swap_partition }}
      register: var_swap_partition_uuid
      changed_when: true

    - name: get home uuid
      ansible.builtin.command: blkid -s UUID -o value {{ home_partition }}
      register: var_home_partition_uuid
      changed_when: true

    - name: install packages
      ansible.builtin.package:
        name:
          - networkmanager
          - os-prober
          - base-devel
          - openssh
          - git
          - ansible
          - sbctl
          - virtualbox-guest-utils
        state: present

    - name: enable services
      ansible.builtin.systemd_service:
        scope: system
        name: "{{ item }}"
        enabled: true
        masked: false
      loop:
        - NetworkManager.service
        - sshd.service

    - name: create user
      ansible.builtin.command: useradd -mG wheel {{ username }}
      changed_when: true

    - name: install venv
      ansible.builtin.command: python -m venv .venv
      args:
        chdir: /root
      changed_when: true

    - name: set fact
      ansible.builtin.set_fact:
        ansible_python_interpreter: /root/.venv/bin/python3

    - name: install pexpect
      ansible.builtin.command: /root/.venv/bin/pip3 install pexpect
      changed_when: true

    - name: setup pass for user
      ansible.builtin.expect:
        command: passwd {{ username }}
        responses:
          "password:":
            - "{{ user_password }}"
            - "{{ user_password }}"

    - name: enable sudo for wheel group
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: "^#?\\s*%wheel\\s+ALL=\\(ALL(?::ALL)?\\)\\s+ALL$"
        line: "%wheel ALL=(ALL:ALL) ALL"
        validate: visudo -cf %s

    - name: create .ssh directory for user
      ansible.builtin.file:
        path: /home/{{ username }}/.ssh
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0700"

    - name: copy root authorized_keys to user
      ansible.builtin.copy:
        src: /root/.ssh/authorized_keys
        dest: /home/{{ username }}/.ssh/authorized_keys
        remote_src: true
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0600"

    - name: configure mkinitcpio
      ansible.builtin.lineinfile:
        path: /etc/mkinitcpio.conf
        state: present
        regexp: "^HOOKS="
        line: HOOKS=(base systemd autodetect microcode modconf kms keyboard sd-vconsole block sd-encrypt filesystems fsck)

    - name: configure linux-lts.preset
      ansible.builtin.replace:
        path: /etc/mkinitcpio.d/linux-lts.preset
        regexp: '#.?default_uki="\/efi'
        replace: 'default_uki="/boot'

    - name: install systemd-boot
      ansible.builtin.command: bootctl install
      changed_when: true

    - name: set root password
      ansible.builtin.expect:
        command: passwd
        timeout: 10
        responses:
          "password:":
            - "{{ user_password }}"
            - "{{ user_password }}"

    - name: ensure vconsole.conf file
      # Otherwise the mkinitcpio command will fail
      ansible.builtin.file:
        path: /etc/vconsole.conf
        state: touch
        mode: "644"

    - name: prepare crypttab home
      ansible.builtin.replace:
        path: /etc/crypttab
        regexp: "^#.?home .*"
        replace: "home  UUID={{ var_home_partition_uuid.stdout }}  none  tpm2-device=auto"

    - name: ensure fstab for home
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: "/dev/mapper/home"
        line: "/dev/mapper/home  /home  ext4  defaults  0 0"
        state: present

    - name: ensure folder
      ansible.builtin.file:
        path: /etc/cmdline.d
        state: directory
        mode: "755"

    - name: permit root login
      ansible.builtin.replace:
        path: /etc/ssh/sshd_config
        regexp: "^#.?PermitRootLogin.*"
        replace: "PermitRootLogin  yes"

    - name: regenerate initramfs
      ansible.builtin.command: mkinitcpio --allpresets
      changed_when: true

    - name: set sbctl status
      ansible.builtin.command: sbctl status
      changed_when: true
      register: var_sbctl_status

    - name: set useful fact
      ansible.builtin.set_fact:
        is_sbctl_in_setup_mode: "{{ 'sbctl is not installed' in (var_sbctl_status.stdout | default('')) }}"
        is_secure_boot_disabled: "{{ 'Disabled' in (var_sbctl_status.stdout | default('')) }}"

    - name: create keys
      ansible.builtin.command: sbctl create-keys
      changed_when: true
      register: var_sbctl_create_keys
      when:
        - is_sbctl_in_setup_mode
        - is_secure_boot_disabled

    - name: enroll the keys
      # use `-m -f` at the end for framework laptop
      ansible.builtin.command: sbctl enroll-keys --microsoft
      changed_when: true
      when:
        - is_secure_boot_disabled
        - var_sbctl_create_keys is success

    - name: get files that need sign
      ansible.builtin.command: sbctl verify
      register: var_sbctl_verify_files
      changed_when: true

    - name: set fact for unsigned files
      ansible.builtin.set_fact:
        unsigned_files: "{{ (unsigned_files | default([])) + [file] }}"
      vars:
        file: "{{ item | regex_replace('^[^/]*(/boot/.*) is not signed$', '\\1') }}"
      when: "'/boot/' in file"
      loop: "{{ var_sbctl_verify_files.stdout_lines }}"

    - name: sign files
      ansible.builtin.command: sbctl sign -s {{ item }}
      changed_when: true
      loop: "{{ unsigned_files }}"

    - name: regenerate initramfs
      ansible.builtin.command: mkinitcpio --allpresets
      changed_when: true
