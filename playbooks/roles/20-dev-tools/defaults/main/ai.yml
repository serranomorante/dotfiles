---
reaper_mcp_server_setup:
  repo_path: "{{ ansible_facts.env.HOME }}/data/repos/reaper-mcp-server"
  projects_dir: "{{ ansible_facts.env.HOME }}/data/audio-pjs"

node_ai_npm_prefix: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/ai-tools/.npm"
postman_mcp_legacy_project_path: "{{ ansible_facts.env.HOME }}/.local/share/postman-mcp-server"

# Claude Code global settings forced into ~/.claude/settings.json. Runtime state and caches live in ~/.claude.json, but user-editable settings such as promptSuggestionEnabled belong in ~/.claude/settings.json.
claude_global_settings_config:
  promptSuggestionEnabled: false
piper_tts_setup:
  project_path: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/ai-tools/piper-tts"
  venv_path: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/ai-tools/piper-tts/.venv"
  voice_dir: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/ai-tools/piper-tts/voices"
  python_version: "3.11.3"
  version: "1.4.2"
  service_name: piper-tts.service
  default_voice: en_US-lessac-medium
  voices:
    - en_US-lessac-medium
    - es_ES-sharvard-medium
whisper_cpp_setup:
  repo_path: "{{ ansible_facts.env.HOME }}/data/repos/whisper.cpp"
  version: v1.8.6
  model_dir: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/ai-tools/whisper.cpp/models"
  model_name: medium
  model_file: ggml-medium.bin
  model_url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-medium.bin
  binary_path: "{{ ansible_facts.env.HOME }}/data/repos/whisper.cpp/build/bin/whisper-cli"
  server_binary_path: "{{ ansible_facts.env.HOME }}/data/repos/whisper.cpp/build/bin/whisper-server"
  firejail_profile: "{{ ansible_facts.env.HOME }}/.config/firejail/fj-whisper-cpp.profile"
  cuda_c_compiler: /usr/bin/gcc-15
  cuda_cxx_compiler: /usr/bin/g++-15
  cuda_host_compiler: /usr/bin/g++-15
  profiles:
    - name: fast
      model_file: ggml-base-q5_1.bin
      model_url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base-q5_1.bin
    - name: balanced
      model_file: ggml-large-v3-turbo-q5_0.bin
      model_url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo-q5_0.bin
    - name: accurate
      model_file: ggml-medium.bin
      model_url: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-medium.bin
node_ai_npm_packages:
  - name: mcp-hub
    version: 4.2.1
    bins:
      - mcp-hub
  - name: figma-developer-mcp
    version: 0.12.0
    bins:
      - figma-developer-mcp
  - name: "@anthropic-ai/claude-code"
    version: 2.1.177
    bins:
      - claude
  - name: "@google/gemini-cli"
    version: 0.46.0
    bins:
      - gemini
  - name: chrome-devtools-mcp
    version: 1.2.0
    bins:
      - chrome-devtools-mcp
      - chrome-devtools
  - name: playwright
    version: 1.61.0
    bins:
      - playwright
  - name: "@playwright/mcp"
    version: 0.0.76
    bins:
      - playwright-mcp
  - name: mcp-figma-comment-summary
    version: 2.0.0
    bins:
      - mcp-figma-comment-summary
  - name: "@upstash/context7-mcp"
    version: 3.2.1
    bins:
      - context7-mcp
  - name: cloudframework-projects-mcp
    version: 1.5.1
    bins:
      - cloudframework-projects-mcp
  - name: "@zed-industries/claude-agent-acp"
    version: 0.23.1
    bins:
      - claude-agent-acp
  - name: "@zed-industries/codex-acp"
    version: 0.16.0
    bins:
      - codex-acp
  - name: postman-cli
    version: 1.39.0
    bins:
      - postman

figma_mcp_server_setup:
  exe_path: "{{ node_user_bin_dir }}/figma-developer-mcp"
  keyrings:
    folder: dev-tools
    passkey: mcp-cf-figma
    wallet: kdewallet

figma_mcp_commentary_server_setup:
  exe_path: "{{ node_user_bin_dir }}/mcp-figma-comment-summary"
  keyrings:
    folder: dev-tools
    passkey: mcp-cf-figma
    wallet: kdewallet

chrome_devtools_mcp_server_setup:
  exe_path: "{{ node_user_bin_dir }}/chrome-devtools-mcp"

playwright_mcp_server_setup:
  exe_path: "{{ node_user_bin_dir }}/playwright-mcp"

context7_mcp_server_setup:
  exe_path: "{{ node_user_bin_dir }}/context7-mcp"

cf_projects_mcp_server_setup:
  exe_path: "{{ node_user_bin_dir }}/cloudframework-projects-mcp"
