---
plantuml_compiled_jar_version: 1.2024.6
node_system_default_version: 22.19.0
node_user_bin_dir: "{{ ansible_facts.env.HOME }}/bin"
node_volta_home: "{{ ansible_facts.env.HOME }}/.volta"
node_system_default_bin_dir: "{{ node_volta_home }}/tools/image/node/{{ node_system_default_version }}/bin"
node_system_default_node_path: "{{ node_system_default_bin_dir }}/node"
node_system_default_npm_path: "{{ node_system_default_bin_dir }}/npm"
node_system_default_npx_path: "{{ node_system_default_bin_dir }}/npx"
python_firejail_executable: "{{ node_user_bin_dir }}/fj-py"
node_firejail_executable: "{{ node_user_bin_dir }}/fj-node"
nvim_firejail_executable: "{{ node_user_bin_dir }}/fj-dev-nvim"
ansible_firejail_npm_executable: "{{ node_user_bin_dir }}/ansible-firejail-npm"
ansible_firejail_pnpm_executable: "{{ node_user_bin_dir }}/ansible-firejail-pnpm"
node_package_manager_npm_prefix: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/node-package-managers/.npm"
node_package_manager_packages:
  - name: yarn
    version: 1.22.22
    bins:
      - yarn
      - yarnpkg
  - name: pnpm
    version: 10.33.0
    bins:
      - pnpm
      - pnpx
typescript_npm_version: 6.0.2
rust_version: 1.75.0
tmux_version: 3.5a
archlinux_neovim_version: master
archlinux_treesitter_version: 0.25.9
debian_neovim_version: 688b961d13bd # before cmake 3.16 requirement
arch_gnirehtet_version: 2.5.1
neovim_plugins:
  # themes
  - folder: start
    repo: scottmckendry/cyberdream.nvim
  # plugins
  - folder: start
    repo: nvim-lua/plenary.nvim
    name: plenary
  - folder: start
    repo: ravitemer/mcphub.nvim
    name: mcphub
  - folder: start
    repo: olimorris/codecompanion.nvim
    name: codecompanion
  - folder: start
    repo: kevinhwang91/promise-async # use `typings/?.lua` on .luarc.json
  - folder: start
    repo: neoclide/coc.nvim
    version: release
  - folder: start
    repo: stevearc/overseer.nvim
    name: overseer
    version: master
  - folder: start
    repo: nvim-treesitter/nvim-treesitter
    version: main
  - folder: start
    repo: nvim-treesitter/nvim-treesitter-context
    name: treesitter-context
  - folder: start
    repo: nvim-treesitter/nvim-treesitter-textobjects
    version: main
  - folder: start
    repo: dense-analysis/ale
  - folder: start
    repo: FabijanZulj/blame.nvim
    name: blame
  - folder: start
    repo: stevearc/conform.nvim
    name: conform
  - folder: start
    repo: sindrets/diffview.nvim
    name: diffview
  - folder: start
    repo: lewis6991/gitsigns.nvim
    name: gitsigns
  - folder: start
    repo: NMAC427/guess-indent.nvim
    name: guess-indent
  - folder: start
    repo: mfussenegger/nvim-dap
    name: dap
  - folder: start
    repo: kevinhwang91/nvim-fundo
    name: fundo
  - folder: start
    repo: stevearc/aerial.nvim
  - folder: start
    repo: HakonHarnes/img-clip.nvim
    name: img-clip
  - folder: start
    repo: ravitemer/codecompanion-history.nvim
  - folder: start
    repo: Davidyz/VectorCode
    name: vectorcode
  - folder: opt
    repo: kevinhwang91/nvim-ufo
    name: ufo
  - folder: opt
    repo: jbyuki/one-small-step-for-vimkind
    name: osv

intelephense_setup:
  keyrings:
    folder: dev-tools
    passkey: intelephense-key
    wallet: kdewallet

treesitter_parsers:
  - repo: https://github.com/tree-sitter/tree-sitter-typescript
    # in case of monorepo
    build_folder: typescript
    filetype: typescript
  - repo: https://github.com/tree-sitter/tree-sitter-typescript
    # in case of monorepo
    build_folder: tsx
    filetype: tsx
  - repo: https://github.com/OXY2DEV/tree-sitter-kitty
    filetype: kitty
  - repo: https://github.com/milisims/tree-sitter-org
    filetype: org

python_ml_version: 3.14.3

python_versions:
  - 3.11.2
  - 3.11.3
  - "{{ python_ml_version }}"
