---
- name: "[archlinux] Setup terminal tools: ensure packages"
  become: true
  ansible.builtin.package:
    name:
      - polkit # https://wiki.archlinux.org/title/Systemd/User#Automatic_start-up_of_systemd_user_instances
      - zoxide
      - libevent
      - bison
      - make
      - tmux
      - kitty-terminfo
      - gawk
      - jq
      - bash-completion
    state: present

- name: "[archlinux] Setup terminal tools: ensure ble.sh local AUR package"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/10-system-tools/tasks/install-local-aur-packages.archlinux.yml"
  vars:
    aur_local_package_state: present
    aur_local_packages: blesh-git

- name: "[archlinux] Setup terminal tools: ensure uv tool writable paths"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "755"
  loop:
    - "{{ ansible_facts.env.HOME }}/.local/bin"
    - "{{ ansible_facts.env.HOME }}/.local/share/uv"
    - "{{ ansible_facts.env.HOME }}/.local/share/uv/tools"

- name: "[archlinux] Setup terminal tools: ensure uv tool project dir"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/uv-tools"
    state: directory
    mode: "755"

- name: "[archlinux] Setup terminal tools: stat isd-tui marker"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/share/uv/tools/.ansible-package-isd-tui-{{ isd_tui_version }}"
  register: var_isd_tui_marker

- name: "[archlinux] Setup terminal tools: inspect isd-tui Python interpreter"
  ansible.builtin.command:
    argv:
      - readlink
      - -f
      - "{{ ansible_facts.env.HOME }}/.local/share/uv/tools/isd-tui/bin/python"
  register: var_isd_tui_python_interpreter
  changed_when: false
  failed_when: false

- name: "[archlinux] Setup terminal tools: ensure isd-tui"
  ansible.builtin.command:
    argv:
      - "{{ python_firejail_executable }}"
      - online
      - "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/uv-tools"
      - --
      - uv
      - tool
      - install
      - --python=3.12
      - "isd-tui=={{ isd_tui_version }}"
  environment:
    UV_TOOL_DIR: "{{ ansible_facts.env.HOME }}/.local/share/uv/tools"
    UV_TOOL_BIN_DIR: "{{ ansible_facts.env.HOME }}/.local/bin"
    UV_PYTHON_INSTALL_DIR: "{{ ansible_facts.env.HOME }}/.local/share/uv/python"
    FJ_PY_WRITABLE_PATHS: |
      {{ ansible_facts.env.HOME }}/.local/bin
      {{ ansible_facts.env.HOME }}/.local/share/uv
      {{ ansible_facts.env.HOME }}/.local/share/uv/tools
  when: >-
    not var_isd_tui_marker.stat.exists
    or not var_isd_tui_python_interpreter.stdout.startswith(ansible_facts.env.HOME + '/.local/share/uv/python/')
  changed_when: true

- name: "[archlinux] Setup terminal tools: record isd-tui marker"
  ansible.builtin.copy:
    content: "isd-tui=={{ isd_tui_version }}\n"
    dest: "{{ ansible_facts.env.HOME }}/.local/share/uv/tools/.ansible-package-isd-tui-{{ isd_tui_version }}"
    mode: "644"
  when: >-
    not var_isd_tui_marker.stat.exists
    or not var_isd_tui_python_interpreter.stdout.startswith(ansible_facts.env.HOME + '/.local/share/uv/python/')

- name: "[archlinux] Setup terminal tools: check kitty nightly asset revision"
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://api.github.com/repos/kovidgoyal/kitty/releases/tags/nightly \
      | jq -r '
          .assets[]
          | select(.name | test("^kitty-nightly-linux-(x86_64|amd64)\\.txz$"))
          | [.name, .digest, .updated_at, .browser_download_url]
          | @tsv
        ' \
      | head -n 1
  args:
    executable: /bin/bash
  register: var_kitty_nightly_asset_revision
  changed_when: false

- name: "[archlinux] Setup terminal tools: stat kitty nightly binary"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/kitty.app/bin/kitty"
  register: var_kitty_nightly_binary

- name: "[archlinux] Setup terminal tools: fail when kitty nightly Linux asset is unavailable"
  ansible.builtin.fail:
    msg: "kitty nightly currently has no Linux x86_64 asset published upstream; cannot install it on a clean machine."
  when:
    - var_kitty_nightly_asset_revision.stdout | trim | length == 0
    - not var_kitty_nightly_binary.stat.exists

- name: "[archlinux] Setup terminal tools: stat kitty nightly marker"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/kitty.app/.ansible-kitty-nightly-{{ var_kitty_nightly_asset_revision.stdout | hash('sha256') }}"
  register: var_kitty_nightly_marker
  when: var_kitty_nightly_asset_revision.stdout | trim | length > 0

- name: "[archlinux] Setup terminal tools: install kitty nightly"
  ansible.builtin.shell: >
    set -o pipefail &&
    curl -L https://sw.kovidgoyal.net/kitty/installer.sh | sh /dev/stdin \
      installer=nightly launch=n
  args:
    executable: /bin/bash
  when:
    - var_kitty_nightly_asset_revision.stdout | trim | length > 0
    - not var_kitty_nightly_marker.stat.exists
  changed_when: true

- name: "[archlinux] Setup terminal tools: record kitty nightly marker"
  ansible.builtin.copy:
    content: "{{ var_kitty_nightly_asset_revision.stdout }}\n"
    dest: "{{ ansible_facts.env.HOME }}/.local/kitty.app/.ansible-kitty-nightly-{{ var_kitty_nightly_asset_revision.stdout | hash('sha256') }}"
    mode: "644"
  when:
    - var_kitty_nightly_asset_revision.stdout | trim | length > 0
    - not var_kitty_nightly_marker.stat.exists

- name: "[archlinux] Setup terminal tools: symlink kitty nightly"
  ansible.builtin.file:
    src: ~/.local/kitty.app/bin/{{ item }}
    dest: ~/bin/{{ item }}
    state: link
  loop:
    - kitten
  when: >-
    var_kitty_nightly_binary.stat.exists
    or (
      var_kitty_nightly_asset_revision.stdout | trim | length > 0
      and not var_kitty_nightly_marker.stat.exists
    )

- name: "[archlinux] Setup terminal tools: ensure automatic start-up of systemd user instances"
  ansible.builtin.command: loginctl enable-linger
  changed_when: false

- name: "[archlinux] Setup terminal tools: register default shell"
  ansible.builtin.command: which bash
  register: shell_executable
  ignore_errors: true
  changed_when: false

- name: "[archlinux] Setup terminal tools: change tools configs"
  ansible.builtin.blockinfile:
    dest: "{{ item.script }}"
    create: true
    marker: "## {mark} ANSIBLE MANAGED BLOCK - SETUP {{ item.script | basename | upper }}"
    block: |
      {% if 'tmux.conf' in item.script %}
      set-option -g default-shell {{ shell_executable.stdout }}
      set-option -g default-terminal "xterm-kitty"
      set-option -ag terminal-overrides ",xterm-kitty:RGB"
      {% endif %}
    mode: "644"
  loop:
    - { script: ~/dotfiles/term/dot-config/tmux/tmux.conf }

- name: "[archlinux] Setup terminal tools: clone tmux"
  ansible.builtin.stat:
    path: ~/.config/kdeglobals
  register: var_stat_kdeglobals

- name: "[archlinux] Setup terminal tools: fix kdeglobals"
  ansible.builtin.blockinfile:
    dest: ~/.config/kdeglobals
    insertafter: "^\\[General\\]"
    block: |
      TerminalApplication=kitty
      TerminalService=kitty.desktop
  when: var_stat_kdeglobals.stat.exists
