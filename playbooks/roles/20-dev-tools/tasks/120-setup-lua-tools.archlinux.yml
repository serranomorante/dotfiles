---
- name: "[archlinux] Setup lua tools: ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name: luarocks

- name: "[archlinux] Setup lua tools: stat luaunit marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: check
  vars:
    dotfiles_marker_name: "luarocks-luaunit-{{ luaunit_version }}"
    dotfiles_marker_register: var_luaunit_marker

- name: "[archlinux] Setup lua tools: ensure luaunit"
  become: true
  ansible.builtin.command:
    argv:
      - /usr/bin/luarocks
      - install
      - luaunit
      - "{{ luaunit_version | regex_replace('^LUAUNIT_V([0-9]+)_([0-9]+)$', '\\1.\\2') }}"
  when: not var_luaunit_marker.stat.exists
  changed_when: true

- name: "[archlinux] Setup lua tools: record luaunit marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: record
  vars:
    dotfiles_marker_name: "luarocks-luaunit-{{ luaunit_version }}"
    dotfiles_marker_content: "luaunit {{ luaunit_version }}\n"
  when: not var_luaunit_marker.stat.exists
