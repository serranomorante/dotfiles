---
- name: "[archlinux] Neovim: ensure user bin directory"
  ansible.builtin.file:
    path: "{{ node_user_bin_dir }}"
    state: directory
    mode: "755"

- name: "[archlinux] Neovim: ensure firejail profile directory"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/firejail"
    state: directory
    mode: "755"

- name: "[archlinux] Neovim: install firejail profile"
  ansible.builtin.template:
    src: fj-dev-nvim.profile
    dest: "{{ ansible_facts.env.HOME }}/.config/firejail/fj-dev-nvim.profile"
    mode: "644"

- name: "[archlinux] Neovim: install firejail wrapper helper"
  ansible.builtin.copy:
    src: firejail-wrapper-common.bash
    dest: "{{ node_user_bin_dir }}/firejail-wrapper-common.bash"
    mode: "755"

- name: "[archlinux] Neovim: install firejail Neovim wrapper"
  ansible.builtin.copy:
    src: fj-dev-nvim
    dest: "{{ nvim_firejail_executable }}"
    mode: "755"

- name: "[archlinux] Neovim: remove old firejail dev wrappers"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ ansible_facts.env.HOME }}/.config/firejail/fj-dev-node.profile"
    - "{{ ansible_facts.env.HOME }}/.config/firejail/fj-dev-python.profile"
    - "{{ node_user_bin_dir }}/fj-dev-node"
    - "{{ node_user_bin_dir }}/fj-dev-python"

- name: "[archlinux] Neovim: ensure Neovim - clone"
  ansible.builtin.git:
    repo: https://github.com/neovim/neovim
    dest: ~/data/repos/neovim
    force: true
    single_branch: true
    version: "{{ archlinux_neovim_version }}"
  register: var_neovim_repo

- name: "[archlinux] Neovim: ensure neovim build dependencies"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - cmake
      - ninja
      - ccache # recommended here: https://github.com/neovim/neovim/issues/26979#issuecomment-1885240317

- name: "[archlinux] Neovim: check build binary"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/data/repos/neovim/build/bin/nvim"
  register: var_neovim_build_binary

- name: "[archlinux] Neovim: check installed binary"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/bin/nvim"
  register: var_neovim_installed_binary

- name: "[archlinux] Neovim: check installed runtime"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/share/nvim/runtime/filetype.lua"
  register: var_neovim_installed_runtime

- name: "[archlinux] Neovim: check installed revision marker"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/share/nvim/runtime/.ansible-neovim-revision"
  register: var_neovim_installed_revision_marker

- name: "[archlinux] Neovim: read installed revision marker"
  ansible.builtin.slurp:
    src: "{{ ansible_facts.env.HOME }}/.local/share/nvim/runtime/.ansible-neovim-revision"
  register: var_neovim_installed_revision
  when: var_neovim_installed_revision_marker.stat.exists

- name: "[archlinux] Neovim: decide if build/install is required"
  ansible.builtin.set_fact:
    var_neovim_needs_install: >-
      {{
        var_neovim_repo.changed
        or not var_neovim_build_binary.stat.exists
        or not var_neovim_installed_binary.stat.exists
        or not var_neovim_installed_runtime.stat.exists
        or not var_neovim_installed_revision_marker.stat.exists
        or ((var_neovim_installed_revision.content | b64decode | trim) != (var_neovim_repo.after | trim))
      }}

- name: "[archlinux] Neovim: remove stale build and installed runtime"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ ansible_facts.env.HOME }}/data/repos/neovim/.deps"
    - "{{ ansible_facts.env.HOME }}/data/repos/neovim/build"
    - "{{ ansible_facts.env.HOME }}/.local/share/nvim/runtime"
  when: var_neovim_needs_install

- name: "[archlinux] Neovim: ensure neovim - build"
  ansible.builtin.shell: >
    make CMAKE_BUILD_TYPE=RelWithDebInfo CMAKE_INSTALL_PREFIX={{ ansible_facts.env.HOME }}/.local &&
    make install
  environment:
    CCACHE_DISABLE: true
  args:
    chdir: ~/data/repos/neovim
  when: var_neovim_needs_install
  timeout: 0

- name: "[archlinux] Neovim: record installed revision"
  ansible.builtin.copy:
    content: "{{ var_neovim_repo.after }}\n"
    dest: "{{ ansible_facts.env.HOME }}/.local/share/nvim/runtime/.ansible-neovim-revision"
    mode: "644"
  when: var_neovim_needs_install
