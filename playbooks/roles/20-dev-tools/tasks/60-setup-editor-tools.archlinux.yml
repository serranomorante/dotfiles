---
- name: "[archlinux] Editor tools: ensure file watcher packages"
  become: true
  ansible.builtin.package:
    name: inotify-tools
    state: present

- name: "[archlinux] Editor tools: check overseer local patch marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: check
  vars:
    dotfiles_marker_name: nvim-plugin-overseer-local-patches-v2
    dotfiles_marker_register: var_overseer_local_patch_marker

- name: "[archlinux] Editor tools: check overseer checkout"
  ansible.builtin.stat:
    path: ~/.local/share/nvim/site/pack/plugins/start/overseer/.git
  register: var_overseer_checkout

- name: "[archlinux] Editor tools: ensure nvim plugins"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: git
  vars:
    update_diff_capture_scope: nvim-plugins
    update_diff_git_repo: "https://github.com/{{ item.repo }}"
    update_diff_git_dest: "{{ ansible_facts.env.HOME }}/.local/share/nvim/site/pack/plugins/{{ item.folder }}/{{ item.name | default(item.repo) | basename }}"
    update_diff_git_version: "{{ item.version | default('HEAD') }}"
    update_diff_git_single_branch: true
    update_diff_git_depth: 100
  loop: "{{ neovim_plugins | rejectattr('repo', 'equalto', 'stevearc/overseer.nvim') | list }}"
  register: var_clone_nvim_plugins

- name: "[archlinux] Editor tools: refresh overseer.nvim for local patch contract"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: git
  vars:
    update_diff_capture_scope: nvim-plugins
    update_diff_git_repo: https://github.com/stevearc/overseer.nvim
    update_diff_git_dest: "{{ ansible_facts.env.HOME }}/.local/share/nvim/site/pack/plugins/start/overseer"
    update_diff_git_version: master
    update_diff_git_single_branch: true
    update_diff_git_depth: 100
    update_diff_git_force: true
  register: var_overseer_nvim_plugin_result
  when: not var_overseer_local_patch_marker.stat.exists or not var_overseer_checkout.stat.exists

- name: "[archlinux] Editor tools: apply overseer local patches"
  ansible.posix.patch:
    src: "{{ item }}"
    basedir: ~/.local/share/nvim/site/pack/plugins/start/overseer
    strip: 1
  loop:
    - overseer.nvim.patch
    - overseer-open-output-buffer-command.patch
    - overseer-terminal-normal-output.patch
  when: not var_overseer_local_patch_marker.stat.exists or not var_overseer_checkout.stat.exists

- name: "[archlinux] Editor tools: record overseer local patch marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: record
  vars:
    dotfiles_marker_name: nvim-plugin-overseer-local-patches-v2
    dotfiles_marker_content: "overseer-local-patches-v2\n"
  when: not var_overseer_local_patch_marker.stat.exists or not var_overseer_checkout.stat.exists

- name: "[archlinux] Editor tools: build lookup of nvim plugin results by repo (init)"
  ansible.builtin.set_fact:
    nvim_plugin_result_by_repo: {}

- name: "[archlinux] Editor tools: build lookup of nvim plugin results by repo"
  ansible.builtin.set_fact:
    nvim_plugin_result_by_repo: "{{ nvim_plugin_result_by_repo | default({}) | combine({item.item.repo: item}) }}"
  loop: "{{ var_clone_nvim_plugins.results }}"

- name: "[archlinux] Editor tools: add overseer result to nvim plugin lookup"
  ansible.builtin.set_fact:
    nvim_plugin_result_by_repo: "{{ nvim_plugin_result_by_repo | combine({'stevearc/overseer.nvim': var_overseer_nvim_plugin_result | default({'changed': false})})
      }}"

- name: "[archlinux] Editor tools: remove stale nvim plugins"
  ansible.builtin.file:
    path: ~/.local/share/nvim/site/pack/plugins/start/{{ item }}
    state: absent
  loop:
    - coc.nvim
    - plenary

- name: "[archlinux] Editor tools: ensure local AUR packages"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/10-system-tools/tasks/install-local-aur-packages.archlinux.yml"
  vars:
    aur_local_packages:
      - ctags-git

- name: "[archlinux] Editor tools: create treesitter tempdir"
  ansible.builtin.tempfile:
    state: directory
    suffix: treesitter_tempdir
  register: treesitter_tempdir

- name: "[archlinux] Editor tools: download treesitter CLI"
  ansible.builtin.get_url:
    url: https://github.com/tree-sitter/tree-sitter/releases/download/v{{ archlinux_treesitter_version }}/tree-sitter-linux-x64.gz
    dest: "{{ treesitter_tempdir.path }}/"
    force: true
    mode: "755"

- name: "[archlinux] Editor tools: uncompress treesitter (.gz no supported)"
  ansible.builtin.command: gunzip -d {{ treesitter_tempdir.path }}/tree-sitter-linux-x64.gz
  args:
    creates: "{{ treesitter_tempdir.path }}/tree-sitter-linux-x64"

- name: "[archlinux] Editor tools: install treesitter CLI"
  ansible.builtin.copy:
    src: "{{ treesitter_tempdir.path }}/tree-sitter-linux-x64"
    dest: ~/bin/tree-sitter
    remote_src: true
    mode: "755"

- name: "[archlinux] Editor tools: clone treesitter parsers"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: git
  vars:
    update_diff_capture_scope: treesitter-parsers
    update_diff_git_repo: "{{ item.repo }}"
    update_diff_git_dest: "{{ ansible_facts.env.HOME }}/data/repos/{{ item.repo | basename }}"
    update_diff_git_version: "{{ item.version | default('HEAD') }}"
    update_diff_git_recursive: false
    update_diff_git_single_branch: true
  register: var_clone_treesitter_parsers
  loop: "{{ treesitter_parsers | unique(attribute='repo') | list }}"

- name: "[archlinux] Editor tools: clone treesitter queries source"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: git
  vars:
    update_diff_capture_scope: treesitter-parsers
    update_diff_git_repo: "{{ treesitter_queries_repo.repo }}"
    update_diff_git_dest: "{{ ansible_facts.env.HOME }}/data/repos/nvim-treesitter"
    update_diff_git_version: "{{ treesitter_queries_repo.version }}"
    update_diff_git_force: true
    update_diff_git_recursive: false
    update_diff_git_single_branch: true

- name: "[archlinux] Editor tools: build lookup of treesitter clone results by repo (init)"
  ansible.builtin.set_fact:
    treesitter_clone_result_by_repo: {}

- name: "[archlinux] Editor tools: build lookup of treesitter clone results by repo"
  ansible.builtin.set_fact:
    treesitter_clone_result_by_repo: "{{ treesitter_clone_result_by_repo | combine({item.item.repo: item}) }}"
  loop: "{{ var_clone_treesitter_parsers.results }}"

- name: "[archlinux] Editor tools: remove stale built treesitter parsers after repo updates"
  ansible.builtin.file:
    path: ~/data/repos/{{ item.repo | basename }}/{{ item.filetype }}.so
    state: absent
  when: "(treesitter_clone_result_by_repo[item.repo] | default({})).changed | default(false)"
  loop: "{{ treesitter_parsers }}"

- name: "[archlinux] Editor tools: build treesitter parsers"
  ansible.builtin.command: ~/bin/tree-sitter build -o ~/data/repos/{{ item.repo | basename }}/{{ item.filetype }}.so
  args:
    creates: ~/data/repos/{{ item.repo | basename }}/{{ item.filetype }}.so
    chdir: ~/data/repos/{{ item.repo | basename }}/{{ item.location | default('') }}
  loop: "{{ treesitter_parsers }}"

- name: "[archlinux] Editor tools: ensure nvim treesitter folders"
  ansible.builtin.file:
    path: ~/.config/nvim/{{ item }}
    state: directory
    mode: "755"
  loop:
    - parser
    - queries

- name: "[archlinux] Editor tools: list installed treesitter parsers"
  ansible.builtin.command:
    argv:
      - find
      - "{{ ansible_facts.env.HOME }}/.config/nvim/parser"
      - -maxdepth
      - "1"
      - -type
      - f
      - -name
      - "*.so"
      - -printf
      - "%f\n"
  register: treesitter_installed_parser_files
  changed_when: false

- name: "[archlinux] Editor tools: copy treesitter parsers to nvim"
  ansible.builtin.copy:
    src: ~/data/repos/{{ item.repo | basename }}/{{ item.filetype }}.so
    dest: ~/.config/nvim/parser/{{ item.filetype }}.so
    mode: "755"
  when:
    - (treesitter_clone_result_by_repo[item.repo] | default({})).changed | default(false) or (item.filetype ~ '.so') not in
      (treesitter_installed_parser_files.stdout_lines | default([]))
  loop: "{{ treesitter_parsers }}"

- name: "[archlinux] Editor tools: copy nvim-treesitter runtime queries to nvim"
  ansible.builtin.command:
    argv:
      - /usr/bin/rsync
      - -a
      - --delete
      - ~/data/repos/nvim-treesitter/runtime/queries/
      - ~/.config/nvim/queries/
  changed_when: true

- name: "[archlinux] Editor tools: copy custom treesitter queries to nvim"
  ansible.builtin.copy:
    src: ~/data/repos/{{ item.repo | basename }}/{{ item.location | default('') }}/queries/
    dest: ~/.config/nvim/queries/{{ item.filetype }}/
    mode: "755"
  when: "(item.query_source | default('parser')) == 'parser'"
  loop: "{{ treesitter_parsers }}"

- name: "[archlinux] Editor tools: remove nvim-treesitter plugin"
  ansible.builtin.file:
    path: ~/.local/share/nvim/site/pack/plugins/start/nvim-treesitter
    state: absent

- name: "[archlinux] Editor tools: setup intelephense key if available"
  ansible.builtin.shell: |
    mkdir -p ~/data/intelephense
    {{ kwallet_query_cmd }} && echo "$({{ kwallet_query_cmd }})" > ~/data/intelephense/licence.txt
  vars:
    kwallet_query_cmd: kwallet-query --folder dev-tools --read-password intelephense-key kdewallet
  args:
    creates: ~/data/intelephense/licence.txt
  ignore_errors: true

- name: "[archlinux] Editor tools: generate helptags"
  ansible.builtin.command: ~/bin/nvim --headless -c "helptags ALL" -c "quit"
  changed_when: false

- name: "[archlinux] Editor tools: sync colorscheme with system"
  ansible.builtin.command: echo
  changed_when: true
  notify: handler_ensure_color_change_dbus_subscription
