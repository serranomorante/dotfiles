---
- name: "[archlinux] Python tools: ensure virtualenv parent directory"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/data/apps/python-tools"
    state: directory
    mode: "755"

- name: "[archlinux] Python tools: ensure virtualenv python packages"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: pip
  vars:
    update_diff_capture_scope: python-tools
    update_diff_pip_venv: "{{ ansible_facts.env.HOME }}/data/apps/python-tools/.venv"
    update_diff_pip_executable: "{{ ansible_facts.env.HOME }}/bin/ansible-firejail-pip"
    update_diff_pip_packages:
      - name: pip
      - name: hatch
      - name: poetry

- name: "[archlinux] Python tools: symlink python tools"
  ansible.builtin.file:
    src: ~/data/apps/python-tools/.venv/bin/{{ item }}
    dest: ~/bin/{{ item }}
    state: link
  loop:
    - hatch
    - poetry
