---
- name: "[archlinux] Setup ai tools: install packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - curl
      - openai-codex
      - git

- name: "[archlinux] Setup ai tools: ensure piper tts directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "755"
  loop:
    - "{{ piper_tts_setup.project_path }}"
    - "{{ piper_tts_setup.voice_dir }}"
    - "{{ piper_tts_setup.project_path }}/run"

- name: "[archlinux] Setup ai tools: ensure piper tts venv packages"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: pip
  vars:
    update_diff_capture_scope: piper-tts
    update_diff_pip_venv: "{{ piper_tts_setup.venv_path }}"
    update_diff_pip_executable: "{{ ansible_facts.env.HOME }}/bin/ansible-firejail-pip"
    update_diff_pip_environment:
      PYENV_VERSION: "{{ piper_tts_setup.python_version }}"
    update_diff_pip_packages:
      - name: piper-tts[http]
        version: "{{ piper_tts_setup.version }}"

- name: "[archlinux] Setup ai tools: stat piper tts voice markers"
  ansible.builtin.stat:
    path: "{{ piper_tts_setup.voice_dir }}/.ansible-piper-voice-{{ item }}-{{ piper_tts_setup.version }}"
  register: var_piper_tts_voice_markers
  loop: "{{ piper_tts_setup.voices }}"

- name: "[archlinux] Setup ai tools: remove stale piper tts voice model before refresh"
  ansible.builtin.file:
    path: "{{ piper_tts_setup.voice_dir }}/{{ item.item }}.onnx"
    state: absent
  loop: "{{ var_piper_tts_voice_markers.results }}"
  when: not item.stat.exists

- name: "[archlinux] Setup ai tools: remove stale piper tts voice metadata before refresh"
  ansible.builtin.file:
    path: "{{ piper_tts_setup.voice_dir }}/{{ item.item }}.onnx.json"
    state: absent
  loop: "{{ var_piper_tts_voice_markers.results }}"
  when: not item.stat.exists

- name: "[archlinux] Setup ai tools: download piper tts voices"
  ansible.builtin.command:
    argv:
      - "{{ python_firejail_executable }}"
      - online
      - "{{ piper_tts_setup.project_path }}"
      - --
      - "{{ piper_tts_setup.venv_path }}/bin/python"
      - -m
      - piper.download_voices
      - --data-dir
      - "{{ piper_tts_setup.voice_dir }}"
      - "{{ item.item }}"
  args:
    creates: "{{ piper_tts_setup.voice_dir }}/.ansible-piper-voice-{{ item.item }}-{{ piper_tts_setup.version }}"
  environment:
    PYENV_VERSION: "{{ piper_tts_setup.python_version }}"
  loop: "{{ var_piper_tts_voice_markers.results }}"
  when: not item.stat.exists
  timeout: 0

- name: "[archlinux] Setup ai tools: record piper tts voice markers"
  ansible.builtin.copy:
    content: "{{ item.item }} {{ piper_tts_setup.version }}\n"
    dest: "{{ piper_tts_setup.voice_dir }}/.ansible-piper-voice-{{ item.item }}-{{ piper_tts_setup.version }}"
    mode: "644"
  loop: "{{ var_piper_tts_voice_markers.results }}"
  when: not item.stat.exists

- name: "[archlinux] Setup ai tools: stat piper tts user service"
  ansible.builtin.stat:
    path: ~/.config/systemd/user/{{ piper_tts_setup.service_name }}
  register: var_piper_tts_user_service

- name: "[archlinux] Setup ai tools: ensure piper tts user service"
  ansible.builtin.systemd_service:
    scope: user
    name: "{{ piper_tts_setup.service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  when: var_piper_tts_user_service.stat.exists

- name: "[archlinux] Setup ai tools: ensure npm packages with diff capture"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: npm
  vars:
    update_diff_capture_scope: ai-tools
    update_diff_npm_prefix: "{{ node_ai_npm_prefix }}"
    update_diff_npm_packages: "{{ node_ai_npm_packages }}"
    update_diff_npm_node_version: "{{ node_system_default_version }}"
    update_diff_npm_executable: "{{ ansible_firejail_npm_executable }}"

- name: "[archlinux] Setup ai tools: symlink npm package binaries"
  ansible.builtin.file:
    state: link
    src: "{{ node_ai_npm_prefix }}/bin/{{ item.1 }}"
    dest: "{{ node_user_bin_dir }}/{{ item.1 }}"
  loop: "{{ node_ai_npm_packages | subelements('bins') }}"

- name: "[archlinux] Setup ai tools: remove postman mcp from global npm prefix"
  community.general.npm:
    name: "@postman/postman-mcp-server"
    global: true
    state: absent
    executable: "{{ ansible_firejail_npm_executable }}"
  environment:
    ANSIBLE_FIREJAIL_NPM_NODE_VERSION: "{{ node_system_default_version }}"
    ANSIBLE_FIREJAIL_NPM_PREFIX: "{{ node_ai_npm_prefix }}"

- name: "[archlinux] Setup ai tools: remove postman mcp global symlink"
  ansible.builtin.file:
    path: "{{ node_user_bin_dir }}/postman-mcp-server"
    state: absent

- name: "[archlinux] Setup ai tools: remove postman mcp project path"
  ansible.builtin.file:
    path: "{{ postman_mcp_legacy_project_path }}"
    state: absent

- name: "[archlinux] Setup ai tools: ensure playwright browser cache"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.cache/ms-playwright"
    state: directory
    mode: "755"

- name: "[archlinux] Setup ai tools: set playwright package version fact"
  ansible.builtin.set_fact:
    playwright_package_version: "{{ node_ai_npm_packages | selectattr('name', 'equalto', 'playwright') | map(attribute='version') | first }}"

- name: "[archlinux] Setup ai tools: stat playwright browser marker"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.cache/ms-playwright/.ansible-playwright-{{ playwright_package_version }}"
  register: var_playwright_browser_marker

- name: "[archlinux] Setup ai tools: execute playwright install"
  ansible.builtin.command:
    argv:
      - "{{ node_firejail_executable }}"
      - online
      - "{{ node_ai_npm_prefix }}"
      - --
      - "{{ node_system_default_node_path }}"
      - "{{ node_ai_npm_prefix }}/bin/playwright"
      - install
  environment:
    FJ_NODE_WRITABLE_PATHS: |
      {{ ansible_facts.env.HOME }}/.cache/ms-playwright
  args:
    creates: "{{ ansible_facts.env.HOME }}/.cache/ms-playwright/.ansible-playwright-{{ playwright_package_version }}"
  when: not var_playwright_browser_marker.stat.exists

- name: "[archlinux] Setup ai tools: record playwright browser marker"
  ansible.builtin.copy:
    content: "{{ playwright_package_version }}\n"
    dest: "{{ ansible_facts.env.HOME }}/.cache/ms-playwright/.ansible-playwright-{{ playwright_package_version }}"
    mode: "644"
  when: not var_playwright_browser_marker.stat.exists

- name: "[archlinux] Setup ai tools: clone reaper mcp"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: git
  vars:
    update_diff_capture_scope: ai-tools
    update_diff_git_repo: https://github.com/dschuler36/reaper-mcp-server
    update_diff_git_dest: "{{ reaper_mcp_server_setup.repo_path }}"
    update_diff_git_version: main

- name: "[archlinux] Setup ai tools: ensure reaper-mcp-server"
  ansible.builtin.command:
    argv:
      - "{{ python_firejail_executable }}"
      - online
      - "{{ reaper_mcp_server_setup.repo_path }}"
      - --
      - uv
      - venv
      - --seed
      - .venv
  args:
    creates: "{{ reaper_mcp_server_setup.repo_path }}/.venv/bin/activate"
    chdir: "{{ reaper_mcp_server_setup.repo_path }}"

- name: "[archlinux] Setup ai tools: install reaper-mcp-server"
  ansible.builtin.command:
    argv:
      - "{{ python_firejail_executable }}"
      - online
      - "{{ reaper_mcp_server_setup.repo_path }}"
      - --
      - "{{ reaper_mcp_server_setup.repo_path }}/.venv/bin/python"
      - -m
      - pip
      - install
      - .
      - uv
  args:
    chdir: "{{ reaper_mcp_server_setup.repo_path }}"
  changed_when: true

- name: "[archlinux] Setup ai tools: register figma api key"
  ansible.builtin.command: kwallet-query --folder {{ folder }} --read-password {{ passkey }} {{ wallet }}
  changed_when: false
  register: mcp_server_figma_key
  failed_when: false
  no_log: true
  vars:
    folder: "{{ figma_mcp_server_setup.keyrings.folder }}"
    passkey: "{{ figma_mcp_server_setup.keyrings.passkey }}"
    wallet: "{{ figma_mcp_server_setup.keyrings.wallet }}"

- name: "[archlinux] Setup ai tools: create dest folder"
  ansible.builtin.file:
    path: ~/.config/mcphub
    state: directory
    mode: "744"

- name: "[archlinux] Setup ai tools: generate servers.json"
  ansible.builtin.template:
    src: mcphub_servers.json
    dest: ~/.config/mcphub/servers.json
    mode: "644"

- name: "[archlinux] Setup ai tools: load mcphub servers.json"
  ansible.builtin.set_fact:
    mcphub_servers_json: "{{ lookup('file', '~/.config/mcphub/servers.json') | from_json }}"

- name: "[archlinux] Setup ai tools: reset active mcphub server map"
  ansible.builtin.set_fact:
    mcphub_active_servers: {}

- name: "[archlinux] Setup ai tools: collect active mcphub servers"
  ansible.builtin.set_fact:
    mcphub_active_servers: "{{ mcphub_active_servers | combine({item.key: item.value | dict2items | rejectattr('key', 'equalto', 'disabled') | items2dict}) }}"
  loop: "{{ mcphub_servers_json.mcpServers | dict2items }}"
  when: not (item.value.disabled | default(false) | bool)

- name: "[archlinux] Setup ai tools: build active mcphub config"
  ansible.builtin.set_fact:
    mcphub_active_servers_json: "{{ mcphub_servers_json | combine({'mcpServers': mcphub_active_servers}) }}"

- name: "[archlinux] Setup ai tools: stat gemini settings"
  ansible.builtin.stat:
    path: ~/.gemini/settings.json
  register: var_stat_gemini_settings

- name: "[archlinux] Setup ai tools: get gemini settings file"
  ansible.builtin.set_fact:
    gemini_settings_json: "{{ lookup('file', '~/.gemini/settings.json') | default({}) | from_json }}"
  when: var_stat_gemini_settings.stat.exists

- name: "[archlinux] Setup ai tools: combine gemini settings with mcphub servers"
  ansible.builtin.set_fact:
    gemini_settings_json: "{{ gemini_settings_json | combine(mcphub_active_servers_json) }}"
  when:
    - var_stat_gemini_settings.stat.exists
    - gemini_settings_json.values() | length != 0

- name: "[archlinux] Setup ai tools: override gemini settings file"
  ansible.builtin.copy:
    dest: ~/.gemini/settings.json
    content: "{{ gemini_settings_json }}"
    mode: "644"
  when:
    - var_stat_gemini_settings.stat.exists
    - gemini_settings_json.values() | length != 0

- name: "[archlinux] Setup ai tools: stat claude settings"
  ansible.builtin.stat:
    path: ~/.claude.json
  register: var_stat_claude_settings

- name: "[archlinux] Setup ai tools: get claude settings file"
  ansible.builtin.set_fact:
    claude_settings_json: "{{ lookup('file', '~/.claude.json') | default({}) | from_json }}"
  when: var_stat_claude_settings.stat.exists

- name: "[archlinux] Setup ai tools: combine claude settings with mcphub servers"
  ansible.builtin.set_fact:
    claude_settings_json: "{{ claude_settings_json | combine(mcphub_active_servers_json) }}"
  when:
    - var_stat_claude_settings.stat.exists
    - claude_settings_json.values() | length != 0

- name: "[archlinux] Setup ai tools: override claude settings file"
  ansible.builtin.copy:
    dest: ~/.claude.json
    content: "{{ claude_settings_json }}"
    mode: "644"
  when:
    - var_stat_claude_settings.stat.exists
    - claude_settings_json.values() | length != 0

- name: "[archlinux] Setup ai tools: ensure claude config folder"
  ansible.builtin.file:
    path: ~/.claude
    state: directory
    mode: "755"

- name: "[archlinux] Setup ai tools: stat claude global settings"
  ansible.builtin.stat:
    path: ~/.claude/settings.json
  register: var_stat_claude_global_settings

- name: "[archlinux] Setup ai tools: get claude global settings file"
  ansible.builtin.set_fact:
    claude_global_settings_json: "{{ lookup('file', '~/.claude/settings.json') | default({}) | from_json }}"
  when: var_stat_claude_global_settings.stat.exists

- name: "[archlinux] Setup ai tools: initialize claude global settings"
  ansible.builtin.set_fact:
    claude_global_settings_json: {}
  when: not var_stat_claude_global_settings.stat.exists

- name: "[archlinux] Setup ai tools: force claude global settings"
  ansible.builtin.set_fact:
    claude_global_settings_json: "{{ claude_global_settings_json | combine(claude_global_settings_config) }}"
  when: claude_global_settings_config | default({}) | length != 0

- name: "[archlinux] Setup ai tools: override claude global settings file"
  ansible.builtin.copy:
    dest: ~/.claude/settings.json
    content: "{{ claude_global_settings_json | to_nice_json }}\n"
    mode: "644"
  when: claude_global_settings_json.values() | length != 0

- name: "[archlinux] Setup ai tools: create codex config folder"
  ansible.builtin.file:
    path: ~/.codex
    state: directory
    mode: "744"

- name: "[archlinux] Setup ai tools: write codex mcp_servers into config.toml"
  ansible.builtin.blockinfile:
    path: ~/.codex/config.toml
    create: true
    mode: "644"
    marker: "# {mark} ANSIBLE MANAGED MCP SERVERS (mcphub -> codex)"
    block: "{{ lookup('template', 'codex_mcp_servers.toml.j2') }}"
