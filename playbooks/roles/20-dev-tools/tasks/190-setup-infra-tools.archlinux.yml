---
- name: "[archlinux] Setup infra tools: install packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - yq
      - kustomize
      - kubectl

- name: "[archlinux] Setup infra tools: setup k3s"
  vars:
    k3s_install_version: "v1.26.3+k3s1"
    k3s_install_exec: "server --disable=traefik --snapshotter=native"
    k3s_install_script_path: /tmp/get.k3s.sh
    k3s_system_kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    k3s_user_kubeconfig_dir: "{{ ansible_facts.env.HOME }}/.kube"
    k3s_user_kubeconfig_path: "{{ k3s_user_kubeconfig_dir }}/config"
    k3s_install_marker_path: "{{ ansible_facts.env.HOME }}/.local/state/dotfiles/k3s-install"
    k3s_install_marker: "{{ k3s_install_version }}:{{ k3s_install_exec }}"
  block:
    - name: "[archlinux] Setup infra tools: inspect k3s version"
      become: true
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - --version
      register: var_k3s_version
      changed_when: false
      failed_when: false

    - name: "[archlinux] Setup infra tools: stat k3s install marker"
      ansible.builtin.stat:
        path: "{{ k3s_install_marker_path }}"
      register: var_k3s_install_marker

    - name: "[archlinux] Setup infra tools: read k3s install marker"
      ansible.builtin.slurp:
        src: "{{ k3s_install_marker_path }}"
      register: var_k3s_install_marker_slurp
      when: var_k3s_install_marker.stat.exists

    - name: "[archlinux] Setup infra tools: determine whether k3s reinstall is required"
      ansible.builtin.set_fact:
        k3s_reinstall_required: >-
          {{
            var_k3s_version.rc != 0
            or k3s_install_version not in (var_k3s_version.stdout | default(''))
            or (
              var_k3s_install_marker.stat.exists
              and ((var_k3s_install_marker_slurp.content | default('') | b64decode | trim) != k3s_install_marker)
            )
          }}

    - name: "[archlinux] Setup infra tools: download k3s install script"
      become: true
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: "{{ k3s_install_script_path }}"
        mode: "755"
      when: k3s_reinstall_required

    - name: "[archlinux] Setup infra tools: install k3s"
      become: true
      ansible.builtin.command:
        argv:
          - "{{ k3s_install_script_path }}"
      environment:
        INSTALL_K3S_VERSION: "{{ k3s_install_version }}"
        INSTALL_K3S_EXEC: "{{ k3s_install_exec }}"
        K3S_KUBECONFIG_MODE: "644"
      changed_when: true
      when: k3s_reinstall_required

    - name: "[archlinux] Setup infra tools: ensure k3s marker directory"
      ansible.builtin.file:
        path: "{{ k3s_install_marker_path | dirname }}"
        state: directory
        mode: "755"

    - name: "[archlinux] Setup infra tools: record k3s install marker"
      ansible.builtin.copy:
        content: "{{ k3s_install_marker }}\n"
        dest: "{{ k3s_install_marker_path }}"
        mode: "644"
      when:
        - k3s_reinstall_required or not var_k3s_install_marker.stat.exists

    # Runtime tasks below depend on k3s actually running. On a freshly
    # provisioned host these can fail until the machine has been rebooted
    # (kernel modules, cgroup state, etc.). Skip the rest of the block on
    # failure instead of aborting the whole play.
    - name: "[archlinux] Setup infra tools: k3s runtime bring-up"
      block:
        - name: "[archlinux] Setup infra tools: ensure k3s service"
          become: true
          ansible.builtin.systemd_service:
            name: k3s
            enabled: false

        - name: "[archlinux] Setup infra tools: wait for k3s kubeconfig"
          become: true
          ansible.builtin.wait_for:
            path: "{{ k3s_system_kubeconfig_path }}"
            timeout: 120

        - name: "[archlinux] Setup infra tools: fix k3s kubeconfig permissions"
          become: true
          ansible.builtin.file:
            path: "{{ k3s_system_kubeconfig_path }}"
            state: file
            mode: "0644"

        - name: "[archlinux] Setup infra tools: ensure user kube directory"
          ansible.builtin.file:
            path: "{{ k3s_user_kubeconfig_dir }}"
            state: directory
            mode: "755"

        - name: "[archlinux] Setup infra tools: install user kubeconfig"
          become: true
          become_user: "{{ ansible_facts.env.USER }}"
          ansible.builtin.copy:
            src: "{{ k3s_system_kubeconfig_path }}"
            dest: "{{ k3s_user_kubeconfig_path }}"
            remote_src: true
            mode: "0644"

        - name: "[archlinux] Setup infra tools: inspect k3s service state"
          ansible.builtin.command:
            argv:
              - systemctl
              - is-active
              - k3s
          register: var_k3s_service_active
          changed_when: false
          failed_when: false

        - name: "[archlinux] Setup infra tools: probe kubectl node access"
          ansible.builtin.command:
            argv:
              - kubectl
              - get
              - nodes
              - -o
              - name
          environment:
            KUBECONFIG: "{{ k3s_user_kubeconfig_path }}"
          register: var_k3s_nodes_probe
          changed_when: false
          failed_when: false

        - name: "[archlinux] Setup infra tools: wait for kubectl node access"
          ansible.builtin.command:
            argv:
              - kubectl
              - get
              - nodes
              - -o
              - name
          environment:
            KUBECONFIG: "{{ k3s_user_kubeconfig_path }}"
          register: var_k3s_nodes
          changed_when: false
          retries: 5
          delay: 3
          when:
            - var_k3s_nodes_probe.rc != 0 or var_k3s_nodes_probe.stdout_lines | length == 0
            - k3s_reinstall_required
          until:
            - var_k3s_nodes.rc == 0
            - var_k3s_nodes.stdout_lines | length > 0
      rescue:
        - name: "[archlinux] Setup infra tools: warn on k3s runtime failure"
          ansible.builtin.debug:
            msg: >-
              k3s runtime tasks failed (service start, kubeconfig wait, or
              kubectl probe). This is expected on a freshly installed host
              that has not been rebooted yet. Reboot and re-run the playbook
              to finish k3s setup.
