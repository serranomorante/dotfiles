---
- name: "[archlinux] Setup node: install volta"
  ansible.builtin.shell: >
    set -o pipefail &&
    curl https://get.volta.sh | bash -s -- --skip-setup
  changed_when: true

- name: "[archlinux] Setup node: ensure user bin directory"
  ansible.builtin.file:
    path: "{{ node_user_bin_dir }}"
    state: directory
    mode: "755"

- name: "[archlinux] Setup node: ensure firejail profile directory"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/firejail"
    state: directory
    mode: "755"

- name: "[archlinux] Setup node: install firejail profiles"
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ ansible_facts.env.HOME }}/.config/firejail/{{ item }}"
    mode: "644"
  loop:
    - dev-tools-common.inc
    - dev-editor-shell-common.inc
    - fj-node.profile
    - fj-node-ansible.profile

- name: "[archlinux] Setup node: install firejail wrapper helper"
  ansible.builtin.copy:
    src: firejail-wrapper-common.bash
    dest: "{{ node_user_bin_dir }}/firejail-wrapper-common.bash"
    mode: "755"

- name: "[archlinux] Setup node: install generic firejail node wrapper"
  ansible.builtin.copy:
    src: fj-node
    dest: "{{ node_firejail_executable }}"
    mode: "755"

- name: "[archlinux] Setup node: install ansible firejail npm wrapper"
  ansible.builtin.copy:
    src: ansible-firejail-npm
    dest: "{{ ansible_firejail_npm_executable }}"
    mode: "755"

- name: "[archlinux] Setup node: install ansible firejail pnpm wrapper"
  ansible.builtin.copy:
    src: ansible-firejail-pnpm
    dest: "{{ ansible_firejail_pnpm_executable }}"
    mode: "755"

- name: "[archlinux] Setup node: add volta to console startup scripts"
  ansible.builtin.blockinfile:
    dest: "{{ item.script }}"
    create: true
    marker: "## {mark} ANSIBLE MANAGED BLOCK - SETUP NODE"
    mode: "744"
    block: |
      {% if 'dot-bashrc' in item.script %}
      export VOLTA_HOME="$HOME/.volta"
      export PATH="$VOLTA_HOME/bin:$PATH"
      export PATH="$VOLTA_HOME/tools/image/node/{{ node_system_default_version }}/bin:$PATH" # version is replaced by ansible
      {% endif %}
  loop:
    - { script: ~/dotfiles/home/dot-bashrc }

- name: "[archlinux] Setup node: install node versions"
  ansible.builtin.command: "{{ ansible_facts.env.HOME }}/.volta/bin/volta install node@{{ node_system_default_version }}"
  changed_when: true

- name: "[archlinux] Setup node: ensure package manager prefix"
  ansible.builtin.file:
    path: "{{ node_package_manager_npm_prefix }}"
    state: directory
    mode: "755"

- name: "[archlinux] Setup node: ensure package managers"
  community.general.npm:
    name: "{{ item.name }}"
    version: "{{ item.version }}"
    global: true
    state: present
    executable: "{{ ansible_firejail_npm_executable }}"
  environment:
    ANSIBLE_FIREJAIL_NPM_NODE_VERSION: "{{ node_system_default_version }}"
    ANSIBLE_FIREJAIL_NPM_PREFIX: "{{ node_package_manager_npm_prefix }}"
  loop: "{{ node_package_manager_packages }}"

- name: "[archlinux] Setup node: symlink package manager binaries"
  ansible.builtin.file:
    src: "{{ node_package_manager_npm_prefix }}/bin/{{ item.1 }}"
    dest: "{{ node_user_bin_dir }}/{{ item.1 }}"
    state: link
  loop: "{{ node_package_manager_packages | subelements('bins') }}"
