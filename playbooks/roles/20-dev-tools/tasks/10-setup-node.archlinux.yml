---
- name: "[archlinux] Setup node: ensure user bin directory"
  ansible.builtin.file:
    path: "{{ node_user_bin_dir }}"
    state: directory
    mode: "755"

- name: "[archlinux] Setup node: ensure firejail profile directory"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/firejail"
    state: directory
    mode: "755"

- name: "[archlinux] Setup node: install firejail profiles"
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ ansible_facts.env.HOME }}/.config/firejail/{{ item }}"
    mode: "644"
  loop:
    - dev-tools-common.inc
    - dev-editor-shell-common.inc
    - fj-node.profile
    - fj-node-ansible.profile
    - fj-node-volta-bootstrap.profile
    - fj-node-mcp.profile
    - fj-node-hypothesis.profile

- name: "[archlinux] Setup node: install firejail wrapper helper"
  ansible.builtin.copy:
    src: firejail-wrapper-common.bash
    dest: "{{ node_user_bin_dir }}/firejail-wrapper-common.bash"
    mode: "755"

- name: "[archlinux] Setup node: ensure volta home exists"
  ansible.builtin.file:
    path: "{{ node_volta_home }}"
    state: directory
    mode: "755"

- name: "[archlinux] Setup node: ensure scoped node wrapper state dirs"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "755"
  loop:
    - "{{ ansible_facts.env.HOME }}/.cache/firejail-wrapper/node"
    - "{{ ansible_facts.env.HOME }}/.local/state/firejail-wrapper/node"
    - "{{ ansible_facts.env.HOME }}/.local/share/firejail-wrapper/node"

- name: "[archlinux] Setup node: ensure volta tool project dir"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/volta-tools"
    state: directory
    mode: "755"

- name: "[archlinux] Setup node: stat volta marker"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/volta-tools/.ansible-volta-{{ volta_version }}"
  register: var_volta_marker

- name: "[archlinux] Setup node: install volta"
  ansible.builtin.command:
    argv:
      - /usr/bin/firejail
      - "--profile={{ ansible_facts.env.HOME }}/.config/firejail/fj-node-volta-bootstrap.profile"
      - --protocol=unix,inet,inet6,netlink
      - /usr/bin/env
      - -i
      - "HOME={{ ansible_facts.env.HOME }}"
      - "PATH={{ ansible_facts.env.PATH }}"
      - "XDG_CACHE_HOME={{ ansible_facts.env.HOME }}/.cache/firejail-wrapper/node"
      - "XDG_STATE_HOME={{ ansible_facts.env.HOME }}/.local/state/firejail-wrapper/node"
      - bash
      - -lc
      - "set -o pipefail && curl https://get.volta.sh | bash -s -- --skip-setup --version {{ volta_version }}"
  changed_when: true
  when: not var_volta_marker.stat.exists

- name: "[archlinux] Setup node: record volta marker"
  ansible.builtin.copy:
    content: "{{ volta_version }}\n"
    dest: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/volta-tools/.ansible-volta-{{ volta_version }}"
    mode: "644"
  when: not var_volta_marker.stat.exists

- name: "[archlinux] Setup node: install generic firejail node wrapper"
  ansible.builtin.copy:
    src: fj-node
    dest: "{{ node_firejail_executable }}"
    mode: "755"

- name: "[archlinux] Setup node: install ansible firejail npm wrapper"
  ansible.builtin.copy:
    src: ansible-firejail-npm
    dest: "{{ ansible_firejail_npm_executable }}"
    mode: "755"

- name: "[archlinux] Setup node: install ansible firejail pnpm wrapper"
  ansible.builtin.copy:
    src: ansible-firejail-pnpm
    dest: "{{ ansible_firejail_pnpm_executable }}"
    mode: "755"

- name: "[archlinux] Setup node: add volta to console startup scripts"
  ansible.builtin.blockinfile:
    dest: "{{ item.script }}"
    create: true
    marker: "## {mark} ANSIBLE MANAGED BLOCK - SETUP NODE"
    mode: "744"
    block: |
      {% if 'dot-bashrc' in item.script %}
      export VOLTA_HOME="$HOME/.volta"
      export PATH="$VOLTA_HOME/bin:$PATH"
      export PATH="$VOLTA_HOME/tools/image/node/{{ node_system_default_version }}/bin:$PATH" # version is replaced by ansible
      {% endif %}
  loop:
    - { script: ~/dotfiles/home/dot-bashrc }

- name: "[archlinux] Setup node: install node versions"
  ansible.builtin.command:
    argv:
      - "{{ node_firejail_executable }}"
      - online
      - "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/volta-tools"
      - --
      - "{{ ansible_facts.env.HOME }}/.volta/bin/volta"
      - install
      - "node@{{ item }}"
  environment:
    FJ_NODE_WRITABLE_PATHS: |
      {{ ansible_facts.env.HOME }}/.volta
  args:
    creates: "{{ node_volta_home }}/tools/image/node/{{ item }}/bin/node"
  loop: "{{ node_managed_versions | unique }}"
  changed_when: true

- name: "[archlinux] Setup node: stat package manager markers"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/volta-tools/.ansible-volta-package-{{ item.name }}-{{ item.version }}"
  register: var_node_package_manager_markers
  loop: "{{ node_package_manager_packages }}"

- name: "[archlinux] Setup node: ensure package managers"
  ansible.builtin.command:
    argv:
      - "{{ node_firejail_executable }}"
      - online
      - "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/volta-tools"
      - --
      - "{{ ansible_facts.env.HOME }}/.volta/bin/volta"
      - install
      - "{{ item.name }}@{{ item.version }}"
  environment:
    FJ_NODE_WRITABLE_PATHS: |
      {{ ansible_facts.env.HOME }}/.volta
  loop: "{{ node_package_manager_packages }}"
  changed_when: true
  when: not var_node_package_manager_markers.results[ansible_loop.index0].stat.exists
  loop_control:
    extended: true
  register: var_node_package_manager_install

- name: "[archlinux] Setup node: record package manager markers"
  ansible.builtin.copy:
    content: "{{ item.item.name }}@{{ item.item.version }}\n"
    dest: "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/volta-tools/.ansible-volta-package-{{ item.item.name }}-{{ item.item.version }}"
    mode: "644"
  loop: "{{ var_node_package_manager_install.results }}"
  when: item.changed | default(false)

- name: "[archlinux] Setup node: symlink package manager binaries"
  ansible.builtin.file:
    src: "{{ node_volta_home }}/bin/{{ item.1 }}"
    dest: "{{ node_user_bin_dir }}/{{ item.1 }}"
    state: link
  loop: "{{ node_package_manager_packages | subelements('bins') }}"
