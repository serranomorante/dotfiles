---
- name: "[archlinux] Setup PHP sandbox: ensure user bin directory"
  ansible.builtin.file:
    path: "{{ node_user_bin_dir }}"
    state: directory
    mode: "755"

- name: "[archlinux] Setup PHP sandbox: ensure firejail profile directory"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/firejail"
    state: directory
    mode: "755"

- name: "[archlinux] Setup PHP sandbox: install firejail profiles"
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ ansible_facts.env.HOME }}/.config/firejail/{{ item }}"
    mode: "644"
  loop:
    - dev-tools-common.inc
    - fj-php.profile
    - fj-php-ansible.profile

- name: "[archlinux] Setup PHP sandbox: install firejail wrapper helper"
  ansible.builtin.copy:
    src: firejail-wrapper-common.bash
    dest: "{{ node_user_bin_dir }}/firejail-wrapper-common.bash"
    mode: "755"

- name: "[archlinux] Setup PHP sandbox: ensure scoped wrapper state dirs"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "755"
  loop:
    - "{{ ansible_facts.env.HOME }}/.cache/firejail-wrapper/php"
    - "{{ ansible_facts.env.HOME }}/.local/state/firejail-wrapper/php"
    - "{{ ansible_facts.env.HOME }}/.local/share/firejail-wrapper/php"

- name: "[archlinux] Setup PHP sandbox: install generic firejail PHP wrapper"
  ansible.builtin.copy:
    src: fj-php
    dest: "{{ php_firejail_executable }}"
    mode: "755"

- name: "[archlinux] Setup PHP sandbox: install ansible firejail Composer wrapper"
  ansible.builtin.copy:
    src: ansible-firejail-composer
    dest: "{{ ansible_firejail_composer_executable }}"
    mode: "755"
