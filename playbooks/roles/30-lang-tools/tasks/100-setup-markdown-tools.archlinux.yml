---
- name: "[archlinux] Markdown language: register texlive group" # exclude fontsextra to save disk space
  become: true
  ansible.builtin.shell: >
    set -o pipefail &&
    pacman -Sg texlive | grep -v fontsextra | cut -d " " -f 2
  changed_when: false
  register: texlive_group_pkgs

- name: "[archlinux] Markdown language: ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - curl
      - marksman
      - mathjax

- name: "[archlinux] Markdown language: check mdcat version"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/.cargo/bin/mdcat"
      - --version
  register: mdcat_version_check
  changed_when: false
  failed_when: false

- block:
    - name: "[archlinux] Markdown language: ensure mdcat via cargo"
      ansible.builtin.command:
        argv:
          - "{{ ansible_facts.env.HOME }}/.cargo/bin/cargo"
          - install
          - mdcat
          - --version
          - "{{ mdcat_version }}"
          - --locked
      when: mdcat_version_check.rc != 0 or (mdcat_version | string) not in mdcat_version_check.stdout
  rescue:
    - name: "[archlinux] Markdown language: warn about mdcat"
      ansible.builtin.debug:
        msg: "Skipping mdcat installation after cargo failed: {{ ansible_failed_result.msg | default('unknown error') }}"

- name: "[archlinux] Markdown language: check mdcat binary"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.cargo/bin/mdcat"
  register: mdcat_binary

- name: "[archlinux] Markdown language: symlink mdcat binaries"
  ansible.builtin.file:
    src: "{{ ansible_facts.env.HOME }}/.cargo/bin/mdcat"
    dest: "{{ node_user_bin_dir }}/{{ item }}"
    state: link
  loop:
    - mdcat
    - mdless
  when: mdcat_binary.stat.exists

- name: "[archlinux] Markdown language: ensure aur texlive"
  become: true
  ansible.builtin.package:
    state: present
    name: "{{ texlive_group_pkgs.stdout | regex_findall('(.*)\n') }}" # necessary to make pdflatex work

- name: "[archlinux] Markdown language: ensure xelatex is installed"
  become: true
  ansible.builtin.package:
    state: present
    name: texlive-xetex

- name: "[archlinux] Markdown language: ensure npm packages with diff capture"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: npm
  vars:
    update_diff_capture_scope: markdown-language
    update_diff_npm_prefix: "{{ node_markdown_npm_prefix }}"
    update_diff_npm_packages: "{{ node_markdown_npm_packages }}"
    update_diff_npm_node_version: "{{ node_system_default_version }}"
    update_diff_npm_executable: "{{ ansible_firejail_npm_executable }}"

- name: "[archlinux] Markdown language: symlink npm binaries"
  ansible.builtin.file:
    src: "{{ node_markdown_npm_prefix }}/bin/{{ item.1 }}"
    dest: "{{ node_user_bin_dir }}/{{ item.1 }}"
    state: link
  loop: "{{ node_markdown_npm_packages | subelements('bins') }}"

- name: "[archlinux] Markdown language: ensure virtualenv packages"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: pip
  vars:
    update_diff_capture_scope: markdown-tools
    update_diff_pip_venv: "{{ ansible_facts.env.HOME }}/data/apps/note-taking-tools/utilities/.venv"
    update_diff_pip_executable: "{{ ansible_facts.env.HOME }}/bin/ansible-firejail-pip"
    update_diff_pip_packages:
      - name: pip
      - name: weasyprint
      - name: mdformat
      - name: mdformat-gfm
      - name: mdformat_footnote
      - name: mdformat-frontmatter
      - name: mdformat-web
      - name: mdformat-wikilink

- name: "[archlinux] Markdown language: symlink virtualenv packages"
  ansible.builtin.file:
    src: ~/data/apps/note-taking-tools/utilities/.venv/bin/{{ item }}
    dest: ~/bin/{{ item }}
    state: link
  loop:
    - mdformat
    - weasyprint
