---
- name: "[archlinux] Yaml language: ensure LSP"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - yamllint
      - yaml-language-server

- name: "[archlinux] Yaml language: ensure ansible-lint"
  ansible.builtin.command:
    argv:
      - "{{ python_firejail_executable }}"
      - online
      - "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/uv-tools"
      - --
      - uv
      - tool
      - install
      - --python=3.12
      - ansible-lint
  args:
    creates: ~/.local/bin/ansible-lint
  environment:
    UV_TOOL_DIR: "{{ ansible_facts.env.HOME }}/.local/share/uv/tools"
    UV_TOOL_BIN_DIR: "{{ ansible_facts.env.HOME }}/.local/bin"
    FJ_PY_WRITABLE_PATHS: |
      {{ ansible_facts.env.HOME }}/.local/bin
      {{ ansible_facts.env.HOME }}/.local/share/uv
      {{ ansible_facts.env.HOME }}/.local/share/uv/tools

- name: "[archlinux] Yaml language: ensure ansible language server npm prefix"
  ansible.builtin.file:
    path: "{{ node_ansible_language_server_npm_prefix }}"
    state: directory
    mode: "755"

- name: "[archlinux] Yaml language: ensure ansible language server npm packages"
  community.general.npm:
    name: "{{ item.name }}"
    version: "{{ item.version }}"
    global: true
    state: present
    executable: "{{ ansible_firejail_npm_executable }}"
  environment:
    ANSIBLE_FIREJAIL_NPM_NODE_VERSION: "{{ node_ansible_language_server_version }}"
    ANSIBLE_FIREJAIL_NPM_PREFIX: "{{ node_ansible_language_server_npm_prefix }}"
  loop: "{{ node_ansible_language_server_npm_packages }}"

- name: "[archlinux] Yaml language: install ansible language server wrapper"
  ansible.builtin.template:
    src: ansible-language-server
    dest: "{{ node_user_bin_dir }}/ansible-language-server"
    mode: "755"
