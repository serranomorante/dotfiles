---
- name: "[archlinux] Yaml language: ensure LSP"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - yamllint
      - yaml-language-server

- name: "[archlinux] Yaml language: stat ansible-lint marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: check
  vars:
    dotfiles_marker_name: "uv-tool-ansible-lint-{{ ansible_lint_version }}"
    dotfiles_marker_register: var_ansible_lint_marker

- name: "[archlinux] Yaml language: inspect ansible-lint Python interpreter"
  ansible.builtin.command:
    argv:
      - readlink
      - -f
      - "{{ ansible_facts.env.HOME }}/.local/share/uv/tools/ansible-lint/bin/python"
  register: var_ansible_lint_python_interpreter
  changed_when: false
  failed_when: false

- name: "[archlinux] Yaml language: ensure ansible-lint"
  ansible.builtin.command:
    argv:
      - "{{ python_firejail_executable }}"
      - online
      - "{{ ansible_facts.env.HOME }}/data/apps/dev-tools/uv-tools"
      - --
      - uv
      - tool
      - install
      - --python=3.12
      - "ansible-lint=={{ ansible_lint_version }}"
  environment:
    UV_TOOL_DIR: "{{ ansible_facts.env.HOME }}/.local/share/uv/tools"
    UV_TOOL_BIN_DIR: "{{ ansible_facts.env.HOME }}/.local/bin"
    UV_PYTHON_INSTALL_DIR: "{{ ansible_facts.env.HOME }}/.local/share/uv/python"
    FJ_PY_WRITABLE_PATHS: |
      {{ ansible_facts.env.HOME }}/.local/bin
      {{ ansible_facts.env.HOME }}/.local/share/uv
      {{ ansible_facts.env.HOME }}/.local/share/uv/tools
  when: >-
    not var_ansible_lint_marker.stat.exists
    or not var_ansible_lint_python_interpreter.stdout.startswith(ansible_facts.env.HOME + '/.local/share/uv/python/')
  changed_when: true

- name: "[archlinux] Yaml language: record ansible-lint marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: record
  vars:
    dotfiles_marker_name: "uv-tool-ansible-lint-{{ ansible_lint_version }}"
    dotfiles_marker_content: "ansible-lint=={{ ansible_lint_version }}\n"
  when: >-
    not var_ansible_lint_marker.stat.exists
    or not var_ansible_lint_python_interpreter.stdout.startswith(ansible_facts.env.HOME + '/.local/share/uv/python/')

- name: "[archlinux] Yaml language: ensure ansible language server npm packages with diff capture"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: npm
  vars:
    update_diff_capture_scope: yaml-language
    update_diff_npm_prefix: "{{ node_ansible_language_server_npm_prefix }}"
    update_diff_npm_packages: "{{ node_ansible_language_server_npm_packages }}"
    update_diff_npm_node_version: "{{ node_ansible_language_server_version }}"
    update_diff_npm_executable: "{{ ansible_firejail_npm_executable }}"

- name: "[archlinux] Yaml language: install ansible language server wrapper"
  ansible.builtin.template:
    src: ansible-language-server
    dest: "{{ node_user_bin_dir }}/ansible-language-server"
    mode: "755"
