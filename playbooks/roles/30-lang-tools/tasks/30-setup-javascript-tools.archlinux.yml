---
- name: "[archlinux] Javascript language: ensure npm packages with diff capture"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: npm
  vars:
    update_diff_capture_scope: javascript-language
    update_diff_npm_prefix: "{{ node_javascript_npm_prefix }}"
    update_diff_npm_packages: "{{ node_javascript_npm_packages }}"
    update_diff_npm_node_version: "{{ node_system_default_version }}"
    update_diff_npm_executable: "{{ ansible_firejail_npm_executable }}"

- name: "[archlinux] Javascript language: symlink npm binaries"
  ansible.builtin.file:
    src: "{{ node_javascript_npm_prefix }}/bin/{{ item.1 }}"
    dest: "{{ node_user_bin_dir }}/{{ item.1 }}"
    state: link
  loop: "{{ node_javascript_npm_packages | subelements('bins') }}"

- name: "[archlinux] Javascript language: ensure unpinned npm packages with diff capture"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: npm
  vars:
    update_diff_capture_scope: javascript-language
    update_diff_npm_prefix: "{{ node_javascript_npm_prefix }}"
    update_diff_npm_packages:
      - name: "@fsouza/prettierd"
    update_diff_npm_node_version: "{{ node_system_default_version }}"
    update_diff_npm_executable: "{{ ansible_firejail_npm_executable }}"

- name: "[archlinux] Javascript language: symlink prettierd"
  ansible.builtin.file:
    src: "{{ node_javascript_npm_prefix }}/bin/prettierd"
    dest: "{{ node_user_bin_dir }}/prettierd"
    state: link

- name: "[archlinux] Javascript language: stat vscode-js-debug marker"
  ansible.builtin.stat:
    path: ~/data/repos/vscode-js-debug/.ansible-vscode-js-debug-build
  register: var_stat_vscode_js_debug_marker

- name: "[archlinux] Javascript language: read vscode-js-debug marker"
  ansible.builtin.slurp:
    src: ~/data/repos/vscode-js-debug/.ansible-vscode-js-debug-build
  register: var_slurp_vscode_js_debug_marker
  when: var_stat_vscode_js_debug_marker.stat.exists

- name: "[archlinux] Javascript language: set vscode-js-debug marker facts"
  ansible.builtin.set_fact:
    var_vscode_js_debug_marker: "v{{ vscode_js_debug_version }}:stderr-patch-v1"
    var_vscode_js_debug_needs_refresh: >-
      {{
        not var_stat_vscode_js_debug_marker.stat.exists
        or ((var_slurp_vscode_js_debug_marker.content | default('') | b64decode | trim) != ('v' ~ vscode_js_debug_version ~ ':stderr-patch-v1'))
      }}

- name: "[archlinux] Javascript language: clone vscode-js-debug with diff capture"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: git
  vars:
    update_diff_capture_scope: javascript-language
    update_diff_git_repo: https://github.com/microsoft/vscode-js-debug.git
    update_diff_git_dest: "{{ ansible_facts.env.HOME }}/data/repos/vscode-js-debug"
    update_diff_git_version: "v{{ vscode_js_debug_version }}"
    update_diff_git_depth: 1
    update_diff_git_force: true
    update_diff_git_single_branch: true
  when: var_vscode_js_debug_needs_refresh

- name: "[archlinux] Javascript language: apply custom patch"
  ansible.builtin.command: git apply ~/dotfiles/assets/patches/vscode_js_debug_stderr.patch
  args:
    chdir: ~/data/repos/vscode-js-debug
  changed_when: false
  when: var_vscode_js_debug_needs_refresh

- name: "[archlinux] Javascript language: stat vscode-js-debug build"
  ansible.builtin.stat:
    path: ~/data/repos/vscode-js-debug/dist/src/dapDebugServer.js
  register: var_stat_vscode_js_debug

- name: "[archlinux] Javascript language: install vscode-js-debug npm packages"
  community.general.npm:
    path: "{{ ansible_facts.env.HOME }}/data/repos/vscode-js-debug"
    ci: true
    executable: "{{ ansible_firejail_npm_executable }}"
  environment:
    ANSIBLE_FIREJAIL_NPM_NODE_VERSION: "{{ node_system_default_version }}"
    NPM_CONFIG_IGNORE_SCRIPTS: "true"
  when: var_vscode_js_debug_needs_refresh or not var_stat_vscode_js_debug.stat.exists

- name: "[archlinux] Javascript language: build vscode-js-debug"
  ansible.builtin.command:
    argv:
      - "{{ node_firejail_executable }}"
      - offline
      - "{{ ansible_facts.env.HOME }}/data/repos/vscode-js-debug"
      - --
      - "{{ node_system_default_node_path }}"
      - "{{ node_system_default_npx_path }}"
      - gulp
      - dapDebugServer
  environment:
    PATH: "{{ node_system_default_bin_dir }}:{{ ansible_facts.env.PATH }}"
    NPM_CONFIG_IGNORE_SCRIPTS: "false"
  args:
    chdir: ~/data/repos/vscode-js-debug
  when: var_vscode_js_debug_needs_refresh or not var_stat_vscode_js_debug.stat.exists

- name: "[archlinux] Javascript language: record vscode-js-debug marker"
  ansible.builtin.copy:
    content: "{{ var_vscode_js_debug_marker }}\n"
    dest: ~/data/repos/vscode-js-debug/.ansible-vscode-js-debug-build
    mode: "644"
  when: var_vscode_js_debug_needs_refresh
