---
- name: "[archlinux] C language: ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name: clang

- name: "[archlinux] C language: ensure DAP - cpptools folder exists"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "755"
  loop:
    - "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools"
    - "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools-downloads"

- name: "[archlinux] C language: ensure DAP - stat cpptools marker"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools/.ansible-cpptools-{{ cpptools_version | regex_replace('[^A-Za-z0-9_.-]', '_') }}"
  register: var_cpptools_marker

- name: "[archlinux] C language: ensure DAP - download cpptools"
  ansible.builtin.command:
    argv:
      - "{{ python_firejail_executable }}"
      - online
      - "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools-downloads"
      - --
      - curl
      - -L
      - -o
      - "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools-downloads/cpptools-linux-x64-{{ cpptools_version }}.vsix"
      - "https://github.com/microsoft/vscode-cpptools/releases/download/{{ cpptools_version }}/cpptools-linux-x64.vsix"
  environment:
    FJ_PY_WRITABLE_PATHS: |
      {{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools-downloads
  args:
    creates: "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools-downloads/cpptools-linux-x64-{{ cpptools_version }}.vsix"
  when: not var_cpptools_marker.stat.exists

- name: "[archlinux] C language: ensure DAP - install cpptools"
  ansible.builtin.command:
    argv:
      - "{{ python_firejail_executable }}"
      - offline
      - "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools-downloads"
      - --
      - bsdtar
      - -xf
      - "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools-downloads/cpptools-linux-x64-{{ cpptools_version }}.vsix"
      - -C
      - "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools"
  environment:
    FJ_PY_WRITABLE_PATHS: |
      {{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools
      {{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools-downloads
  when: not var_cpptools_marker.stat.exists
  changed_when: true

- name: "[archlinux] C language: ensure DAP - record cpptools marker"
  ansible.builtin.copy:
    content: "{{ cpptools_version }}\n"
    dest: "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/cpptools/.ansible-cpptools-{{ cpptools_version | regex_replace('[^A-Za-z0-9_.-]', '_') }}"
    mode: "644"
  when: not var_cpptools_marker.stat.exists

- name: "[archlinux] C language: ensure DAP - set cpptools as executable"
  ansible.builtin.file:
    path: ~/data/apps/lang-tools/cpptools/extension/debugAdapters/bin/OpenDebugAD7
    mode: "755"
