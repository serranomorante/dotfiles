---
- name: "[archlinux] Python language: ensure pylsp venv"
  ansible.builtin.pip:
    name:
      - pip
      - python-lsp-server
      - pydocstyle
      - pylsp-mypy
      - python-lsp-ruff # disables pycodestyle, pyflakes, mccabe, autopep8, yapf
    executable: "{{ ansible_facts.env.HOME }}/bin/ansible-firejail-pip"
    state: present
  environment:
    ANSIBLE_FIREJAIL_PIP_VENV: "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/pylsp/.venv"

- name: "[archlinux] Python language: ensure debugpy venv"
  ansible.builtin.pip:
    name:
      - pip
      - debugpy
    executable: "{{ ansible_facts.env.HOME }}/bin/ansible-firejail-pip"
    state: present
  environment:
    ANSIBLE_FIREJAIL_PIP_VENV: "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/debugpy/.venv"

- name: "[archlinux] Python language: ensure python tools"
  ansible.builtin.pip:
    name:
      - pip
      - cookiecutter
    executable: "{{ ansible_facts.env.HOME }}/bin/ansible-firejail-pip"
    state: present
  environment:
    ANSIBLE_FIREJAIL_PIP_VENV: "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/python-tools/.venv"

- name: "[archlinux] Python language: ensure symlinks"
  ansible.builtin.file:
    src: ~/data/apps/lang-tools/{{ item.dir }}/.venv/bin/{{ item.bin }}
    dest: ~/bin/{{ item.bin }}
    state: link
  loop:
    - { dir: python-tools, bin: cookiecutter }
    - { dir: debugpy, bin: debugpy }
    - { dir: pylsp, bin: pylsp }

- name: "[archlinux] Python language: ensure ML dependencies"
  ansible.builtin.pip:
    name:
      - pip
      - torch
      - numpy
    executable: "{{ ansible_facts.env.HOME }}/bin/ansible-firejail-pip"
    state: present
  environment:
    PYENV_VERSION: "{{ python_ml_version }}"
    ANSIBLE_FIREJAIL_PIP_VENV: "{{ ansible_facts.env.HOME }}/data/apps/lang-tools/ml-tools/.venv"
  timeout: 0
