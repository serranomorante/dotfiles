---
- name: "[{{ update_diff_capture_scope | default('ansible-pip') }}] pip update diffs: validate variables"
  ansible.builtin.assert:
    that:
      - update_diff_pip_venv is defined
      - update_diff_pip_packages is defined
      - update_diff_pip_executable is defined
    quiet: true

- name: "[{{ update_diff_capture_scope | default('ansible-pip') }}] update diffs: install helper scripts once"
  ansible.builtin.include_tasks: install.yml
  when: not update_diff_capture_helpers_installed | default(false)

- name: "[{{ update_diff_capture_scope | default('ansible-pip') }}] pip update diffs: read versions before install"
  ansible.builtin.command:
    argv:
      - "{{ update_diff_capture_script }}"
      - pip-version
      - --venv
      - "{{ update_diff_pip_venv }}"
      - --name
      - "{{ item.lookup_name | default(item.name | regex_replace('\\[.*\\]$', '')) }}"
      - --pip-executable
      - "{{ update_diff_pip_executable }}"
  environment: "{{ update_diff_pip_environment | default({}) | combine({'ANSIBLE_FIREJAIL_PIP_VENV': update_diff_pip_venv}) }}"
  loop: "{{ update_diff_pip_packages }}"
  loop_control:
    label: "{{ item.lookup_name | default(item.name | regex_replace('\\[.*\\]$', '')) }}"
  changed_when: false
  register: update_diff_pip_package_versions_before

- name: "[{{ update_diff_capture_scope | default('ansible-pip') }}] pip update diffs: ensure packages"
  ansible.builtin.pip:
    name: "{{ item.name }}{% if item.version is defined %}=={{ item.version }}{% endif %}"
    executable: "{{ update_diff_pip_executable }}"
    state: "{{ item.state | default(update_diff_pip_state | default('present')) }}"
  environment: "{{ update_diff_pip_environment | default({}) | combine({'ANSIBLE_FIREJAIL_PIP_VENV': update_diff_pip_venv}) }}"
  loop: "{{ update_diff_pip_packages }}"
  loop_control:
    extended: true
    label: "{{ item.lookup_name | default(item.name | regex_replace('\\[.*\\]$', '')) }}"
  register: update_diff_pip_package_installs

- name: "[{{ update_diff_capture_scope | default('ansible-pip') }}] pip update diffs: read versions after install"
  ansible.builtin.command:
    argv:
      - "{{ update_diff_capture_script }}"
      - pip-version
      - --venv
      - "{{ update_diff_pip_venv }}"
      - --name
      - "{{ item.lookup_name | default(item.name | regex_replace('\\[.*\\]$', '')) }}"
      - --pip-executable
      - "{{ update_diff_pip_executable }}"
  environment: "{{ update_diff_pip_environment | default({}) | combine({'ANSIBLE_FIREJAIL_PIP_VENV': update_diff_pip_venv}) }}"
  loop: "{{ update_diff_pip_package_installs.results | map(attribute='item') | list }}"
  loop_control:
    label: "{{ item.lookup_name | default(item.name | regex_replace('\\[.*\\]$', '')) }}"
  changed_when: false
  register: update_diff_pip_package_versions_after

- name: "[{{ update_diff_capture_scope | default('ansible-pip') }}] pip update diffs: archive observed package diffs"
  ansible.builtin.command:
    argv: >-
      {{
        [
          update_diff_capture_script,
          'pip',
          '--state-dir',
          update_diff_capture_state_dir,
          '--scope',
          update_diff_capture_scope | default('ansible-pip'),
          '--venv',
          update_diff_pip_venv,
          '--name',
          item.item.lookup_name | default(item.item.name | regex_replace('\\[.*\\]$', '')),
          '--to',
          item.stdout,
          '--pip-executable',
          update_diff_pip_executable
        ]
        + (
          (update_diff_pip_package_versions_before.results[ansible_loop.index0].stdout | default('') | length > 0)
          | ternary(['--from', update_diff_pip_package_versions_before.results[ansible_loop.index0].stdout], ['--from-absent'])
        )
      }}
  environment: "{{ update_diff_pip_environment | default({}) | combine({'ANSIBLE_FIREJAIL_PIP_VENV': update_diff_pip_venv}) }}"
  loop: "{{ update_diff_pip_package_versions_after.results }}"
  loop_control:
    extended: true
    label: "{{ item.item.lookup_name | default(item.item.name | regex_replace('\\[.*\\]$', '')) }} -> {{ item.stdout | default('') }}"
  when:
    - update_diff_capture_enabled | bool
    - not update_diff_pip_package_installs.results[ansible_loop.index0].skipped | default(false)
    - not update_diff_pip_package_installs.results[ansible_loop.index0].failed | default(false)
    - item.stdout | default('') | length > 0
    - (update_diff_pip_package_versions_before.results[ansible_loop.index0].stdout | default('')) != (item.stdout | default(''))
  changed_when: false

- name: "[{{ update_diff_capture_scope | default('ansible-pip') }}] pip update diffs: record package markers"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: record
  vars:
    dotfiles_marker_name: "pip-{{ update_diff_capture_scope | default('ansible-pip') }}-{{ item.item.name }}-{{ item.item.version }}"
    dotfiles_marker_content: "{{ item.item.name }}=={{ item.item.version }}\n"
  loop: "{{ update_diff_pip_package_installs.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - item.item.version is defined
    - not item.skipped | default(false)
    - not item.failed | default(false)
