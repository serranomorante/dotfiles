[signal_show_clipboard_history]

[signal_toggle_stt_dictation]

[signal_cancel_stt_dictation]

[signal_repair_display]

[signal_toggle_display_layout]

[signal_open_present_window]

[signal_toggle_present_window]

[signal_open_kitty_dmenu]

[signal_open_kitty_dmenu_recents]

[meta+shift]
# Fix conflict with dwm shortcut (to close window)
c = M-S-c
f11 = command(/usr/local/bin/run_as_user -u {{ ansible_facts.env.USER }} {{ ansible_facts.env.HOME }}/bin/internal-backlight down)
f12 = command(/usr/local/bin/run_as_user -u {{ ansible_facts.env.USER }} {{ ansible_facts.env.HOME }}/bin/internal-backlight up)
o = layer(signal_type_from_clipboard)
enter = command(/usr/local/bin/run_as_user -u {{ ansible_facts.env.USER }} systemd-run --user {{ ansible_facts.env.HOME }}/bin/kitty)

[meta+control]
# Fix conflict with dwm shortcut (to focus master)
# Use `... > /tmp/logfile 2>&1` to debug any issues
space = macro(leftalt+rightalt 50ms leftmeta+leftcontrol+space 50ms leftmeta+m 50ms leftmeta+f)

[signal_open_warpd_overlay]

[signal_toggle_warpd_last_location]

[signal_enter_mouseless_mode]

[signal_escape]

[tab_as_modifier]
f = layer(signal_open_warpd_overlay)
g = layer(signal_toggle_warpd_last_location)
d = layer(signal_toggle_stt_dictation)
' = oneshot(vim_register_paste)
# Simulate readline shortcuts
i = toggle(readline)
m = toggle(midi)
# keyd-observer closes any active warpd hint first, then mouseless receives
# this keymap and enables mouse layer.
space = layer(signal_enter_mouseless_mode)

