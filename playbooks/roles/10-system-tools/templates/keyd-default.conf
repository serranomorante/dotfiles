# Compose key sequences via ydotool key (keycodes from /usr/include/linux/input-event-codes.h)
# KEY_COMPOSE=127 KEY_APOSTROPHE=40 KEY_GRAVE=41 KEY_LEFTSHIFT=42 KEY_EQUAL=13
# KEY_A=30 KEY_E=18 KEY_I=23 KEY_O=24 KEY_U=22 KEY_N=49 KEY_1=2 KEY_SLASH=53
{% set ydotool = "YDOTOOL_SOCKET=/run/user/" ~ ansible_user_uid ~ "/.ydotool_socket ydotool key" %}
{% set compose_acute = "127:1 127:0 40:1 40:0" %}
{% set compose_tilde = "127:1 127:0 42:1 41:1 41:0 42:0" %}
{% set shift = "42:1" %}
{% set unshift = "42:0" %}

[spanish]
# Compose + ' + <key> → accented lowercase
a = command({{ ydotool }} {{ compose_acute }} 30:1 30:0)
e = command({{ ydotool }} {{ compose_acute }} 18:1 18:0)
i = command({{ ydotool }} {{ compose_acute }} 23:1 23:0)
o = command({{ ydotool }} {{ compose_acute }} 24:1 24:0)
u = command({{ ydotool }} {{ compose_acute }} 22:1 22:0)
# Compose + ~ + n → ñ
n = command({{ ydotool }} {{ compose_tilde }} 49:1 49:0)

[spanish_upper]
# Compose + ' + Shift+<key> → accented uppercase
# Triggered via ctrl+shift+space (no shift held, so compose sequences work cleanly)
a = command({{ ydotool }} {{ compose_acute }} {{ shift }} 30:1 30:0 {{ unshift }})
e = command({{ ydotool }} {{ compose_acute }} {{ shift }} 18:1 18:0 {{ unshift }})
i = command({{ ydotool }} {{ compose_acute }} {{ shift }} 23:1 23:0 {{ unshift }})
o = command({{ ydotool }} {{ compose_acute }} {{ shift }} 24:1 24:0 {{ unshift }})
u = command({{ ydotool }} {{ compose_acute }} {{ shift }} 22:1 22:0 {{ unshift }})
# Compose + ~ + Shift+N → Ñ
n = command({{ ydotool }} {{ compose_tilde }} {{ shift }} 49:1 49:0 {{ unshift }})
# Compose + ! + ! → ¡ (Shift+1 = !)
1 = command({{ ydotool }} 127:1 127:0 {{ shift }} 2:1 2:0 {{ unshift }} {{ shift }} 2:1 2:0 {{ unshift }})
# Compose + = + e → €
4 = command({{ ydotool }} 127:1 127:0 13:1 13:0 18:1 18:0)
# Compose + ? + ? → ¿ (Shift+/ = ?)
/ = command({{ ydotool }} 127:1 127:0 {{ shift }} 53:1 53:0 {{ unshift }} {{ shift }} 53:1 53:0 {{ unshift }})
