---
debian_stow_version: 2.4.1
macos_stow_version: 2.4.1
dotfiles_stow_options:
  - --dotfiles
  - --no-folding
dotfiles_stow_ignore_patterns:
  - \.codex
  - \.claude
dotfiles_stow_wrapper_path: "{{ ansible_facts.env.HOME }}/bin/dotfiles-stow"
dotfiles_public_stow_packages:
  - dunst
  - lazygit
  - nvim
  - peripherals
  - audio
  - playbooks
  - systemd
  - home
  - utilities
  - term
  - PKM
dotfiles_private_stow_packages:
  - for-my-eyes-only
dotfiles_otherlinux_stow_packages:
  - termux
dotfiles_agent_context_source_name: AGENTS.md
dotfiles_agent_context_symlink_names:
  - CLAUDE.md
  - GEMINI.md
dotfiles_private_agent_context_doc_paths:
  - docs/agent-context.md
debian_fzf_version: 0.55.0
debian_rg_version: 14.0.3
debian_fd_version: 10.1.0
arch_davinci_resolve_version: "20.3.2"
qt5_webengine_version: 5.15.19-4.1
davinci_resolve_blackmagic_email_keyring:
  folder: creative-tools
  passkey: davinci-resolve-blackmagic-email
  wallet: kdewallet
davinci_resolve_blackmagic_password_keyring:
  folder: creative-tools
  passkey: davinci-resolve-blackmagic-pass
  wallet: kdewallet
arch_yay_version: HEAD
arch_nvidia_libs_version: 0.8.5
arch_mouseless_click_version: 0.4.2
arch_wine_staging_version: "9.21"
arch_dwm_version: HEAD
arch_docker_credential_helpers_version: 0.9.5
wine_path: "{{ ansible_facts.env.HOME }}/data/apps/virt-tools/wine-{{ arch_wine_staging_version }}-staging-tkg-amd64/wine-{{ arch_wine_staging_version }}-staging-tkg-amd64"
arch_mypaint_version: 2.1.0-alpha-400-g90b36db-2021-05-04_18.41
arch_stt_vosk_models:
  - language: es
    name: vosk-model-small-es-0.42
    url: https://alphacephei.com/vosk/models/vosk-model-small-es-0.42.zip
    archive_path: "{{ ansible_facts.env.HOME }}/data/apps/audio-tools/vosk/vosk-model-small-es-0.42.zip"
    parent_dir: "{{ ansible_facts.env.HOME }}/.local/share/vosk"
    model_dir: "{{ ansible_facts.env.HOME }}/.local/share/vosk/vosk-model-small-es-0.42"
  - language: en
    name: vosk-model-small-en-us-0.15
    url: https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip
    archive_path: "{{ ansible_facts.env.HOME }}/data/apps/audio-tools/vosk/vosk-model-small-en-us-0.15.zip"
    parent_dir: "{{ ansible_facts.env.HOME }}/.local/share/vosk"
    model_dir: "{{ ansible_facts.env.HOME }}/.local/share/vosk/vosk-model-small-en-us-0.15"
arch_stt_dictation_project_path: "{{ ansible_facts.env.HOME }}/data/apps/audio-tools/stt-dictation"

arch_gather_wine_setup:
  version: 1.32.0
  backup_path: ~/Downloads
  wine_prefix: "{{ ansible_facts.env.HOME }}/data/.wine-win64-gather-town"

arch_ytmdesktop_wine_setup:
  version: 2.0.10
  backup_path: ~/Downloads
  wine_prefix: "{{ ansible_facts.env.HOME }}/data/.wine-win64-ytmdesktop"

arch_wine_prefixes:
  - "{{ arch_reaper_wine_setup }}"
  - wine_prefix: "{{ arch_synthv_wine_prefix }}"
    architecture: win64
  - "{{ arch_gather_wine_setup }}"

arch_ansible_long_retries_config:
  delay_n: 5
  retries_n: 10000

wine_env_vars:
  WINEVERPATH: "{{ wine_path }}"
  WINELOADER: "{{ wine_path }}/bin/wine"
  WINESERVER: "{{ wine_path }}/bin/wineserver"
  WINEDLLPATH: "{{ wine_path }}/lib/wine/x86_64-windows:{{ wine_path }}/lib/wine/i386-windows"
  LD_LIBRARY_PATH: "{{ wine_path }}/lib/wine/x86_64-unix:{{ wine_path }}/lib/wine/i386-unix"
  PATH: "{{ wine_path }}/bin/:{{ ansible_facts.env.PATH }}"
  WINEFSYNC: 1
