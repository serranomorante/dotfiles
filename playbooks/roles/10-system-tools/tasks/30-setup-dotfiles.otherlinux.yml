---
- name: "[otherlinux] Dotfiles: check missing dotfile support packages"
  ansible.builtin.command:
    argv:
      - sh
      - -c
      - |
        for package do
          status=$(dpkg-query -W -f='${Status}' "$package" 2>/dev/null || true)
          if [ "$status" != "install ok installed" ]; then
            printf '%s\n' "$package"
          fi
        done
      - sh
      - stow
      - jq
  register: var_otherlinux_dotfiles_missing_packages
  changed_when: false

- name: "[otherlinux] Dotfiles: install missing dotfile support packages"
  ansible.builtin.command:
    argv: "{{ ['pkg', 'install', '-y'] + var_otherlinux_dotfiles_missing_packages.stdout_lines }}"
  changed_when: true
  when: var_otherlinux_dotfiles_missing_packages.stdout_lines | length > 0

- name: "[otherlinux] Dotfiles: sync stow packages from controller"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../{{ item }}/"
    dest: "{{ ansible_facts.env.HOME }}/dotfiles/{{ item }}/"
    mode: preserve
  loop: "{{ dotfiles_otherlinux_stow_packages }}"

- name: "[otherlinux] Dotfiles: ensure PKM helper directory"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/dotfiles/PKM/bin"
    state: directory
    mode: "700"

- name: "[otherlinux] Dotfiles: install Remind agenda helper"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../PKM/bin/remind-agenda"
    dest: "{{ ansible_facts.env.HOME }}/dotfiles/PKM/bin/remind-agenda"
    mode: "700"

- name: "[otherlinux] Dotfiles: ensure Termux widget task directory"
  ansible.builtin.file:
    path: ~/.shortcuts/tasks
    state: directory
    mode: "700"

- name: "[otherlinux] Dotfiles: install Termux widget task scripts"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ ansible_facts.env.HOME }}/.shortcuts/tasks/{{ item | basename }}"
    mode: "700"
  loop: "{{ lookup('ansible.builtin.fileglob', playbook_dir + '/../termux/dot-shortcuts/tasks/*', wantlist=True) }}"
