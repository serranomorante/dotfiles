---
- name: "[archlinux] Automation utilities: ensure packages"
  become: true
  ansible.builtin.pacman:
    state: present
    name:
      - perl # needed to build xdotool
      - ydotool

- name: "[archlinux] Automation utilities: ensure ydotoold service"
  ansible.builtin.systemd_service:
    scope: user
    name: ydotool.service
    enabled: true
    masked: false

- name: "[archlinux] Automation utilities: ensure xdotool"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/10-system-tools/tasks/install-local-aur-packages.archlinux.yml"
  vars:
    aur_local_packages: xdotool-git
