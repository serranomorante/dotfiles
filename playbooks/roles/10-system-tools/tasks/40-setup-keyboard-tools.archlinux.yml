---
- name: "[archlinux] Keyboard peripheral: ensure keyd is present"
  become: true
  ansible.builtin.package:
    state: present
    name: python-xlib
  notify: handler_enable_start_keyd_application_mapper_service

- name: "[archlinux] Keyboard peripheral: ensure local AUR packages"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/10-system-tools/tasks/install-local-aur-packages.archlinux.yml"
  vars:
    aur_local_packages:
      - websockify
      - novnc

- name: "[archlinux] Keyboard peripheral: ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      # keyboard-midi-controller dependencies
      - alsa-lib
      - pipewire-jack
      # warpd dependencies
      - libxi
      - libxinerama
      - libxft
      - libxext
      - libxfixes
      - libxtst
      - libx11
      - libxkbcommon
      # present-window serves selected X11 windows through x11vnc and noVNC.
      - x11vnc

- name: "[archlinux] Keyboard peripheral: inspect keyd remote commit"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/dotfiles/utilities/bin/dotfiles-github-git"
      - ls-remote
      - https://github.com/rvaiya/keyd
      - refs/heads/master
  register: var_keyd_remote_commit
  changed_when: false

- name: "[archlinux] Keyboard peripheral: set keyd build marker fact"
  ansible.builtin.set_fact:
    keyd_build_marker: "keyd-{{ var_keyd_remote_commit.stdout.split()[0] }}-midi-layers-v1"

- name: "[archlinux] Keyboard peripheral: stat keyd build marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: check
  vars:
    dotfiles_marker_name: "{{ keyd_build_marker }}"
    dotfiles_marker_register: var_keyd_build_marker

- name: "[archlinux] Keyboard peripheral: clean keyd checkout for new remote commit"
  become: true
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/data/repos/keyd"
    state: absent
  when: not var_keyd_build_marker.stat.exists

- name: "[archlinux] Keyboard peripheral: clone keyd"
  ansible.builtin.git:
    repo: https://github.com/rvaiya/keyd
    executable: "{{ ansible_facts.env.HOME }}/dotfiles/utilities/bin/dotfiles-github-git"
    dest: "{{ ansible_facts.env.HOME }}/data/repos/keyd"
    version: "{{ var_keyd_remote_commit.stdout.split()[0] }}"
    depth: 100
    force: true
  when: not var_keyd_build_marker.stat.exists

- name: "[archlinux] Keyboard peripheral: patch keyd"
  ansible.posix.patch:
    src: ~/dotfiles/assets/patches/keyd/{{ item }}
    basedir: ~/data/repos/keyd
    strip: 1
  loop:
    - dwm-support-keyd-application-mapper.patch
    - increase-max-layers-for-midi.patch
  when: not var_keyd_build_marker.stat.exists

- name: "[archlinux] Keyboard peripheral: install keyd"
  become: true
  ansible.builtin.shell: >
    set -o pipefail &&
    make &&
    make install
  args:
    chdir: "{{ ansible_facts.env.HOME }}/data/repos/keyd"
  when: not var_keyd_build_marker.stat.exists
  notify: "10-system-tools : handler_ensure_keyd_service"

- name: "[archlinux] Keyboard peripheral: record keyd build marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: record
  vars:
    dotfiles_marker_name: "{{ keyd_build_marker }}"
    dotfiles_marker_content: "{{ var_keyd_remote_commit.stdout.split()[0] }}\n"
  when: not var_keyd_build_marker.stat.exists

- name: "[archlinux] Keyboard peripheral: setup run as user script"
  become: true
  ansible.builtin.template:
    src: run_as_user
    dest: /usr/local/bin/run_as_user
    mode: "755"

- name: "[archlinux] Keyboard peripheral: setup keyd default.conf"
  become: true
  ansible.builtin.template:
    src: keyd-default.conf
    dest: /etc/keyd/default.conf
    mode: "644"
  register: var_keyd_conf
  notify:
    - "10-system-tools : handler_ensure_keyd_service"
    - "10-system-tools : handler_restart_keyd"

- name: "[archlinux] Keyboard peripheral: check keyd conf"
  ansible.builtin.command: keyd check
  changed_when: true
  when: var_keyd_conf.changed

- name: "[archlinux] Keyboard peripheral: enable services"
  ansible.builtin.systemd_service:
    scope: user
    name: "{{ item }}"
    enabled: true
    masked: false
  loop:
    - kbdrate.service
    - keyd-observer.service
    - keyboard-midi-controller.service
    - warpd-marker.service
    - mode-osd.service

- name: "[archlinux] Keyboard peripheral: stat keyd observer script"
  ansible.builtin.stat:
    path: ~/dotfiles/peripherals/bin/keyd-observer
    checksum_algorithm: sha256
  register: var_arch_keyd_observer_script

- name: "[archlinux] Keyboard peripheral: record applied keyd observer checksum"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: record
  vars:
    dotfiles_marker_name: keyd-observer-sha256
    dotfiles_marker_content: "{{ var_arch_keyd_observer_script.stat.checksum }}\n"
    dotfiles_marker_notify:
      - "10-system-tools : handler_restart_keyd_observer_service"
  when: var_arch_keyd_observer_script.stat.exists

- name: "[archlinux] Keyboard peripheral: ensure X11 helper cache dirs"
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.cache/{{ item }}"
    state: directory
    mode: "755"
  loop:
    - warpd-marker
    - warpd-trail
    - mode-osd

- name: "[archlinux] Keyboard peripheral: compile warpd marker X11 helper"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/bin/warpd-marker"
      - --compile-cache
  register: var_warpd_marker_compile_cache
  changed_when: "'compiled' in var_warpd_marker_compile_cache.stdout_lines"
  notify: "10-system-tools : handler_restart_warpd_marker_service"

- name: "[archlinux] Keyboard peripheral: compile warpd trail X11 helper"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/bin/warpd-trail"
      - --compile-cache
  register: var_warpd_trail_compile_cache
  changed_when: "'compiled' in var_warpd_trail_compile_cache.stdout_lines"

- name: "[archlinux] Keyboard peripheral: compile mode OSD X11 helper"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/bin/mode-osd"
      - --compile-cache
  register: var_mode_osd_compile_cache
  changed_when: "'compiled' in var_mode_osd_compile_cache.stdout_lines"
  notify: "10-system-tools : handler_restart_mode_osd_service"

- name: "[archlinux] Keyboard peripheral: compile keyboard MIDI controller"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/bin/keyboard-midi-controller"
      - --compile-cache
  register: var_keyboard_midi_controller_compile_cache
  changed_when: "'compiled' in var_keyboard_midi_controller_compile_cache.stdout_lines"

- name: "[archlinux] Keyboard peripheral: check running keyboard MIDI controller cache"
  ansible.builtin.shell: >
    set -eu &&
    binary="{{ ansible_facts.env.HOME }}/.cache/dotfiles/keyboard-midi-controller/keyboard-midi-controller" &&
    pid="$(systemctl --user show keyboard-midi-controller.service --property=MainPID --value 2>/dev/null || true)" &&
    if [ -z "$pid" ] || [ "$pid" = 0 ] || [ ! -e "/proc/$pid/exe" ] || [ ! -x "$binary" ]; then
      printf 'restart\n';
      exit 0;
    fi &&
    running_inode="$(stat -Lc '%d:%i' "/proc/$pid/exe" 2>/dev/null || true)" &&
    cached_inode="$(stat -Lc '%d:%i' "$binary" 2>/dev/null || true)" &&
    if [ "$running_inode" != "$cached_inode" ]; then
      printf 'restart\n';
    else
      printf 'ok\n';
    fi
  args:
    executable: /bin/bash
  register: var_keyboard_midi_controller_running_cache
  changed_when: "'restart' in var_keyboard_midi_controller_running_cache.stdout_lines"

- name: "[archlinux] Keyboard peripheral: restart keyboard MIDI controller after cache refresh"
  ansible.builtin.systemd_service:
    scope: user
    name: keyboard-midi-controller.service
    state: restarted
    enabled: true
    masked: false
    daemon_reload: true
  when: var_keyboard_midi_controller_compile_cache.changed or var_keyboard_midi_controller_running_cache.changed

- name: "[archlinux] Keyboard peripheral: ensure xinput dir"
  become: true
  ansible.builtin.file:
    state: directory
    path: "{{ item }}"
    mode: "755"
  loop:
    - /etc/X11
    - /etc/X11/xinit
    - /etc/X11/xinit/xinput.d

- name: "[archlinux] Keyboard peripheral: copy sudo files"
  become: true
  ansible.builtin.template:
    src: "{{ item.source }}"
    dest: "{{ item.dest }}"
    owner: root
    mode: "644"
  loop:
    - { source: ~/dotfiles/assets/udev-rules/99-kbdrate.rules, dest: /etc/udev/rules.d/99-kbdrate.rules }
    - { source: ~/dotfiles/assets/udev-rules/99-disable-internal-keyboard.rules, dest: /etc/udev/rules.d/99-disable-internal-keyboard.rules }
    - { source: ~/dotfiles/assets/other/composekey_xim, dest: /etc/X11/xinit/xinput.d/xim }

- name: "[archlinux] Keyboard peripheral: create symlink"
  become: true
  ansible.builtin.file:
    src: /etc/X11/xinit/xinput.d/xim
    dest: /etc/X11/xinit/xinput.d/en_US.UTF-8
    state: link

- name: "[archlinux] Keyboard peripheral: create another symlink"
  ansible.builtin.file:
    src: /usr/share/X11/locale/en_US.UTF-8/Compose
    dest: ~/.XCompose
    state: link

- name: "[archlinux] Keyboard peripheral: prepare readline-mode-notify script"
  become: true
  ansible.builtin.template:
    src: "{{ ansible_facts.env.HOME }}/dotfiles/assets/scripts/keyd/readline-mode-watcher.sh"
    dest: /usr/local/bin/readline-mode-watcher.sh
    mode: "755"
  notify:
    - "10-system-tools : handler_reset_failed_readline_mode_notify_service"
    - "10-system-tools : handler_ensure_readline_mode_notify_service"

- name: "[archlinux] Keyboard peripheral: setup services"
  become: true
  ansible.builtin.template:
    src: "{{ ansible_facts.env.HOME }}/dotfiles/assets/services/{{ item }}"
    dest: /etc/systemd/system/{{ item }}
    owner: root
    mode: "644"
  loop:
    - readline-mode-notify.service
  notify:
    - "10-system-tools : handler_reset_failed_readline_mode_notify_service"
    - "10-system-tools : handler_ensure_readline_mode_notify_service"

- name: "[archlinux] Keyboard peripheral: clone mouseless"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: git
  vars:
    update_diff_capture_scope: keyboard-tools
    update_diff_git_repo: https://github.com/jbensmann/mouseless
    update_diff_git_dest: "{{ ansible_facts.env.HOME }}/data/repos/mouseless"
    update_diff_git_version: main
    update_diff_git_single_branch: true
    update_diff_git_depth: 1
  register: var_mouseless_clone

- name: "[archlinux] Keyboard peripheral: queue mouseless handlers"
  ansible.builtin.debug:
    msg: mouseless checkout changed
  changed_when: true
  when: var_mouseless_clone.changed | default(false)
  notify:
    - "10-system-tools : handler_build_mouseless"
    - "10-system-tools : handler_ensure_mouseless_udev_rules"
    - "10-system-tools : handler_link_mouseless_binary"

- name: flush_handlers
  ansible.builtin.meta: flush_handlers

- name: "[archlinux] Keyboard peripheral: inspect warpd remote commit"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/dotfiles/utilities/bin/dotfiles-github-git"
      - ls-remote
      - https://github.com/rvaiya/warpd
      - refs/heads/master
  register: var_warpd_remote_commit
  changed_when: false

- name: "[archlinux] Keyboard peripheral: set warpd build marker fact"
  ansible.builtin.set_fact:
    warpd_build_marker: "warpd-{{ var_warpd_remote_commit.stdout.split()[0] }}-patch-stack-v1"

- name: "[archlinux] Keyboard peripheral: stat warpd build marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: check
  vars:
    dotfiles_marker_name: "{{ warpd_build_marker }}"
    dotfiles_marker_register: var_warpd_build_marker

- name: "[archlinux] Keyboard peripheral: clean warpd checkout for new remote commit"
  become: true
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/data/repos/warpd"
    state: absent
  when: not var_warpd_build_marker.stat.exists

- name: "[archlinux] Keyboard peripheral: clone warpd"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: git
  vars:
    update_diff_capture_scope: keyboard-tools
    update_diff_git_repo: https://github.com/rvaiya/warpd
    update_diff_git_dest: "{{ ansible_facts.env.HOME }}/data/repos/warpd"
    update_diff_git_version: "{{ var_warpd_remote_commit.stdout.split()[0] }}"
    update_diff_git_force: true
    update_diff_git_single_branch: true
    update_diff_git_depth: 1
  when: not var_warpd_build_marker.stat.exists

- name: "[archlinux] Keyboard peripheral: patch warpd"
  ansible.posix.patch:
    src: ~/dotfiles/assets/patches/warpd/{{ item }}
    basedir: ~/data/repos/warpd
    strip: 1
  loop:
    - horizontal_scroll.patch
    - typo.patch
  when: not var_warpd_build_marker.stat.exists

- name: "[archlinux] Keyboard peripheral: install warpd"
  become: true
  ansible.builtin.shell: make && make install
  environment:
    DISABLE_WAYLAND: "true"
  args:
    chdir: "{{ ansible_facts.env.HOME }}/data/repos/warpd"
  when: not var_warpd_build_marker.stat.exists

- name: "[archlinux] Keyboard peripheral: record warpd build marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: record
  vars:
    dotfiles_marker_name: "{{ warpd_build_marker }}"
    dotfiles_marker_content: "{{ var_warpd_remote_commit.stdout.split()[0] }}\n"
  when: not var_warpd_build_marker.stat.exists

- name: "[archlinux] Keyboard peripheral: stop retired cursor indicator services"
  ansible.builtin.command:
    argv:
      - systemctl
      - --user
      - stop
      - "{{ item }}"
  loop:
    - cursor_indicator@red.service
    - cursor_indicator@blue.service
    - cursor_indicator@green.service
  register: var_stop_retired_cursor_indicator_services
  changed_when: var_stop_retired_cursor_indicator_services.rc == 0
  failed_when: false

- name: "[archlinux] Keyboard peripheral: remove retired cursor indicator files"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - ~/.config/systemd/user/cursor_indicator@.service
    - ~/bin/cursor_indicator
    - ~/data/repos/cursor_indicator
  notify: "10-system-tools : handler_reload_user_systemd"

- name: "[archlinux] Keyboard peripheral: add user to keyd group"
  become: true
  ansible.builtin.user:
    append: true
    groups: keyd
    name: "{{ ansible_facts.env.USER }}"

- name: flush_handlers
  ansible.builtin.meta: flush_handlers
