---
- name: "[archlinux] Dotfiles: ensure local AUR packages"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/10-system-tools/tasks/install-local-aur-packages.archlinux.yml"
  vars:
    aur_local_packages: downgrade

- name: "[archlinux] Dotfiles: ensure package dependencies"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - git
      - go
      - rsync
      - stow

- name: "[archlinux] Dotfiles: download dotfiles"
  ansible.builtin.git:
    repo: https://github.com/serranomorante/dotfiles.git
    dest: ~/dotfiles
    recursive: false
    force: true
    depth: 1
    version: main
  when: inventory_hostname != 'localhost'

- name: "[archlinux] Dotfiles: stat local private dotfiles"
  delegate_to: localhost
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../for-my-eyes-only"
  register: var_arch_local_private_dotfiles
  when: inventory_hostname != 'localhost'

- name: "[archlinux] Dotfiles: ensure remote private dotfiles dir"
  ansible.builtin.file:
    path: ~/dotfiles/for-my-eyes-only
    state: directory
    mode: "755"
  when:
    - inventory_hostname != 'localhost'
    - var_arch_local_private_dotfiles.stat.exists

- name: "[archlinux] Dotfiles: sync private dotfiles from controller"
  delegate_to: localhost
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../for-my-eyes-only/"
    dest: "{{ ansible_facts.env.HOME }}/dotfiles/for-my-eyes-only/"
    delete: true
    rsync_opts:
      - "--exclude=.git"
  when:
    - inventory_hostname != 'localhost'
    - var_arch_local_private_dotfiles.stat.exists

- name: "[archlinux] Dotfiles: list problematic regular files"
  ansible.builtin.command:
    argv:
      - bash
      - -c
      - |
        for path in "$@"; do
          expanded="${path/#\~/$HOME}"
          if [ -e "$expanded" ] && [ ! -L "$expanded" ]; then
            printf '%s\n' "$expanded"
          fi
        done
      - bash
      - ~/.config/gromit-mpx.ini
      - ~/.config/mimeapps.list
      - ~/.config/ksplashrc
      - ~/.config/kscreenlockerrc
      - ~/.config/ktrashrc
      - ~/.config/kiorc
      - ~/.config/kded5rc
      - ~/.config/kwalletrc
      - ~/.config/baloofilerc
      - ~/.config/kdedefaults/kdeglobals
      - ~/.config/kdedefaults/ksplashrc
      - ~/.config/kglobalshortcutsrc
      - ~/.config/plasma-org.kde.plasma.desktop-appletsrc
      - ~/.config/mouseless/config.yaml
      - ~/.config/qBittorrent/categories.json
      - ~/.bash_profile
      - ~/.bashrc
      - ~/.blerc
      - ~/.local/share/applications/wine-protocol-dreamtonics-svstudio2.desktop
  register: var_arch_problematic_files
  changed_when: false

- name: "[archlinux] Dotfiles: remove problematic files"
  ansible.builtin.file:
    state: absent
    path: "{{ item }}"
  loop: "{{ var_arch_problematic_files.stdout_lines }}"

- name: "[archlinux] Setup browser tools: setup ktrashrc"
  ansible.builtin.template:
    src: ktrashrc
    dest: ~/.config/
    mode: "644"

- name: "[archlinux] Dotfiles: stat private stow packages"
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/dotfiles/{{ item }}"
  register: var_arch_private_dotfiles
  loop: "{{ dotfiles_private_stow_packages }}"

- name: "[archlinux] Dotfiles: apply stow public packages"
  ansible.builtin.command:
    argv: "{{ [dotfiles_stow_wrapper_path] + dotfiles_public_stow_packages }}"
  changed_when: false

- name: "[archlinux] Dotfiles: apply stow private package"
  ansible.builtin.command:
    argv: "{{ [dotfiles_stow_wrapper_path] + (var_arch_private_dotfiles.results | selectattr('stat.isdir', 'defined') | selectattr('stat.isdir') | map(attribute='item') | list) }}"
  changed_when: false
  when: >-
    (
      var_arch_private_dotfiles.results
      | selectattr('stat.isdir', 'defined')
      | selectattr('stat.isdir')
      | list
      | length
    ) > 0

- name: "[archlinux] Dotfiles: ensure feh wallpaper service"
  ansible.builtin.systemd_service:
    scope: user
    name: feh.service
    enabled: true
    masked: false
    state: started
    daemon_reload: true

- name: "[archlinux] Dotfiles: stat KDE global shortcuts"
  ansible.builtin.stat:
    path: ~/dotfiles/utilities/dot-config/kglobalshortcutsrc
    checksum_algorithm: sha256
  register: var_arch_kglobalshortcutsrc

- name: "[archlinux] Dotfiles: ensure KDE state marker directory"
  ansible.builtin.file:
    path: ~/.local/state/dotfiles
    state: directory
    mode: "755"

- name: "[archlinux] Dotfiles: record applied KDE global shortcuts checksum"
  ansible.builtin.copy:
    content: "{{ var_arch_kglobalshortcutsrc.stat.checksum }}\n"
    dest: ~/.local/state/dotfiles/kglobalshortcutsrc.sha256
    mode: "644"
  when: var_arch_kglobalshortcutsrc.stat.exists
  notify: "10-system-tools : handler_restart_kglobalaccel_service"

- name: "[archlinux] Dotfiles: stat Plasma clipboard service"
  ansible.builtin.stat:
    path: ~/dotfiles/utilities/dot-config/systemd/user/plasma-clipboard.service
    checksum_algorithm: sha256
  register: var_arch_plasma_clipboard_service

- name: "[archlinux] Dotfiles: ensure Plasma clipboard service"
  ansible.builtin.systemd_service:
    scope: user
    name: plasma-clipboard.service
    enabled: true
    masked: false
    state: started
    daemon_reload: true

- name: "[archlinux] Dotfiles: record applied Plasma clipboard service checksum"
  ansible.builtin.copy:
    content: "{{ var_arch_plasma_clipboard_service.stat.checksum }}\n"
    dest: ~/.local/state/dotfiles/plasma-clipboard.service.sha256
    mode: "644"
  when: var_arch_plasma_clipboard_service.stat.exists
  notify: "10-system-tools : handler_restart_plasma_clipboard_service"

- name: "[archlinux] Dotfiles: compile agent session store"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/bin/agent-session-store"
      - --compile-cache
  register: var_agent_session_store_compile_cache
  changed_when: "'compiled' in var_agent_session_store_compile_cache.stdout_lines"

- name: "[archlinux] Dotfiles: ensure system health timer"
  ansible.builtin.systemd_service:
    scope: user
    name: dotfiles-health.timer
    enabled: true
    masked: false
    state: started
    daemon_reload: true

- name: "[archlinux] Dotfiles: compile system spike watcher"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/bin/system-spike-watch"
      - --compile-cache
  register: var_system_spike_watch_compile_cache
  changed_when: "'compiled' in var_system_spike_watch_compile_cache.stdout_lines"
  notify: "10-system-tools : handler_restart_system_spike_watch_service"

- name: "[archlinux] Dotfiles: compile browser task snapshot receiver"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/bin/browser-task-snapshotd"
      - --compile-cache
  register: var_browser_task_snapshotd_compile_cache
  changed_when: "'compiled' in var_browser_task_snapshotd_compile_cache.stdout_lines"
  notify: "10-system-tools : handler_restart_browser_task_snapshotd_service"

- name: "[archlinux] Dotfiles: ensure browser task snapshot receiver"
  ansible.builtin.systemd_service:
    scope: user
    name: browser-task-snapshotd.service
    enabled: true
    masked: false
    state: started
    daemon_reload: true

- name: "[archlinux] Dotfiles: ensure system spike watcher"
  ansible.builtin.systemd_service:
    scope: user
    name: system-spike-watch.service
    enabled: true
    masked: false
    state: started
    daemon_reload: true

- name: "[archlinux] Dotfiles: ensure system spike report timer"
  ansible.builtin.systemd_service:
    scope: user
    name: dotfiles-spikes.timer
    enabled: true
    masked: false
    state: started
    daemon_reload: true

- name: "[archlinux] Dotfiles: stat system spike notifier script"
  ansible.builtin.stat:
    path: ~/dotfiles/utilities/bin/system-spike-notify
    checksum_algorithm: sha256
  register: var_system_spike_notify_script

- name: "[archlinux] Dotfiles: stat system spike notifier service"
  ansible.builtin.stat:
    path: ~/dotfiles/utilities/dot-config/systemd/user/system-spike-notify.service
    checksum_algorithm: sha256
  register: var_system_spike_notify_service

- name: "[archlinux] Dotfiles: ensure system spike notifier"
  ansible.builtin.systemd_service:
    scope: user
    name: system-spike-notify.service
    enabled: true
    masked: false
    state: started
    daemon_reload: true

- name: "[archlinux] Dotfiles: record applied system spike notifier checksum"
  ansible.builtin.copy:
    content: "{{ var_system_spike_notify_script.stat.checksum }}\n{{ var_system_spike_notify_service.stat.checksum }}\n"
    dest: ~/.local/state/dotfiles/system-spike-notify.sha256
    mode: "644"
  when:
    - var_system_spike_notify_script.stat.exists
    - var_system_spike_notify_service.stat.exists
  notify: "10-system-tools : handler_restart_system_spike_notify_service"

- name: "[archlinux] Dotfiles: install laptop LAN NetworkManager dispatcher"
  become: true
  ansible.builtin.template:
    src: send-ifconfig-networkmanager-dispatcher
    dest: /etc/NetworkManager/dispatcher.d/90-send-ifconfig
    owner: root
    group: root
    mode: "755"
