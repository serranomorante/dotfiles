---
- name: "[archlinux] Dotfiles: ensure aur packages"
  become: true
  become_user: aur_builder
  kewlfft.aur.aur:
    use: yay
    state: present
    name: downgrade

- name: "[archlinux] Dotfiles: ensure stow installed"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - git
      - rsync
      - stow

- name: "[archlinux] Dotfiles: download dotfiles"
  ansible.builtin.git:
    repo: https://github.com/serranomorante/dotfiles.git
    dest: ~/dotfiles
    recursive: false
    force: true
    depth: 1
    version: main
  when: inventory_hostname != 'localhost'

- name: "[archlinux] Dotfiles: stat local private dotfiles"
  delegate_to: localhost
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../for-my-eyes-only"
  register: var_arch_local_private_dotfiles
  when: inventory_hostname != 'localhost'

- name: "[archlinux] Dotfiles: ensure remote private dotfiles dir"
  ansible.builtin.file:
    path: ~/dotfiles/for-my-eyes-only
    state: directory
    mode: "755"
  when:
    - inventory_hostname != 'localhost'
    - var_arch_local_private_dotfiles.stat.exists

- name: "[archlinux] Dotfiles: sync private dotfiles from controller"
  delegate_to: localhost
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../for-my-eyes-only/"
    dest: "{{ ansible_facts.env.HOME }}/dotfiles/for-my-eyes-only/"
    delete: true
    rsync_opts:
      - "--exclude=.git"
  when:
    - inventory_hostname != 'localhost'
    - var_arch_local_private_dotfiles.stat.exists

- name: "[archlinux] Dotfiles: stat problematic files"
  ansible.builtin.stat:
    path: "{{ item }}"
    follow: false
  register: var_arch_problematic_files
  loop:
    - ~/.config/gromit-mpx.ini
    - ~/.config/mimeapps.list
    - ~/.config/ksplashrc
    - ~/.config/kscreenlockerrc
    - ~/.config/ktrashrc
    - ~/.config/kiorc
    - ~/.config/kded5rc
    - ~/.config/kwalletrc
    - ~/.config/baloofilerc
    - ~/.config/kdedefaults/kdeglobals
    - ~/.config/kdedefaults/ksplashrc
    - ~/.config/kglobalshortcutsrc
    - ~/.config/plasma-org.kde.plasma.desktop-appletsrc
    - ~/.config/mouseless/config.yaml
    - ~/.bash_profile
    - ~/.bashrc
    - ~/.blerc
    - ~/.local/share/applications/wine-protocol-dreamtonics-svstudio2.desktop

- name: "[archlinux] Dotfiles: remove problematic files"
  ansible.builtin.file:
    state: absent
    path: "{{ item.item }}"
  loop: "{{ var_arch_problematic_files.results }}"
  when:
    - item.stat.exists
    - not item.stat.islnk

- name: "[archlinux] Setup browser tools: setup ktrashrc"
  ansible.builtin.template:
    src: ktrashrc
    dest: ~/.config/
    mode: "644"

- name: "[archlinux] Dotfiles: stat private stow package"
  ansible.builtin.stat:
    path: ~/dotfiles/for-my-eyes-only
  register: var_arch_private_dotfiles

- name: "[archlinux] Dotfiles: apply stow public packages"
  ansible.builtin.command:
    argv: "{{ [dotfiles_stow_wrapper_path] + dotfiles_public_stow_packages }}"
  changed_when: false

- name: "[archlinux] Dotfiles: apply stow private package"
  ansible.builtin.command:
    argv:
      - "{{ dotfiles_stow_wrapper_path }}"
      - for-my-eyes-only
  changed_when: false
  when: var_arch_private_dotfiles.stat.exists

- name: "[archlinux] Dotfiles: stat KDE global shortcuts"
  ansible.builtin.stat:
    path: ~/dotfiles/utilities/dot-config/kglobalshortcutsrc
    checksum_algorithm: sha256
  register: var_arch_kglobalshortcutsrc

- name: "[archlinux] Dotfiles: ensure KDE state marker directory"
  ansible.builtin.file:
    path: ~/.local/state/dotfiles
    state: directory
    mode: "755"

- name: "[archlinux] Dotfiles: record applied KDE global shortcuts checksum"
  ansible.builtin.copy:
    content: "{{ var_arch_kglobalshortcutsrc.stat.checksum }}\n"
    dest: ~/.local/state/dotfiles/kglobalshortcutsrc.sha256
    mode: "644"
  when: var_arch_kglobalshortcutsrc.stat.exists
  notify: "10-system-tools : handler_restart_kglobalaccel_service"

- name: "[archlinux] Dotfiles: stat Plasma clipboard service"
  ansible.builtin.stat:
    path: ~/dotfiles/utilities/dot-config/systemd/user/plasma-clipboard.service
    checksum_algorithm: sha256
  register: var_arch_plasma_clipboard_service

- name: "[archlinux] Dotfiles: ensure Plasma clipboard service"
  ansible.builtin.systemd_service:
    scope: user
    name: plasma-clipboard.service
    enabled: true
    masked: false
    state: started
    daemon_reload: true

- name: "[archlinux] Dotfiles: record applied Plasma clipboard service checksum"
  ansible.builtin.copy:
    content: "{{ var_arch_plasma_clipboard_service.stat.checksum }}\n"
    dest: ~/.local/state/dotfiles/plasma-clipboard.service.sha256
    mode: "644"
  when: var_arch_plasma_clipboard_service.stat.exists
  notify: "10-system-tools : handler_restart_plasma_clipboard_service"

- name: "[archlinux] Dotfiles: stat keyd observer script"
  ansible.builtin.stat:
    path: ~/dotfiles/peripherals/bin/keyd-observer
    checksum_algorithm: sha256
  register: var_arch_keyd_observer_script

- name: "[archlinux] Dotfiles: record applied keyd observer checksum"
  ansible.builtin.copy:
    content: "{{ var_arch_keyd_observer_script.stat.checksum }}\n"
    dest: ~/.local/state/dotfiles/keyd-observer.sha256
    mode: "644"
  when: var_arch_keyd_observer_script.stat.exists
  notify: "10-system-tools : handler_restart_keyd_observer_service"
