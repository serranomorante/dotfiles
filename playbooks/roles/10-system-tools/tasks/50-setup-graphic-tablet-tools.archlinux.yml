---
- name: "[archlinux] Graphic tablet peripheral: ensure tools"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - xf86-input-wacom
      - usbutils
      - gimp

- name: "[archlinux] Graphic tablet peripheral: ensure local AUR tools"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/10-system-tools/tasks/install-local-aur-packages.archlinux.yml"
  vars:
    aur_local_packages:
      - gromit-mpx
      - weylus-bin

- name: "[archlinux] Graphic tablet peripheral: enable gromit-mpx service"
  ansible.builtin.systemd_service:
    scope: user
    name: gromit-mpx.service
    enabled: true
    masked: false

- name: "[archlinux] Graphic tablet peripheral: copy sudo files"
  become: true
  ansible.builtin.template:
    src: "{{ item.source }}"
    dest: "{{ item.dest }}"
    owner: root
    mode: "644"
  loop:
    - { source: ~/dotfiles/assets/udev-rules/99-wacom.rules, dest: /etc/udev/rules.d/99-wacom.rules }
    - { source: ~/dotfiles/assets/udev-rules/60-weylus.rules, dest: /etc/udev/rules.d/60-weylus.rules }
  notify: "10-system-tools : handler_reload_udev_rules"

- name: "[archlinux] Graphic tablet peripheral: remove automatic display health udev trigger"
  become: true
  ansible.builtin.file:
    path: /etc/udev/rules.d/95-monitor-hotplug.rules
    state: absent
  notify: "10-system-tools : handler_reload_udev_rules"

- name: "[archlinux] Graphic tablet peripheral: copy display udev rules"
  become: true
  ansible.builtin.template:
    src: "{{ item.source }}"
    dest: "{{ item.dest }}"
    owner: root
    mode: "644"
  loop:
    - { source: ~/dotfiles/assets/udev-rules/90-internal-backlight.rules, dest: /etc/udev/rules.d/90-internal-backlight.rules }
  notify: "10-system-tools : handler_reload_udev_rules"

- name: "[archlinux] Graphic tablet peripheral: ensure Xorg config dir"
  become: true
  ansible.builtin.file:
    state: directory
    path: /etc/X11/xorg.conf.d
    mode: "755"

- name: "[archlinux] Graphic tablet peripheral: copy Xorg config"
  become: true
  ansible.builtin.copy:
    src: wacom/71-intuos-s-relative.conf
    dest: /etc/X11/xorg.conf.d/71-intuos-s-relative.conf
    mode: "644"

- name: "[archlinux] Graphic tablet peripheral: ensure wacom service"
  ansible.builtin.systemd_service:
    scope: user
    name: wacom.service
    enabled: true
    masked: false

# Setup weylus
- name: "[archlinux] Graphic tablet peripheral: clone weylus"
  ansible.builtin.git:
    repo: https://github.com/H-M-H/Weylus.git
    executable: "{{ ansible_facts.env.HOME }}/dotfiles/utilities/bin/dotfiles-github-git"
    dest: ~/data/repos/Weylus
    depth: 1
    version: "{{ arch_weylus_version }}"

- name: "[archlinux] Graphic tablet peripheral: open ufw to weylus ports"
  become: true
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - 1701
    - 9001
  ignore_errors: true

- name: "[archlinux] Graphic tablet peripheral: weylus - ensure uinput group"
  become: true
  ansible.builtin.group:
    name: uinput

- name: "[archlinux] Graphic tablet peripheral: weylus - append user to group"
  become: true
  ansible.builtin.user:
    append: true
    groups:
      - uinput
      - input
    name: "{{ ansible_facts.env.USER }}"

- name: "[archlinux] Graphic tablet peripheral: ensure weylus service"
  ansible.builtin.systemd_service:
    scope: user
    name: weylus.service
    enabled: false
    masked: false

- name: "[archlinux] Graphic tablet: ensure setup-displays service"
  ansible.builtin.systemd_service:
    scope: user
    name: setup-displays.service
    enabled: false
    masked: false

- name: "[archlinux] Graphic tablet: remove automatic display health units"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - ~/.config/systemd/user/display-health-check.service
    - ~/.config/systemd/user/display-health-check.timer
    - ~/.config/systemd/user/timers.target.wants/display-health-check.timer
  notify: "10-system-tools : handler_reload_user_systemd"

- name: "[archlinux] Graphic tablet: ensure mypaint"
  # Mypaint from arch repos was failing for me
  ansible.builtin.get_url:
    url: https://github.com/mypaint/mypaint-appimage/releases/download/continuous/MyPaint-v{{ arch_mypaint_version }}-no-translations.AppImage
    dest: ~/bin/mypaint
    mode: "755"
  notify: "10-system-tools : handler_ensure_mypaint_service"

- name: "[archlinux] Graphic tablet peripheral: ensure services"
  ansible.builtin.command: echo
  changed_when: true
  notify: handler_ensure_send_ifconfig_service
