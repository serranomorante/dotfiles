---
- name: "[archlinux] XDG autostart policy: ensure user generator mask directory"
  become: true
  ansible.builtin.file:
    path: /etc/systemd/user-generators
    state: directory
    owner: root
    group: root
    mode: "755"

- name: "[archlinux] XDG autostart policy: mask systemd XDG autostart generator"
  become: true
  ansible.builtin.file:
    src: /dev/null
    dest: /etc/systemd/user-generators/systemd-xdg-autostart-generator
    state: link
    force: true
    owner: root
    group: root
  notify: "10-system-tools : handler_reload_user_systemd"

- name: "[archlinux] XDG autostart policy: remove stale user target mask"
  ansible.builtin.file:
    path: ~/.config/systemd/user/xdg-desktop-autostart.target
    state: absent
  notify: "10-system-tools : handler_reload_user_systemd"
