---
- name: "[archlinux] Wine tools: install arch sws extension"
  become: true
  ansible.builtin.package:
    name: sws
    state: present

- name: "[archlinux] Wine tools: ensure native reaper sws folders"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "755"
  loop:
    - ~/.config/REAPER/UserPlugins
    - ~/.config/REAPER/Scripts
    - ~/.config/REAPER/Scripts/custom
    - ~/.vst

- name: "[archlinux] Wine tools: get native Helgobox/ReaLearn"
  ansible.builtin.get_url:
    url: "https://github.com/helgoboss/helgobox/releases/download/v{{ arch_helgobox_setup.version }}/{{ item.name }}"
    dest: "{{ arch_helgobox_setup.backup_path }}/{{ item.name }}"
    checksum: "{{ item.checksum }}"
    mode: "755"
  loop:
    - name: "{{ arch_helgobox_setup.linux_vst_name }}"
      checksum: "{{ arch_helgobox_setup.linux_vst_checksum }}"
    - name: "{{ arch_helgobox_setup.linux_reaper_extension_name }}"
      checksum: "{{ arch_helgobox_setup.linux_reaper_extension_checksum }}"

- name: "[archlinux] Wine tools: install native Helgobox/ReaLearn VST"
  ansible.builtin.copy:
    src: "{{ arch_helgobox_setup.backup_path }}/{{ arch_helgobox_setup.linux_vst_name }}"
    dest: "~/.vst/{{ arch_helgobox_setup.linux_vst_name }}"
    mode: "755"
    remote_src: true

- name: "[archlinux] Wine tools: check native Helgobox/ReaLearn xdo ABI"
  ansible.builtin.command: patchelf --print-needed "{{ ansible_facts.env.HOME }}/.vst/{{ arch_helgobox_setup.linux_vst_name }}"
  changed_when: false
  register: var_native_helgobox_needed

- name: "[archlinux] Wine tools: patch native Helgobox/ReaLearn xdo ABI"
  ansible.builtin.command: >
    patchelf --replace-needed libxdo.so.3 libxdo.so.4
    "{{ ansible_facts.env.HOME }}/.vst/{{ arch_helgobox_setup.linux_vst_name }}"
  changed_when: true
  when: "'libxdo.so.3' in var_native_helgobox_needed.stdout_lines"

- name: "[archlinux] Wine tools: stat native reaper ini"
  ansible.builtin.stat:
    path: ~/.config/REAPER/REAPER.ini
  register: var_native_reaper_ini

- name: "[archlinux] Wine tools: check native reaper VST path key"
  ansible.builtin.command: grep -Eq "^vstpath64=" "{{ ansible_facts.env.HOME }}/.config/REAPER/REAPER.ini"
  changed_when: false
  failed_when: false
  register: var_native_reaper_vstpath64_key
  when: var_native_reaper_ini.stat.exists

- name: "[archlinux] Wine tools: check native reaper user VST path"
  ansible.builtin.command: grep -Eq "^vstpath64=.*(^|;){{ ansible_facts.env.HOME | regex_escape }}/\\.vst(;|$)" "{{ ansible_facts.env.HOME }}/.config/REAPER/REAPER.ini"
  changed_when: false
  failed_when: false
  register: var_native_reaper_user_vst_path
  when: var_native_reaper_ini.stat.exists

- name: "[archlinux] Wine tools: add native reaper VST path key"
  ansible.builtin.lineinfile:
    path: ~/.config/REAPER/REAPER.ini
    insertafter: "^\\[reaper\\]"
    line: "vstpath64={{ ansible_facts.env.HOME }}/.vst"
    mode: "644"
  when:
    - var_native_reaper_ini.stat.exists
    - var_native_reaper_vstpath64_key.rc != 0

- name: "[archlinux] Wine tools: prepend native reaper user VST path"
  ansible.builtin.lineinfile:
    path: ~/.config/REAPER/REAPER.ini
    regexp: "^vstpath64=(.*)$"
    line: "vstpath64={{ ansible_facts.env.HOME }}/.vst;\\1"
    backrefs: true
  when:
    - var_native_reaper_ini.stat.exists
    - var_native_reaper_vstpath64_key.rc == 0
    - var_native_reaper_user_vst_path.rc != 0

- name: "[archlinux] Wine tools: install native Helgobox/ReaLearn extension"
  ansible.builtin.copy:
    src: "{{ arch_helgobox_setup.backup_path }}/{{ arch_helgobox_setup.linux_reaper_extension_name }}"
    dest: "~/.config/REAPER/UserPlugins/{{ arch_helgobox_setup.linux_reaper_extension_name }}"
    mode: "755"
    remote_src: true

- name: "[archlinux] Wine tools: symlink native reaper sws extension"
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - src: /usr/lib/sws/reaper_sws-x86_64.so
      dest: ~/.config/REAPER/UserPlugins/reaper_sws-x86_64.so
    - src: /usr/lib/sws/sws_python64.py
      dest: ~/.config/REAPER/Scripts/sws_python64.py

- name: "[archlinux] Wine tools: copy native reaper startup script"
  ansible.builtin.copy:
    src: "{{ ansible_facts.env.HOME }}/dotfiles/assets/scripts/reaper/__startup.lua"
    dest: ~/.config/REAPER/Scripts/__startup.lua
    mode: "644"

- name: "[archlinux] Wine tools: copy native reaper custom scripts"
  ansible.builtin.copy:
    src: "{{ ansible_facts.env.HOME }}/dotfiles/assets/scripts/reaper/{{ item }}"
    dest: "~/.config/REAPER/Scripts/custom/{{ item }}"
    mode: "644"
  loop:
    - alternate_position.lua
    - item_state_feedback.lua
    - midi_editor_state_feedback.lua
    - project_transport_state_feedback.lua
    - yabridge_focus_repair.lua

- name: "[archlinux] Wine tools: get sws extension"
  ansible.builtin.get_url:
    url: https://www.sws-extension.org/download/featured/sws-{{ arch_reaper_sws_extension_setup.version }}-Windows-x64.exe
    dest: "{{ arch_reaper_sws_extension_setup.backup_path }}/sws-{{ arch_reaper_sws_extension_setup.version }}-Windows-x64.exe"
    mode: "755"
  ignore_errors: true
  register: var_new_sws_extension_version_downloaded

- name: "[archlinux] Wine tools: install sws extension"
  ansible.builtin.command: >
    {{ ansible_facts.env.HOME }}/bin/wwine --prefix reaper
    wine start /unix
    '{{ arch_reaper_sws_extension_setup.backup_path }}/sws-{{ arch_reaper_sws_extension_setup.version }}-Windows-x64.exe'
  timeout: 60
  changed_when: true
  when: var_new_sws_extension_version_downloaded.changed and is_x_display_session
  register: var_sws_install

- block:
    - name: "[archlinux] Wine tools: wait until window closes: {{ window_query }}"
      ansible.builtin.shell: set -o pipefail && sleep {{ delay_n }} && wmctrl -lx | grep -oE {{ window_query }} | wc -l
      changed_when: true
      register: var_host_windows
      until: var_host_windows.stdout | int == 0
      delay: "{{ delay_n }}"
      retries: "{{ retries_n }}"
      failed_when: false
      notify: handler_kill_reaper_wineserver
      when: is_x_display_session and should_wait

    - name: flush_handlers
      ansible.builtin.meta: flush_handlers
  vars:
    window_query: explorer.exe
    # Defaults
    should_wait: "{{ var_sws_install.changed }}"
    delay_n: "{{ arch_ansible_long_retries_config.delay_n }}"
    retries_n: "{{ arch_ansible_long_retries_config.retries_n }}"

- name: "[archlinux] Wine tools: ensure custom script folder"
  ansible.builtin.file:
    state: directory
    path: "{{ item }}"
    mode: "755"
  loop:
    - "{{ arch_reaper_wine_setup.wine_prefix }}/drive_c/users/{{ ansible_facts.env.USER }}/AppData"
    - "{{ arch_reaper_wine_setup.wine_prefix }}/drive_c/users/{{ ansible_facts.env.USER }}/AppData/Roaming"
    - "{{ arch_reaper_wine_setup.wine_prefix }}/drive_c/users/{{ ansible_facts.env.USER }}/AppData/Roaming/REAPER/"
    - "{{ arch_reaper_wine_setup.wine_prefix }}/drive_c/users/{{ ansible_facts.env.USER }}/AppData/Roaming/REAPER/Scripts"
    - "{{ arch_reaper_wine_setup.wine_prefix }}/drive_c/users/{{ ansible_facts.env.USER }}/AppData/Roaming/REAPER/Scripts/custom"

- name: "[archlinux] Wine tools: copy wine reaper custom scripts"
  ansible.builtin.copy:
    src: "{{ ansible_facts.env.HOME }}/dotfiles/assets/scripts/reaper/{{ item }}"
    dest: "{{ arch_reaper_wine_setup.wine_prefix }}/drive_c/users/{{ ansible_facts.env.USER }}/AppData/Roaming/REAPER/Scripts/custom/{{ item }}"
    mode: "644"
  loop:
    - alternate_position.lua
    - item_state_feedback.lua
    - midi_editor_state_feedback.lua
    - project_transport_state_feedback.lua
