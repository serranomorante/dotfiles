---
- name: "[archlinux] Setup desktop: ensure reflector"
  become: true
  ansible.builtin.package:
    name: reflector
    state: present

- name: "[archlinux] Setup desktop: stat pacman mirrorlist"
  ansible.builtin.stat:
    path: /etc/pacman.d/mirrorlist
  register: var_pacman_mirrorlist

- name: "[archlinux] Setup desktop: setup reflector"
  become: true
  ansible.builtin.command: reflector --verbose --cache-timeout 604800 --sort rate -l 20 -c Netherlands -c France --save /etc/pacman.d/mirrorlist
  ignore_errors: true
  changed_when: true
  when: >-
    not var_pacman_mirrorlist.stat.exists or
    ((ansible_date_time.epoch | int) - (var_pacman_mirrorlist.stat.mtime | int)) > 604800

- name: "[archlinux] Setup desktop: ensure packages"
  # How to Dual Boot Arch Linux and Windows 11/10 [ 2022 ]
  # https://www.youtube.com/watch?v=JRdYSGh-g3s
  become: true
  ansible.builtin.package:
    state: present
    name:
      - bind
      - dmenu
      - obs-studio
      - xorg
      - xorg-xinit
      - plasma
      - plasma-workspace # owns KDE Klipper / clipboard applet
      - plasma-x11-session
      - plasma-integration
      - sddm
      - dolphin
      - dolphin-plugins
      - ark
      - moreutils
      - unrar
      - jq
      - arch-install-scripts # to get genfstab
      - kcalc
      - gnumeric
      - trash-cli
      - docker
      - docker-compose
      - kronometer
      - kcolorchooser
      - mpv
      - arch-wiki-docs
      - noise-suppression-for-voice
      - libebur128
      - inetutils
      - htop
      - xclip
      - ufw
      - kdialog
      - ncdu
      - btop
      - bluez
      - firejail
      - feh
      # - kde-applications
  timeout: 0
  notify:
    - "10-system-tools : handler_ensure_docker_service"
    - "10-system-tools : handler_ensure_bluetooth_service"

- name: "[archlinux] Setup desktop: remove docker kernel modules file"
  become: true
  ansible.builtin.file:
    path: /etc/modules-load.d/docker.conf
    state: absent

- name: "[archlinux] Setup desktop: ensure wallpaper directory"
  ansible.builtin.file:
    path: ~/.wallpapers
    state: directory
    mode: "755"

- name: "[archlinux] Setup desktop: download NASA space wallpapers"
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "~/.wallpapers/{{ item.dest }}"
    checksum: "sha256:{{ item.sha256 }}"
    mode: "644"
  loop:
    # NASA Images and NASA Science assets are used here for clear provenance and stable checksums.
    - dest: nasa-webb-carina-cosmic-cliffs.jpg
      url: https://images-assets.nasa.gov/image/carina_nebula/carina_nebula~large.jpg
      sha256: e84c3f04074f32bada99d54c7d5b8632bba687ed287850674bcd26a692be34bd
    - dest: nasa-webb-stephans-quintet.png
      url: "https://assets.science.nasa.gov/dynamicimage/assets/science/missions/webb/science/2022/07/STScI-01G8H49RQ0E48YDM8WKW9PP5XS.png?crop=faces%2Cfocalpoint&fit=clip&h=1917&w=2000"
      sha256: 664867f9d1d07a82772d0571d41d05f883ce0562863b54b77bd5a090c73f9cc9
    - dest: nasa-webb-southern-ring-nebula.jpg
      url: https://images-assets.nasa.gov/image/southern_ring_nebula/southern_ring_nebula~large.jpg
      sha256: 98532e5a6a25d675c1f6ecf611294f711958baf22b21a8bfe9754a4226082067
    - dest: nasa-webb-first-deep-field.jpg
      url: https://images-assets.nasa.gov/image/webb_first_deep_field/webb_first_deep_field~large.jpg
      sha256: 2dae75b6ece8011a019b95955e6933a35064569d31aeb1bb8a54d739dc549ee4
    - dest: nasa-wise-eagle-nebula.jpg
      url: https://images-assets.nasa.gov/image/PIA25433/PIA25433~large.jpg
      sha256: 8c30587e60a2623740cc3ced81333c132bcea52e8491db9f58a13d02ed8b2423
    - dest: nasa-spitzer-helix-nebula.jpg
      url: https://images-assets.nasa.gov/image/PIA09178/PIA09178~large.jpg
      sha256: 3be822ab5cd4cc5d67c60f067a4b6ca068592a88dede9c08e6edd6b294d175d7

- name: flush_handlers
  ansible.builtin.meta: flush_handlers

- name: "[archlinux] Setup desktop: add user to docker group"
  become: true
  ansible.builtin.user:
    append: true
    groups: docker
    name: "{{ ansible_facts.env.USER }}"

- name: "[archlinux] Setup desktop: set bell sound off"
  # https://wiki.archlinux.org/index.php?title=PC_speaker&oldid=740440#Globally
  become: true
  ansible.builtin.copy:
    dest: /etc/modprobe.d/nobeep.conf
    content: blacklist pcspkr
    mode: "755"

- name: "[archlinux] Setup desktop: remove packages"
  become: true
  ansible.builtin.package:
    state: absent
    name:
      - vlc
      - vlc-plugins-all
      - wacomtablet

- name: "[archlinux] Setup desktop: register mpv MIME handlers"
  ansible.builtin.shell: |
    changed=0
    for mime in \
      audio/aac \
      audio/flac \
      audio/mpeg \
      audio/mp4 \
      audio/ogg \
      audio/wav \
      audio/x-wav \
      video/mp4 \
      video/mpeg \
      video/ogg \
      video/quicktime \
      video/webm \
      video/x-matroska \
      video/x-msvideo \
      application/ogg \
      application/x-subrip
    do
      current="$(xdg-mime query default "$mime" 2>/dev/null || true)"
      if [ "$current" != "mpv.desktop" ]; then
        xdg-mime default mpv.desktop "$mime"
        changed=1
      fi
    done
    if [ "$changed" -eq 1 ]; then
      printf '%s\n' changed
    fi
  changed_when: var_register_mpv_mime_handlers.stdout == "changed"
  register: var_register_mpv_mime_handlers
  notify: "10-system-tools : handler_update_desktop_database"

- name: "[archlinux] Setup desktop: ensure sddm config folder"
  become: true
  ansible.builtin.file:
    path: /etc/sddm.conf.d
    state: directory
    mode: "755"

- name: "[archlinux] Setup desktop: setup sddm files"
  become: true
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    mode: "744"
  loop:
    - src: sddm/Xsetup
      dest: /usr/share/sddm/scripts/Xsetup
    - src: sddm/autologin.conf
      dest: /etc/sddm.conf.d/autologin.conf

- name: "[archlinux] Setup desktop: ensure sddm service"
  become: true
  ansible.builtin.systemd_service:
    scope: system
    name: "{{ item.name }}"
    enabled: "{{ item.enabled }}"
    masked: "{{ item.masked }}"
  loop:
    - { name: sddm.service, enabled: true, masked: false }
    - { name: NetworkManager-wait-online.service, state: stopped, enabled: false, masked: true }

- name: "[archlinux] Setup desktop: register pinentry"
  # Use pinentry-qt on desktop to store passwords in kwallet
  ansible.builtin.command: which pinentry-qt
  register: var_pinentry_path
  changed_when: false

- name: "[archlinux] Setup desktop: ensure ~/.gnupg"
  ansible.builtin.file:
    path: ~/.gnupg
    state: directory
    mode: "700"

- name: "[archlinux] Setup desktop: ensure gpg-agent.conf"
  ansible.builtin.template:
    src: gpg-agent.conf
    dest: ~/.gnupg/gpg-agent.conf
    mode: "700"

- name: "[archlinux] Setup desktop: ignore packages from pacman"
  become: true
  ansible.builtin.blockinfile:
    dest: /etc/pacman.conf
    insertafter: "^\\[options\\]"
    marker: "## {mark} ANSIBLE MANAGED BLOCK - IGNORE PACKAGES"
    block: |
      # IgnorePkg = wine-staging davinci-resolve
      IgnorePkg = wine-staging davinci-resolve

- name: "[archlinux] Setup desktop: disable baloo indexing"
  # https://wiki.archlinux.org/title/Baloo#Disabling_the_indexer
  ansible.builtin.command: "{{ item }}"
  changed_when: true
  loop:
    - balooctl6 suspend
    - balooctl6 disable
    - balooctl6 purge
  ignore_errors: true

- name: "[archlinux] Setup desktop: ensure folders"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "755"
  loop:
    - /etc/polkit-1
    - /etc/polkit-1/rules.d/

- name: "[archlinux] Setup desktop: disable hibernation for all users"
  become: true
  ansible.builtin.copy:
    src: 99-disable-hibernate.rules
    dest: /etc/polkit-1/rules.d/99-disable-hibernate.rules
    mode: "600"

- name: "[archlinux] Setup desktop: set timezone to Europe/Madrid"
  become: true
  community.general.timezone:
    name: Europe/Madrid

- name: "[archlinux] Setup desktop: sync hardware clock"
  become: true
  ansible.builtin.command: hwclock --systohc
  changed_when: true

- name: "[archlinux] Setup desktop: enable ntp (systemd-timesyncd)"
  become: true
  ansible.builtin.systemd_service:
    name: systemd-timesyncd
    enabled: true
    state: started

- name: "[archlinux] Setup desktop: configure locales"
  become: true
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: "^#?({{ item }})"
    line: "\\1"
    backrefs: true
  loop:
    - en_US.UTF-8 UTF-8
    - es_ES.UTF-8 UTF-8
  register: var_locales

- name: "[archlinux] Setup desktop: generate locales"
  become: true
  ansible.builtin.command: locale-gen
  when: var_locales.changed
  changed_when: true
