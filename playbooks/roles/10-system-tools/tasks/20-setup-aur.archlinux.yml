---
- name: "[archlinux] AUR: check repo-local kewlfft.aur module checkout"
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/collections/ansible_collections/kewlfft/aur/plugins/modules/aur.py"
  register: var_kewlfft_aur_module
  delegate_to: localhost
  run_once: true

- name: "[archlinux] AUR: remove incomplete kewlfft.aur checkout"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/collections/ansible_collections/kewlfft/aur"
    state: absent
  when: not var_kewlfft_aur_module.stat.exists
  delegate_to: localhost
  run_once: true

- name: "[archlinux] AUR: ensure repo-local collection path"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/collections/ansible_collections/kewlfft/aur"
    state: directory
    mode: "755"
  delegate_to: localhost
  run_once: true

- name: "[archlinux] AUR: create temp dir for upstream collection download"
  ansible.builtin.tempfile:
    state: directory
    prefix: kewlfft-aur-
  register: var_kewlfft_aur_tmpdir
  when: not var_kewlfft_aur_module.stat.exists
  delegate_to: localhost
  run_once: true

- name: "[archlinux] AUR: download upstream kewlfft.aur collection archive"
  ansible.builtin.get_url:
    url: https://github.com/kewlfft/ansible-aur/archive/refs/heads/master.tar.gz
    dest: "{{ var_kewlfft_aur_tmpdir.path }}/kewlfft-aur.tar.gz"
    mode: "644"
  when: not var_kewlfft_aur_module.stat.exists
  delegate_to: localhost
  run_once: true

- name: "[archlinux] AUR: unpack upstream kewlfft.aur collection on controller"
  ansible.builtin.unarchive:
    src: "{{ var_kewlfft_aur_tmpdir.path }}/kewlfft-aur.tar.gz"
    dest: "{{ playbook_dir }}/collections/ansible_collections/kewlfft/aur"
    remote_src: true
    extra_opts:
      - --strip-components=1
  when: not var_kewlfft_aur_module.stat.exists
  delegate_to: localhost
  run_once: true

- name: "[archlinux] AUR: remove temp dir for upstream collection download"
  ansible.builtin.file:
    path: "{{ var_kewlfft_aur_tmpdir.path }}"
    state: absent
  when: not var_kewlfft_aur_module.stat.exists
  delegate_to: localhost
  run_once: true

- name: "[archlinux] AUR: Create the `aur_builder` user"
  become: true
  ansible.builtin.user:
    name: aur_builder
    create_home: true
    group: wheel

- name: "[archlinux] AUR: Allow the `aur_builder` user to run `sudo pacman` without a password"
  become: true
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/11-install-aur_builder
    line: "aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman"
    create: true
    mode: "644"
    validate: "visudo -cf %s"

- name: "[archlinux] AUR: add aur_builder to user group"
  become: true
  ansible.builtin.user:
    append: true
    groups: "{{ ansible_facts.env.USER }}"
    name: aur_builder

- name: "[archlinux] AUR: append user to wheel group"
  become: true
  ansible.builtin.user:
    append: true
    groups: wheel
    name: "{{ ansible_facts.env.USER }}"

- name: "[archlinux] AUR: clone yay"
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay-bin
    dest: /tmp/yay
    depth: 1
    force: true
    version: "{{ arch_yay_version }}"
    single_branch: true

- name: "[archlinux] AUR: ensure yay folder permissions"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "770"
    group: wheel
  loop:
    - /tmp
    - /tmp/yay

- name: "[archlinux] AUR: install yay"
  become: true
  become_user: aur_builder
  ansible.builtin.command: makepkg -si --noconfirm
  args:
    chdir: /tmp/yay
    creates: /usr/bin/yay
