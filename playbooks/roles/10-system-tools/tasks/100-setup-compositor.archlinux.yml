---
- name: "[archlinux] Compositor: remove packages"
  become: true
  ansible.builtin.package:
    name: kwin
    state: absent
    force: true

- name: "[archlinux] Compositor: ensure mask kwin service"
  ansible.builtin.systemd_service:
    scope: user
    name: plasma-kwin_x11.service
    enabled: false
    masked: true

- name: "[archlinux] Compositor: kwriteconfig6"
  ansible.builtin.command: kwriteconfig6 --file startkderc --group General --key systemdBoot true
  changed_when: false

- name: "[archlinux] Compositor: ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - picom
      - wmctrl
  notify: "10-system-tools : handler_ensure_compositor_service"

- name: "[archlinux] Compositor: clone picom shaders"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: git
  vars:
    update_diff_capture_scope: compositor-tools
    update_diff_git_repo: "{{ item.repo }}"
    update_diff_git_dest: "{{ ansible_facts.env.HOME }}/data/repos/{{ item.name | default(item.repo) | basename }}"
    update_diff_git_version: "{{ item.version | default('HEAD') }}"
    update_diff_git_single_branch: true
    update_diff_git_depth: 1
  loop:
    - repo: https://github.com/ikz87/picom-shaders

- name: "[archlinux] Setup browser tools: setup picom conf"
  ansible.builtin.template:
    src: picom.conf
    dest: ~/.config/picom/
    mode: "644"

- name: "[archlinux] Compositor: inspect dwm remote commit"
  ansible.builtin.command:
    argv:
      - git
      - ls-remote
      - git://git.suckless.org/dwm
      - HEAD
  register: var_dwm_remote_commit
  changed_when: false

- name: "[archlinux] Compositor: set dwm patch marker fact"
  ansible.builtin.set_fact:
    dwm_patch_marker: "dwm-{{ var_dwm_remote_commit.stdout.split()[0] }}-patch-stack-v15"

- name: "[archlinux] Compositor: stat dwm patch marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: check
  vars:
    dotfiles_marker_name: "{{ dwm_patch_marker }}"
    dotfiles_marker_register: var_dwm_patch_marker

- name: "[archlinux] Compositor: clean dwm checkout for new remote commit"
  become: true
  ansible.builtin.file:
    path: ~/data/repos/dwm
    state: absent
  when: not var_dwm_patch_marker.stat.exists

- name: "[archlinux] Compositor: clone latest dwm"
  ansible.builtin.include_role:
    name: update-diff-capture
    tasks_from: git
  vars:
    update_diff_capture_scope: compositor-tools
    update_diff_git_repo: git://git.suckless.org/dwm
    update_diff_git_dest: "{{ ansible_facts.env.HOME }}/data/repos/dwm"
    update_diff_git_version: "{{ var_dwm_remote_commit.stdout.split()[0] }}"
    update_diff_git_force: true
  register: var_dwm_clone
  when: not var_dwm_patch_marker.stat.exists

- name: "[archlinux] Compositor: perform sudo make to generate config.h"
  become: true
  ansible.builtin.command: make
  args:
    chdir: "{{ ansible_facts.env.HOME }}/data/repos/dwm"
    creates: "{{ ansible_facts.env.HOME }}/data/repos/dwm/config.h"

- name: "[archlinux] Compositor: prepare patches folder"
  ansible.builtin.file:
    path: ~/data/repos/dwm/patches
    state: directory
    mode: "755"

- name: "[archlinux] Compositor: inspect downloaded dwm patches"
  ansible.builtin.stat:
    path: ~/data/repos/dwm/patches/{{ item | basename }}
  loop:
    - https://dwm.suckless.org/patches/fakefullscreen/dwm-fakefullscreen-20210714-138b405.diff
    - https://dwm.suckless.org/patches/focusmaster/dwm-focusmaster-20210804-138b405.diff
    - https://dwm.suckless.org/patches/save_floats/dwm-savefloats-6.0.diff
    - https://dwm.suckless.org/patches/alpha/dwm-fixborders-6.2.diff
    - https://dwm.suckless.org/patches/float_border_color/dwm-float-border-color-20231008-3a7ea45f.diff
    - https://dwm.suckless.org/patches/floatrules/dwm-floatrules-20210801-138b405.diff
    - https://raw.githubusercontent.com/bakkeby/patches/refs/heads/master/dwm/dwm-unmanaged-6.6.diff
    - https://dwm.suckless.org/patches/focusonnetactive/dwm-focusonnetactive-6.2.diff
    - https://dwm.suckless.org/patches/canfocusfloating/dwm-canfocusfloating-20210724-b914109.diff
  register: var_dwm_patch_files

- name: "[archlinux] Compositor: download missing dwm patches"
  ansible.builtin.get_url:
    url: "{{ item }}"
    dest: ~/data/repos/dwm/patches/{{ item | basename }}
    mode: "755"
  loop: "{{ var_dwm_patch_files.results | rejectattr('stat.exists') | map(attribute='item') | list }}"
  loop_control:
    label: "{{ item | basename }}"
    pause: 1

- name: "[archlinux] Compositor: apply dwm patches"
  ansible.posix.patch:
    src: "{{ item }}"
    strip: 1
    basedir: ~/data/repos/dwm
  ignore_errors: true
  loop:
    # fakefullscreen
    - ~/data/repos/dwm/patches/dwm-fakefullscreen-20210714-138b405.diff
    - fix-dwm-fakefullscreen-20210714-138b405.patch
    # focusmaster
    - ~/data/repos/dwm/patches/dwm-focusmaster-20210804-138b405.diff
    - config-dwm-focusmaster-20210804-138b405.patch
    # savefloats
    - ~/data/repos/dwm/patches/dwm-savefloats-6.0.diff
    - fix-dwm-savefloats-6.0.patch
    # fixborders
    - ~/data/repos/dwm/patches/dwm-fixborders-6.2.diff
    # dwm-float-border-color
    - ~/data/repos/dwm/patches/dwm-float-border-color-20231008-3a7ea45f.diff
    - fix-dwm-float-border-color-20231008-3a7ea45f.patch
    - config-dwm-float-border-color-20231008-3a7ea45f.patch
    # floatrules
    - ~/data/repos/dwm/patches/dwm-floatrules-20210801-138b405.diff
    # dwm-unmanaged
    - ~/data/repos/dwm/patches/dwm-unmanaged-6.6.diff
    - fix-dwm-unmanaged-6.6.patch
    # dwm-focusonnetactive-6.2
    - ~/data/repos/dwm/patches/dwm-focusonnetactive-6.2.diff
    # per-tag swapfocus
    - fix-dwm-swapfocus-pertag.patch
    # dwm-canfocusfloating
    - ~/data/repos/dwm/patches/dwm-canfocusfloating-20210724-b914109.diff
    - fix-dwm-canfocusfloating-20210724-b914109.patch
    - fix-dwm-canfocusfloating-focus-state.patch
    - fix-dwm-floatrules-preserve-rule-geometry.patch
    # advertise extra EWMH atoms so kitty/GLFW layer-shell windows
    # (e.g. `kitten quick-access-terminal`) can be created under dwm
    - add-dwm-ewmh-atoms.patch
    # Skip some windows like quick-access-terminal from focus history
    - skipfocushistory.patch
    - full-monitor.patch
    # My changes. Always leave this last.
    - make-dwm-debuggable.patch
    - custom.patch
  when: not var_dwm_patch_marker.stat.exists

- name: "[archlinux] Compositor: validate dwm FULLMON rules support"
  ansible.builtin.command:
    argv:
      - grep
      - -q
      - "r->floatx == FULLMON"
      - "{{ ansible_facts.env.HOME }}/data/repos/dwm/dwm.c"
  changed_when: false
  when: not var_dwm_patch_marker.stat.exists

- name: "[archlinux] Compositor: record dwm patch marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: record
  vars:
    dotfiles_marker_name: "{{ dwm_patch_marker }}"
    dotfiles_marker_content: "{{ var_dwm_remote_commit.stdout.split()[0] }}:patch-stack-v15\n"
  when: not var_dwm_patch_marker.stat.exists

- name: "[archlinux] Compositor: stat installed dwm"
  ansible.builtin.stat:
    path: /usr/local/bin/dwm
  register: var_installed_dwm

- name: "[archlinux] Compositor: install dwm"
  become: true
  ansible.builtin.command: make install
  args:
    chdir: "{{ ansible_facts.env.HOME }}/data/repos/dwm"
  register: var_dwm_result
  changed_when: var_dwm_result.rc == 0
  when: not var_dwm_patch_marker.stat.exists or not var_installed_dwm.stat.exists

- name: "[archlinux] Compositor: ensure dwm service"
  ansible.builtin.systemd_service:
    scope: user
    name: plasma-wm.service
    enabled: true
    masked: false
