---
- name: "[archlinux] Setup audio tools: ensure no package conflicts"
  become: true
  ansible.builtin.package:
    state: absent
    name:
      - plasma-pa
      - pulseaudio

- name: "[archlinux] Setup audio tools: install plexamp"
  community.general.flatpak:
    name: com.plexamp.Plexamp
    state: latest
  ignore_errors: true

- name: "[archlinux] Setup audio tools: check plexamp desktop file"
  ansible.builtin.stat:
    path: /var/lib/flatpak/exports/share/applications/com.plexamp.Plexamp.desktop
  register: var_plexamp_desktop_file

- name: "[archlinux] Setup audio tools: copy plexamp desktop file to user directory"
  ansible.builtin.copy:
    src: /var/lib/flatpak/exports/share/applications/com.plexamp.Plexamp.desktop
    dest: ~/.local/share/applications/com.plexamp.Plexamp.desktop
    mode: "644"
  when: var_plexamp_desktop_file.stat.exists

- name: "[archlinux] Setup audio tools: clean plexamp exec line"
  ansible.builtin.lineinfile:
    dest: ~/.local/share/applications/com.plexamp.Plexamp.desktop
    regexp: "^Exec=.*"
    state: absent
  when: var_plexamp_desktop_file.stat.exists

- name: "[archlinux] Setup audio tools: ensure plexamp resource-limited desktop"
  ansible.builtin.blockinfile:
    dest: ~/.local/share/applications/com.plexamp.Plexamp.desktop
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    insertafter: "^\\[Desktop Entry\\]"
    block: Exec={{ ansible_facts.env.HOME }}/bin/app-cgroup-launch plexamp /usr/bin/flatpak run --branch=stable --arch=x86_64 --command=startplexamp
      --file-forwarding com.plexamp.Plexamp @@u %U @@
  when: var_plexamp_desktop_file.stat.exists
  notify: handler_update_desktop_database

- name: "[archlinux] Setup audio tools: ensure local AUR packages"
  ansible.builtin.include_tasks: "{{ ansible_facts.env.HOME }}/dotfiles/playbooks/roles/10-system-tools/tasks/install-local-aur-packages.archlinux.yml"
  vars:
    aur_local_packages:
      - patchance-git
      - nerd-dictation-git

- name: "[archlinux] Setup audio tools: remove conflicting packages"
  become: true
  ansible.builtin.package:
    force: true
    state: absent
    name:
      - jack
      - jack2

- name: "[archlinux] Setup audio tools: ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - pipewire
      - lib32-pipewire
      - pipewire-docs
      - pipewire-audio
      - pipewire-alsa
      - pipewire-pulse
      - pipewire-jack
      - lib32-pipewire-jack
      - wireplumber
      - plasma-pa
      - speech-dispatcher
      - espeak-ng
      - python-vosk
      - unzip
      - realtime-privileges
      - base-devel
      - cpupower
      - helvum
      - alsa-utils
      - alsa-scarlett-gui
      - python-qtpy
      - rtirq
      - reaper
  notify: handler_ensure_rtirq_service

- name: "[archlinux] Setup audio tools: prioritize USB IRQ handlers"
  become: true
  ansible.builtin.lineinfile:
    path: /etc/rtirq.conf
    regexp: "^RTIRQ_NAME_LIST="
    line: 'RTIRQ_NAME_LIST="usb snd i8042"'
  notify: handler_restart_rtirq_service

- name: "[archlinux] Setup audio tools: ensure STT Vosk model directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "755"
  loop: >-
    {{
      (
        (arch_stt_vosk_models | map(attribute='archive_path') | map('dirname') | list)
        + (arch_stt_vosk_models | map(attribute='parent_dir') | list)
        + [arch_stt_dictation_project_path]
      ) | unique
    }}

- name: "[archlinux] Setup audio tools: download STT Vosk model"
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.archive_path | dirname }}/{{ item.url | basename | regex_replace('\\.zip$', '') }}-{{ item.url | hash('sha256') }}.zip"
    mode: "644"
    timeout: 300
  loop: "{{ arch_stt_vosk_models }}"

- name: "[archlinux] Setup audio tools: reset STT Vosk model marker specs"
  ansible.builtin.set_fact:
    var_arch_stt_vosk_model_marker_specs: []

- name: "[archlinux] Setup audio tools: build STT Vosk model marker specs"
  ansible.builtin.set_fact:
    var_arch_stt_vosk_model_marker_specs: "{{ var_arch_stt_vosk_model_marker_specs + [var_arch_stt_vosk_model_marker_spec] }}"
  vars:
    var_arch_stt_vosk_model_marker_spec:
      name: "vosk-model-{{ item.name }}-{{ item.url | hash('sha256') }}"
      item: "{{ item }}"
  loop: "{{ arch_stt_vosk_models }}"

- name: "[archlinux] Setup audio tools: stat STT Vosk model markers"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: check-many
  vars:
    dotfiles_marker_register: var_arch_stt_vosk_model_markers
    dotfiles_marker_items: "{{ var_arch_stt_vosk_model_marker_specs }}"

- name: "[archlinux] Setup audio tools: unpack STT Vosk model"
  ansible.builtin.unarchive:
    src: "{{ item.item.archive_path | dirname }}/{{ item.item.url | basename | regex_replace('\\.zip$', '') }}-{{ item.item.url | hash('sha256') }}.zip"
    dest: "{{ item.item.parent_dir }}"
    remote_src: true
  loop: "{{ var_arch_stt_vosk_model_markers.results }}"
  when: not item.stat.exists

- name: "[archlinux] Setup audio tools: record STT Vosk model marker"
  ansible.builtin.include_role:
    name: dotfiles-markers
    tasks_from: record
  vars:
    dotfiles_marker_name: "vosk-model-{{ item.item.name }}-{{ item.item.url | hash('sha256') }}"
    dotfiles_marker_content: "{{ item.item.url }}\n"
  loop: "{{ var_arch_stt_vosk_model_markers.results }}"
  when: not item.stat.exists

- name: "[archlinux] Setup audio tools: setup reaper-linux.desktop file"
  ansible.builtin.template:
    src: "{{ item }}"
    dest: ~/.local/share/applications/
    mode: "644"
  loop:
    - reaper-linux.desktop
    - reaper-linux-firejail.desktop
  notify: handler_update_desktop_database

- name: "[archlinux] Setup audio tools: setup launch-reaper-linux file"
  ansible.builtin.template:
    src: launch-reaper-linux
    dest: ~/.local/bin/launch-reaper-linux
    mode: "755"

- name: "[archlinux] Setup audio tools: ensure user services"
  ansible.builtin.systemd_service:
    scope: user
    name: "{{ item.name }}"
    enabled: "{{ item.enabled }}"
    masked: "{{ item.masked }}"
  loop:
    - { name: pipewire.socket, enabled: true, masked: false }
    - { name: pipewire-pulse.socket, enabled: true, masked: false }
    - { name: wireplumber.service, enabled: true, masked: false }

- name: "[archlinux] Setup audio tools: remove legacy Scarlett monitoring stow enablement"
  ansible.builtin.file:
    path: ~/.config/systemd/user/default.target.wants/configure-scarlett-monitoring.service
    state: absent

- name: "[archlinux] Setup audio tools: ensure Scarlett monitoring service"
  ansible.builtin.systemd_service:
    scope: user
    name: configure-scarlett-monitoring.service
    enabled: true
    masked: false
    state: started
    daemon_reload: true

- name: "[archlinux] Setup audio tools: create pipewire group"
  become: true
  ansible.builtin.group:
    name: pipewire

- name: "[archlinux] Setup audio tools: add user to realtime and audio groups"
  become: true
  ansible.builtin.user:
    append: true
    groups:
      - realtime
      - audio
      - pipewire
    name: "{{ ansible_facts.env.USER }}"

- name: "[archlinux] Setup audio tools: ensure path"
  ansible.builtin.file:
    path: /etc/sysctl.d/
    state: directory
    mode: "755"

- name: "[archlinux] Setup audio tools: max user freq"
  # https://wiki.archlinux.org/title/Professional_audio#Optimizing_system_configuration
  become: true
  ansible.builtin.command: "{{ item }}"
  changed_when: true
  loop:
    - echo 2048 > /sys/class/rtc/rtc0/max_user_freq
    - echo 2048 > /proc/sys/dev/hpet/max-user-freq
    - setpci -v -d *:* latency_timer=b0
    - setpci -v -s 06:00.6 latency_timer=ff

- name: "[archlinux] Setup audio tools: setup swappiness"
  become: true
  ansible.builtin.copy:
    src: 90-swappiness.conf
    dest: /etc/sysctl.d/90-swappiness.conf
    mode: "644"

- name: "[archlinux] Setup audio tools: setup max user watches"
  become: true
  ansible.builtin.copy:
    src: 90-max_user_watches.conf
    dest: /etc/sysctl.d/90-max_user_watches.conf
    mode: "644"

- name: "[archlinux] Setup audio tools: enable threadirqs"
  become: true
  ansible.builtin.copy:
    src: audio.conf
    dest: /etc/cmdline.d/audio.conf
    mode: "644"

- name: "[archlinux] Setup audio tools: stat cpupower config file"
  become: true
  ansible.builtin.stat:
    path: /etc/default/cpupower-service.conf
  register: var_cpupower

- name: "[archlinux] Setup audio tools: check cpupower idle governor support"
  # Idle/default governor applied at boot. REAPER raises this to 'performance'
  # on demand via cpu-governor-boost.service (see tasks below).
  ansible.builtin.command:
    argv:
      - grep
      - -qw
      - schedutil
      - /sys/devices/system/cpu/cpufreq/policy0/scaling_available_governors
  register: var_cpupower_idle_governor
  changed_when: false
  failed_when: false

- name: "[archlinux] Setup audio tools: governor schedutil"
  become: true
  ansible.builtin.lineinfile:
    path: "{{ var_cpupower.stat.path }}"
    regexp: "^#?GOVERNOR=.*"
    line: "GOVERNOR='schedutil'"
  when:
    - var_cpupower.stat.exists
    - var_cpupower_idle_governor.rc == 0

- name: "[archlinux] Setup audio tools: ensure cpupower service"
  become: true
  ansible.builtin.systemd_service:
    scope: system
    name: cpupower.service
    enabled: "{{ var_cpupower_idle_governor.rc == 0 }}"
    masked: false
    state: "{{ (var_cpupower_idle_governor.rc == 0) | ternary('started', 'stopped') }}"

- name: "[archlinux] Setup audio tools: install cpu-governor-boost helper"
  become: true
  ansible.builtin.copy:
    src: cpu-governor-boost
    dest: /usr/local/bin/cpu-governor-boost
    mode: "755"

- name: "[archlinux] Setup audio tools: install cpu-governor-boost service unit"
  become: true
  ansible.builtin.copy:
    src: cpu-governor-boost.service
    dest: /etc/systemd/system/cpu-governor-boost.service
    mode: "644"

- name: "[archlinux] Setup audio tools: ensure cpu-governor-boost service (on-demand only)"
  become: true
  ansible.builtin.systemd_service:
    scope: system
    name: cpu-governor-boost.service
    enabled: false
    masked: false
    daemon_reload: true

- name: "[archlinux] Setup audio tools: allow realtime group to toggle cpu-governor-boost"
  become: true
  ansible.builtin.copy:
    src: 49-cpu-governor-boost.rules
    dest: /etc/polkit-1/rules.d/49-cpu-governor-boost.rules
    mode: "644"

- name: "[archlinux] Setup audio tools: ensure system services"
  become: true
  ansible.builtin.systemd_service:
    scope: system
    name: "{{ item }}"
    enabled: true
    masked: false
  loop:
    - bluetooth.service
