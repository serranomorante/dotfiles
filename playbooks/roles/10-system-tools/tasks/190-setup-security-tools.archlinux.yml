---
- name: "[archlinux] Setup security tools: ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - kwallet
      - kwalletmanager
      - ufw
      - ksshaskpass
      - tcpdump
      - bustle
      - libsecret

- name: "[archlinux] Setup security tools: ensure deprecated packages"
  # These packages might be removed by arch in the future
  become: true
  ansible.builtin.package:
    state: present
    name: kwallet5
  ignore_errors: true

- name: "[archlinux] Other tools: ensure kwalletcli folder"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "755"
  loop:
    - ~/data/apps/security-tools
    - ~/data/apps/security-tools/kwalletcli

- name: "[archlinux] Other tools: download pre-compiled kwalletcli"
  ansible.builtin.unarchive:
    src: https://gitlab.com/stefanwimmer128/pkgbuilds/-/package_files/188019197/download
    dest: ~/data/apps/security-tools/kwalletcli/
    remote_src: true

- name: "[archlinux] Other tools: symlink kwalletcli"
  ansible.builtin.file:
    src: ~/data/apps/security-tools/kwalletcli/usr/bin/{{ item }}
    dest: ~/bin/{{ item }}
    state: link
  loop:
    - kwalletaskpass
    - kwalletcli_getpin
    - kwalletcli
    - pinentry-kwallet

- name: "[archlinux] Setup security tools: enable services"
  ansible.builtin.systemd_service:
    scope: user
    name: ssh-agent.service
    enabled: true
    masked: false

# https://wiki.archlinux.org/title/SSH_keys#Start_ssh-agent_with_systemd_user
- name: "[archlinux] Setup security tools: setup shell startup scripts"
  ansible.builtin.blockinfile:
    marker: "## {mark} ANSIBLE MANAGED BLOCK - SETUP ENCRYPTION"
    dest: "{{ item.script }}"
    create: true
    mode: "744"
    block: |
      {% if 'dot-bashrc' in item.script %}
      export SSH_AUTH_SOCK="$XDG_RUNTIME_DIR/ssh-agent.socket"
      {% endif %}
  loop:
    - { script: ~/dotfiles/home/dot-bashrc }

- name: "[archlinux] Setup security tools: default deny incoming"
  become: true
  community.general.ufw:
    default: deny
    direction: incoming
  ignore_errors: true

- name: "[archlinux] Setup security tools: default allow outgoing"
  become: true
  community.general.ufw:
    default: allow
    direction: outgoing
  ignore_errors: true

- name: "[archlinux] Setup security tools: setup ufw"
  # From: /etc/ufw/applications.d
  become: true
  community.general.ufw:
    rule: allow
    name: "{{ item }}"
  loop:
    - SSH
    - WWW Full
  ignore_errors: true

- name: "[archlinux] Setup security tools: enable ufw"
  become: true
  community.general.ufw:
    state: enabled
  ignore_errors: true
  notify: handler_disable_iptables_service

- name: "[archlinux] Setup security tools: get nvim keyrings"
  ansible.builtin.shell: >
    nvim --headless +'lua =io.stdout:write(vim.json.encode(require("serranomorante.constants").KEYRINGS) .. "\n")' +q 2>/dev/null
  changed_when: false
  ignore_errors: true
  register: var_nvim_keyrings

- name: "[archlinux] Setup security tools: get private nvim keyrings"
  ansible.builtin.shell: >
    nvim --headless +'lua =io.stdout:write(vim.json.encode(require("serranomorante.private-constants").KEYRINGS) .. "\n")' +q 2>/dev/null
  changed_when: false
  ignore_errors: true
  register: var_private_nvim_keyrings

- name: "[archlinux] Setup security tools: set keyrings fact"
  ansible.builtin.set_fact:
    keyrings: "{{ (keyrings | default([])) + ((var_nvim_keyrings.stdout | from_json).values() | list) }}"
  when: var_nvim_keyrings is success

- name: "[archlinux] Setup security tools: set private keyrings fact"
  ansible.builtin.set_fact:
    keyrings: "{{ (keyrings | default([])) + ((var_private_nvim_keyrings.stdout | from_json).values() | list) }}"
  when: var_private_nvim_keyrings is success

- name: "[archlinux] Setup security tools: set borg keyrings facts"
  ansible.builtin.set_fact:
    keyrings: "{{ (keyrings | default([])) | union(item | map(attribute='keyrings')) }}"
  loop:
    - "{{ archlinux_borg_repos_env }}"
    - "{{ archlinux_borg_root_repos_env }}"

- name: "[archlinux] Setup security tools: set dev-tools keyrings facts"
  ansible.builtin.set_fact:
    keyrings: "{{ keyrings | default([]) + [item.keyrings] }}"
  loop:
    - "{{ figma_mcp_server_setup }}"
    - "{{ figma_mcp_commentary_server_setup }}"
    - "{{ postman_mcp_commentary_server_setup }}"
    - "{{ playwright_mcp_server_setup }}"
    - "{{ intelephense_setup }}"

- name: "[archlinux] Setup security tools: stat private cloud tools defaults"
  ansible.builtin.stat:
    path: ~/dotfiles/for-my-eyes-only/playbooks/roles/70-for-my-eyes-only/defaults/main/main.vars.yml
  register: var_stat_private_cloud_tools_defaults

- name: "[archlinux] Setup security tools: load private cloud tools defaults"
  ansible.builtin.include_vars:
    file: ../../../../for-my-eyes-only/playbooks/roles/70-for-my-eyes-only/defaults/main/main.vars.yml
  when: var_stat_private_cloud_tools_defaults.stat.exists

- name: "[archlinux] Setup security tools: set private cloud tools keyrings facts"
  ansible.builtin.set_fact:
    keyrings: "{{ (keyrings | default([])) | union([prowlarr_qbittorrent_plugin_setup.keyrings]) }}"
  when:
    - var_stat_private_cloud_tools_defaults.stat.exists
    - prowlarr_qbittorrent_plugin_setup is defined

- name: "[archlinux] Setup security tools: stat setup-kwallet"
  ansible.builtin.stat:
    path: ~/dotfiles/for-my-eyes-only/playbooks/roles/80-for-my-eyes-only/templates/setup-kwallet
  register: var_stat_setup_kwallet

- name: "[archlinux] Setup security tools: setup-kwallet passwords"
  ansible.builtin.template:
    src: ../../../../for-my-eyes-only/playbooks/roles/80-for-my-eyes-only/templates/setup-kwallet
    dest: ~/bin/setup-kwallet
    mode: "755"
  vars:
    keyrings: "{{ keyrings }}"
  when: var_stat_setup_kwallet.stat.exists

- name: "[archlinux] Setup security tools: ensure path"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "755"
  loop:
    - ~/.local/share/dbus-1
    - ~/.local/share/dbus-1/services/

- name: "[archlinux] Setup security tools: setup secrets service"
  # https://wiki.archlinux.org/title/KDE_Wallet#Automatic_D-Bus_activation
  ansible.builtin.copy:
    src: org.freedesktop.secrets.service
    dest: ~/.local/share/dbus-1/services/org.freedesktop.secrets.service
    mode: "644"

- name: "[archlinux] Setup security tools: get docker credential secretservice helper"
  ansible.builtin.get_url:
    url: https://github.com/docker/docker-credential-helpers/releases/download/v{{ arch_docker_credential_helpers_version }}/docker-credential-secretservice-v{{ arch_docker_credential_helpers_version }}.linux-amd64
    dest: ~/bin/docker-credential-secretservice
    mode: "755"

- name: "[archlinux] Setup security tools: ensure docker config path"
  ansible.builtin.file:
    path: ~/.docker
    state: directory
    mode: "700"

- name: "[archlinux] Setup security tools: stat docker config"
  ansible.builtin.stat:
    path: ~/.docker/config.json
  register: var_stat_docker_config

- name: "[archlinux] Setup security tools: initialize docker config fact"
  ansible.builtin.set_fact:
    docker_config_json: {}

- name: "[archlinux] Setup security tools: load docker config"
  ansible.builtin.set_fact:
    docker_config_json: "{{ lookup('file', '~/.docker/config.json') | from_json }}"
  when: var_stat_docker_config.stat.exists
  no_log: true

- name: "[archlinux] Setup security tools: set docker auth entries fact"
  ansible.builtin.set_fact:
    docker_auth_entries: "{{ docker_config_json.auths | default({}) | dict2items | selectattr('value.auth', 'defined') | list }}"
  no_log: true

- name: "[archlinux] Setup security tools: migrate docker auths into secretservice"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts.env.HOME }}/bin/docker-credential-secretservice"
      - store
    stdin: "{{ {'ServerURL': item.key, 'Username': docker_auth_username, 'Secret': docker_auth_secret} | to_json }}"
    stdin_add_newline: false
  vars:
    decoded_docker_auth: "{{ item.value.auth | b64decode }}"
    docker_auth_username: "{{ decoded_docker_auth | regex_replace('^([^:]+):.*$', '\\1') }}"
    docker_auth_secret: "{{ decoded_docker_auth | regex_replace('^[^:]+:(.*)$', '\\1') }}"
  loop: "{{ docker_auth_entries }}"
  when: docker_auth_entries | length != 0
  changed_when: true
  no_log: true

- name: "[archlinux] Setup security tools: set desired docker config fact"
  ansible.builtin.set_fact:
    desired_docker_config_json: >-
      {{
        (
          docker_config_json
          | combine({'credsStore': 'secretservice'}, recursive=True)
          | dict2items
          | rejectattr('key', 'equalto', 'auths')
          | list
          | items2dict
        )
      }}

- name: "[archlinux] Setup security tools: write docker config"
  ansible.builtin.copy:
    dest: ~/.docker/config.json
    content: "{{ desired_docker_config_json | to_json }}"
    mode: "600"
