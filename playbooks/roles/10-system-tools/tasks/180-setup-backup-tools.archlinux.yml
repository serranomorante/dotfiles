---
- name: "[archlinux] Setup backup tools: ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - borg
      - python-pyfuse3

- name: "[archlinux] Setup backup tools: ensure borg env variables in sudoers file"
  become: true
  ansible.builtin.blockinfile:
    dest: /etc/sudoers
    marker: "## {mark} ANSIBLE MANAGED BLOCK - SETUP BORG"
    block: Defaults env_keep += "BORG_*"
    validate: visudo -cf %s

- block:
    - name: "[archlinux] Setup backup tools: stat private browser defaults"
      ansible.builtin.stat:
        path: ~/dotfiles/for-my-eyes-only/playbooks/roles/80-for-my-eyes-only/defaults/main/main.vars.yml
      register: var_stat_private_browser_defaults

    - name: "[archlinux] Setup backup tools: load private browser defaults"
      ansible.builtin.include_vars:
        file: ../../../../for-my-eyes-only/playbooks/roles/80-for-my-eyes-only/defaults/main/main.vars.yml
        name: private_browser_defaults
      when: var_stat_private_browser_defaults.stat.exists

    - name: "[archlinux] Setup backup tools: set managed browser profile backup candidates"
      ansible.builtin.set_fact:
        managed_browser_profile_backup_candidates: >-
          {{
            (managed_browser_profile_backup_candidates | default([]))
            + (
              (
                (item.profiles | default([]) | length) > 0
              )
              | ternary(
                [item.root ~ '/Local State']
                + (
                  item.profiles
                  | map(attribute='profile')
                  | map('regex_replace', '^', item.root ~ '/')
                  | list
                ),
                []
              )
            )
          }}
      loop:
        - root: "{{ ansible_facts.env.HOME }}/.config/BraveSoftware/Brave-Browser"
          profiles: "{{ ((private_browser_defaults | default({})).brave_profiles) | default([]) }}"
        - root: "{{ ansible_facts.env.HOME }}/.config/chromium"
          profiles: "{{ ((private_browser_defaults | default({})).chromium_profiles) | default([]) }}"
      when: var_stat_private_browser_defaults.stat.exists

    - name: "[archlinux] Setup backup tools: stat managed browser profile backup candidates"
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ managed_browser_profile_backup_candidates | default([]) }}"
      register: var_managed_browser_profile_backup_candidates

    - name: "[archlinux] Setup backup tools: extend user-data backup paths with managed browser profiles"
      ansible.builtin.set_fact:
        user_data_backup_env: >-
          {{
            user_data_backup_env
            | union(
              var_managed_browser_profile_backup_candidates.results
              | selectattr('stat.exists')
              | map(attribute='item')
              | list
            )
          }}
      when: (var_managed_browser_profile_backup_candidates.results | default([]) | length) > 0

    - name: "[archlinux] Setup backup tools: stat local backup drives"
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev2 }}/data/backups
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev3 }}/data/backups
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev4 }}/data/backups
      register: var_local_backup_drives

    - name: "[archlinux] Setup backup tools: set available drives fact"
      ansible.builtin.set_fact:
        available_drives: "{{ var_local_backup_drives.results | items2dict(key_name='item', value_name='stat') }}"

    - name: "[archlinux] Setup backup tools: ensure borg folders"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "755"
      loop:
        - ~/.cache/borg
        - ~/.config/borg
        - ~/.config/borg/keys
        - ~/.config/borg/security
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev2 }}/data/backups
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev3 }}/data/backups
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev4 }}/data/backups

    - name: "[archlinux] Setup backup tools: init borg repos"
      ansible.builtin.command: borg init --encryption=keyfile '{{ item.repo }}'
      environment:
        BORG_PASSCOMMAND: kwallet-query --folder {{ item.keyrings.folder }} --read-password {{ item.keyrings.passkey }} {{ item.keyrings.wallet }}
      vars:
        device: '{{ item.device | regex_replace("[^A-Za-z0-9]", "_") }}'
        reponame: '{{ item.keyrings.passkey | regex_replace("[^A-Za-z0-9]", "_") }}'
        repobasename: /run/media/{{ ansible_facts.env.USER }}/{{ item.device }}/data/backups
      args:
        creates: ~/.config/borg/keys/*{{ device }}_data_backups_{{ reponame }}
      when: repobasename in available_drives and available_drives[repobasename].exists
      loop: "{{ archlinux_borg_repos_env }}"

    - name: "[archlinux] Setup backup tools: create backup scripts from template"
      ansible.builtin.template:
        src: borg_backup_jinja_template.backup.sh
        dest: ~/bin/{{ item.sh_template }}.backup.sh
        mode: "744"
      vars:
        borg_repo: "{{ item.repo }}"
        keyrings: "{{ item.keyrings }}"
        files: "{{ item.files }}"
        excludes: "{{ item.excludes | default([]) }}"
      loop: "{{ archlinux_borg_repos_env }}"

    - name: "[archlinux] Setup backup tools: ensure borg backup timer"
      ansible.builtin.systemd_service:
        scope: user
        name: "{{ item.service }}.timer"
        enabled: true
        masked: false
      loop:
        - { service: every-hour-backup@dev4-config-files }
        - { service: every-8-hours-backup@dev4-PKM }
        - { service: every-8-hours-backup@dev4-user-data }
        - { service: every-4-hours-backup@dev4-notes }
        - { service: every-4-hours-backup@dev4-audio-pjs }
        - { service: every-8-hours-backup@dev4-bw-backup }
        - { service: every-hour-backup@dev2-config-files }
        - { service: every-8-hours-backup@dev2-PKM }
        - { service: every-8-hours-backup@dev2-user-data }
        - { service: every-4-hours-backup@dev2-notes }
        - { service: every-4-hours-backup@dev2-audio-pjs }
        - { service: every-8-hours-backup@dev2-bw-backup }
        - { service: every-hour-backup@dev3-config-files }
        - { service: every-8-hours-backup@dev3-PKM }
        - { service: every-8-hours-backup@dev3-user-data }
        - { service: every-4-hours-backup@dev3-notes }
        - { service: every-4-hours-backup@dev3-audio-pjs }
        - { service: every-8-hours-backup@dev3-bw-backup }

    - name: "[archlinux] Setup backup tools: ensure keyfiles backup folder"
      ansible.builtin.file:
        path: ~/data/secrets/backup-borg-keyfiles
        state: directory
        mode: "755"

    - name: "[archlinux] Setup backup tools: ensure borg backup keys script"
      ansible.builtin.template:
        src: backup_borg_keys
        dest: ~/bin/backup_borg_keys
        mode: "755"
  ignore_errors: true
