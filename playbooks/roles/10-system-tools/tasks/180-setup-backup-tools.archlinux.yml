---
- name: "[archlinux] Setup backup tools: ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - borg
      - python-pyfuse3

- name: "[archlinux] Setup backup tools: ensure borg env variables in sudoers file"
  become: true
  ansible.builtin.blockinfile:
    dest: /etc/sudoers
    marker: "## {mark} ANSIBLE MANAGED BLOCK - SETUP BORG"
    block: Defaults env_keep += "BORG_*"
    validate: visudo -cf %s

- block:
    - name: "[archlinux] Setup backup tools: stat private browser defaults"
      ansible.builtin.stat:
        path: ~/dotfiles/for-my-eyes-only/playbooks/roles/80-for-my-eyes-only/defaults/main/main.vars.yml
      register: var_stat_private_browser_defaults

    - name: "[archlinux] Setup backup tools: load private browser defaults"
      ansible.builtin.include_vars:
        file: ../../../../for-my-eyes-only/playbooks/roles/80-for-my-eyes-only/defaults/main/main.vars.yml
        name: private_browser_defaults
      when: var_stat_private_browser_defaults.stat.exists

    - name: "[archlinux] Setup backup tools: set managed browser profile backup candidates"
      ansible.builtin.set_fact:
        managed_browser_profile_backup_candidates: >-
          {{
            (managed_browser_profile_backup_candidates | default([]))
            + (
              (
                (item.profiles | default([]) | length) > 0
              )
              | ternary(
                [item.root ~ '/Local State']
                + (
                  item.profiles
                  | map(attribute='profile')
                  | map('regex_replace', '^', item.root ~ '/')
                  | list
                ),
                []
              )
            )
          }}
      loop:
        - root: "{{ ansible_facts.env.HOME }}/.config/BraveSoftware/Brave-Browser"
          profiles: "{{ ((private_browser_defaults | default({})).brave_profiles) | default([]) }}"
        - root: "{{ ansible_facts.env.HOME }}/.config/chromium"
          profiles: "{{ ((private_browser_defaults | default({})).chromium_profiles) | default([]) }}"
      when: var_stat_private_browser_defaults.stat.exists

    - name: "[archlinux] Setup backup tools: stat managed browser profile backup candidates"
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ managed_browser_profile_backup_candidates | default([]) }}"
      register: var_managed_browser_profile_backup_candidates

    - name: "[archlinux] Setup backup tools: extend user-data backup paths with managed browser profiles"
      ansible.builtin.set_fact:
        user_data_backup_env: >-
          {{
            user_data_backup_env
            | union(
              var_managed_browser_profile_backup_candidates.results
              | selectattr('stat.exists')
              | map(attribute='item')
              | list
            )
          }}
      when: (var_managed_browser_profile_backup_candidates.results | default([]) | length) > 0

    - name: "[archlinux] Setup backup tools: stat local backup drives"
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev2 }}/data/backups
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev3 }}/data/backups
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev4 }}/data/backups
      register: var_local_backup_drives

    - name: "[archlinux] Setup backup tools: set available drives fact"
      ansible.builtin.set_fact:
        available_drives: "{{ var_local_backup_drives.results | items2dict(key_name='item', value_name='stat') }}"

    - name: "[archlinux] Setup backup tools: ensure borg folders"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "755"
      loop:
        - ~/.cache/borg
        - ~/.config/borg
        - ~/.config/borg/keys
        - ~/.config/borg/security
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev2 }}/data/backups
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev3 }}/data/backups
        - /run/media/{{ ansible_facts.env.USER }}/{{ arch_external_dev4 }}/data/backups

    # Read each repo's passphrase from KWallet *before* attempting borg init. A
    # missing or empty passphrase here is what leaves a half-initialized repo
    # (config + empty data/, no keyfile, no manifest), so we gate init on it.
    - name: "[archlinux] Setup backup tools: verify kwallet passphrase is present and non-empty"
      ansible.builtin.command:
        argv:
          - kwallet-query
          - --folder
          - "{{ item.keyrings.folder }}"
          - --read-password
          - "{{ item.keyrings.passkey }}"
          - "{{ item.keyrings.wallet }}"
      register: var_borg_passphrase_checks
      changed_when: false
      failed_when: false
      no_log: true
      loop: "{{ archlinux_borg_repos_env }}"
      loop_control:
        label: "{{ item.keyrings.passkey }}"

    - name: "[archlinux] Setup backup tools: warn about repos skipped due to missing kwallet passphrase"
      ansible.builtin.debug:
        msg: >-
          Skipping borg init for '{{ item.0.keyrings.passkey }}' ({{ item.0.repo }}):
          kwallet returned no usable passphrase. Store a non-empty passphrase in folder
          '{{ item.0.keyrings.folder }}' (wallet '{{ item.0.keyrings.wallet }}') before re-running.
      when:
        - (item.1.rc | default(1)) != 0 or ((item.1.stdout | default('') | trim | length) == 0)
      loop: "{{ archlinux_borg_repos_env | zip(var_borg_passphrase_checks.results) | list }}"
      loop_control:
        label: "{{ item.0.keyrings.passkey }}"

    - name: "[archlinux] Setup backup tools: init borg repos (only with a valid kwallet passphrase)"
      ansible.builtin.command: borg init --encryption=keyfile '{{ item.0.repo }}'
      environment:
        BORG_PASSCOMMAND: kwallet-query --folder {{ item.0.keyrings.folder }} --read-password {{ item.0.keyrings.passkey }} {{ item.0.keyrings.wallet }}
      vars:
        device: '{{ item.0.device | regex_replace("[^A-Za-z0-9]", "_") }}'
        reponame: '{{ item.0.keyrings.passkey | regex_replace("[^A-Za-z0-9]", "_") }}'
        repobasename: /run/media/{{ ansible_facts.env.USER }}/{{ item.0.device }}/data/backups
      args:
        creates: ~/.config/borg/keys/*{{ device }}_data_backups_{{ reponame }}
      when:
        - repobasename in available_drives and available_drives[repobasename].exists
        - (item.1.rc | default(1)) == 0
        - (item.1.stdout | default('') | trim | length) > 0
      loop: "{{ archlinux_borg_repos_env | zip(var_borg_passphrase_checks.results) | list }}"
      loop_control:
        label: "{{ item.0.keyrings.passkey }} -> {{ item.0.repo }}"

    - name: "[archlinux] Setup backup tools: create backup scripts from template"
      ansible.builtin.template:
        src: borg_backup_jinja_template.backup.sh
        dest: ~/bin/{{ item.sh_template }}.backup.sh
        mode: "744"
      vars:
        borg_repo: "{{ item.repo }}"
        keyrings: "{{ item.keyrings }}"
        files: "{{ item.files }}"
        excludes: "{{ item.excludes | default([]) }}"
      loop: "{{ archlinux_borg_repos_env }}"

    - name: "[archlinux] Setup backup tools: ensure borg backup timer"
      ansible.builtin.command:
        argv:
          - /bin/sh
          - -c
          - |
            systemctl --user unmask "$@"
            systemctl --user enable "$@"
          - sh
          - every-hour-backup@dev4-config-files.timer
          - every-8-hours-backup@dev4-PKM.timer
          - every-8-hours-backup@dev4-user-data.timer
          - every-4-hours-backup@dev4-notes.timer
          - every-4-hours-backup@dev4-audio-pjs.timer
          - every-8-hours-backup@dev4-bw-backup.timer
          - every-8-hours-backup@dev4-ai-conversations.timer
          - every-hour-backup@dev2-config-files.timer
          - every-8-hours-backup@dev2-PKM.timer
          - every-8-hours-backup@dev2-user-data.timer
          - every-4-hours-backup@dev2-notes.timer
          - every-4-hours-backup@dev2-audio-pjs.timer
          - every-8-hours-backup@dev2-bw-backup.timer
          - every-8-hours-backup@dev2-ai-conversations.timer
          - every-hour-backup@dev3-config-files.timer
          - every-8-hours-backup@dev3-PKM.timer
          - every-8-hours-backup@dev3-user-data.timer
          - every-4-hours-backup@dev3-notes.timer
          - every-4-hours-backup@dev3-audio-pjs.timer
          - every-8-hours-backup@dev3-bw-backup.timer
          - every-8-hours-backup@dev3-ai-conversations.timer
      changed_when: false

    - name: "[archlinux] Setup backup tools: ensure keyfiles backup folder"
      ansible.builtin.file:
        path: ~/data/secrets/backup-borg-keyfiles
        state: directory
        mode: "755"

    - name: "[archlinux] Setup backup tools: ensure borg backup keys script"
      ansible.builtin.template:
        src: backup_borg_keys
        dest: ~/bin/backup_borg_keys
        mode: "755"
  ignore_errors: true
