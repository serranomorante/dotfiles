# Static defaults for the physical Intuos S tablet. Runtime-only actions and
# display-layout-dependent speed updates still live in wacom-config.sh.
Section "InputClass"
        Identifier "Wacom Intuos S pen defaults"
        MatchDriver "wacom"
        MatchProduct "Wacom Intuos S Pen"
        Option "Mode" "Relative"
        Option "Rotate" "half"
        Option "PanScrollThreshold" "200"
        Option "Button3" "0"
        Option "ConstantDeceleration" "1.77778"
EndSection

Section "InputClass"
        Identifier "Wacom Intuos S pad defaults"
        MatchDriver "wacom"
        MatchProduct "Wacom Intuos S Pad"
        Option "Button1" "0"
        Option "Button2" "0"
        Option "Button3" "0"
        # The fourth physical express key is Button4 in xorg.conf, but is
        # exposed as Button8 through xsetwacom at runtime.
        Option "Button4" "0"
EndSection
