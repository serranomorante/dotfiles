---
- name: "[archlinux] Note-taking utilities: ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - curl
      - inotify-tools
      - jq
      - pandoc

- name: "[archlinux] Note-taking utilities: ensure foam crypt watcher"
  ansible.builtin.systemd_service:
    scope: user
    name: "{{ item }}"
    enabled: true
    state: started
    masked: false
    daemon_reload: true
  loop:
    - foam-crypt-watch.service
    - foam-crypt-local-watch.service
