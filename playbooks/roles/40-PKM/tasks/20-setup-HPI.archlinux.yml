---
- name: "[archlinux] Setup HPI - clone packages"
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: ~/data/repos/{{ item.name | default(item.repo) | basename }}
    version: "{{ item.version | default('HEAD') }}"
    single_branch: true
  loop:
    - { repo: https://github.com/karlicoss/open-in-editor }
    - { repo: https://github.com/karlicoss/HPI }

- name: "[archlinux] Setup HPI - ensure packages"
  become: true
  ansible.builtin.package:
    state: present
    name:
      - sqlitebrowser
      - rsync

- name: "[archlinux] Setup HPI - ensure virtualenv packages"
  ansible.builtin.pip:
    name:
      - pip
      - promnesia
      - "{{ ansible_facts.env.HOME }}/data/repos/HPI"
      # Optional dependencies
      - bs4
      - lxml
      - mistletoe
      - logzero
      - mypy
      - colorlog
      - ijson
      - orjson
      # Modules
      - git+https://github.com/karlicoss/hypexport
      - browserexport
      - cachew
    executable: "{{ ansible_facts.env.HOME }}/bin/ansible-firejail-pip"
    state: present
  environment:
    ANSIBLE_FIREJAIL_PIP_VENV: "{{ ansible_facts.env.HOME }}/data/apps/PKM/.venv"
    ANSIBLE_FIREJAIL_PIP_EXTRA_PATHS: |
      {{ ansible_facts.env.HOME }}/data/repos/HPI

- name: "[archlinux] Setup HPI - clone h"
  ansible.builtin.git:
    repo: "{{ item }}"
    dest: ~/data/repos/{{ item | basename }}
    version: main
    depth: 1
    force: true
    single_branch: true
  loop:
    - https://github.com/hypothesis/h # because I want to self-host
    - https://github.com/hypothesis/bouncer

- name: "[archlinux] Setup HPI - get python version from h repo"
  ansible.builtin.command: cat .python-version
  register: var_h_python_version
  args:
    chdir: ~/data/repos/h
  changed_when: true

- name: "[archlinux] Setup HPI - stat hypothesis py file"
  ansible.builtin.stat:
    path: ~/data/apps/PKM/.venv/lib/python{{ var_h_python_version.stdout }}/site-packages/hypexport/Hypothesis/hypothesis/hypothesis.py
  register: var_stat_hypothesis_file

- name: "[archlinux] Setup HPI - ensure hypothesis domain points to local instance"
  ansible.builtin.replace:
    path: ~/data/apps/PKM/.venv/lib/python{{ var_h_python_version.stdout }}/site-packages/hypexport/Hypothesis/hypothesis/hypothesis.py
    regexp: "(domain=)None\\,"
    replace: '\1"localhost:5000",'
  when: var_stat_hypothesis_file.stat.exists

- name: "[archlinux] Setup HPI - replace https"
  ansible.builtin.replace:
    path: ~/data/apps/PKM/.venv/lib/python{{ var_h_python_version.stdout }}/site-packages/hypexport/Hypothesis/hypothesis/hypothesis.py
    regexp: "https"
    replace: "http"
  when: var_stat_hypothesis_file.stat.exists

- name: "[archlinux] Setup HPI - symlink virtualenv packages"
  ansible.builtin.file:
    src: ~/data/apps/PKM/.venv/bin/{{ item }}
    dest: ~/bin/{{ item }}
    state: link
  loop:
    - hpi
    - promnesia
    - browserexport

- name: "[archlinux] Setup HPI - register open_in_editor MIME handler"
  ansible.builtin.shell: |
    update-desktop-database ~/.local/share/applications
    xdg-mime default nvr_nvim_open.desktop x-scheme-handler/editor
  changed_when: true
  notify: handler_update_desktop_database

- name: "[archlinux] Setup HPI - generate patch tempdir"
  ansible.builtin.tempfile:
    state: directory
    suffix: hypothesis
  register: var_hypothesis_tempdir

- name: "[archlinux] Setup HPI - apply vars to patches"
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ var_hypothesis_tempdir.path }}/{{ item }}"
    mode: "644"
  loop:
    - hypothesis_h.patch

- name: "[archlinux] Setup HPI - patch hypothesis h"
  ansible.posix.patch:
    src: "{{ item }}"
    basedir: ~/data/repos/h
    strip: 1
    remote_src: true
  loop:
    - "{{ var_hypothesis_tempdir.path }}/hypothesis_h.patch"

- name: "[archlinux] Setup HPI - ensure authclient find command"
  ansible.builtin.blockinfile:
    path: ~/data/repos/h/h/cli/commands/authclient.py
    insertafter: '^    click\.echo\(message\)$'
    marker: "# {mark} hypothesis authclient find"
    block: |

      @authclient.command()
      @click.option("--name", prompt=True, help="The name of the client")
      @click.option(
          "--authority",
          prompt=False,
          help="The authority (domain name) of the resources managed by the client",
      )
      @click.option(
          "--redirect-uri",
          prompt=False,
          help="URI for browser redirect after authorization",
      )
      @click.pass_context
      def find(ctx, name, authority, redirect_uri):
          """Find the newest OAuth client matching the provided attributes."""
          request = ctx.obj["bootstrap"]()

          query = request.db.query(models.AuthClient).filter(
              models.AuthClient.name == name
          )
          if authority is not None:
              query = query.filter(models.AuthClient.authority == authority)
          if redirect_uri is not None:
              query = query.filter(models.AuthClient.redirect_uri == redirect_uri)
          exists = query.order_by(models.AuthClient.created.desc()).first()
          if not exists:
              click.echo("Auth client not found")
              return
          click.echo(f"Client ID: {exists.id}")

- name: "[archlinux] Setup HPI - remove tempdir"
  ansible.builtin.file:
    path: "{{ var_hypothesis_tempdir.path }}"
    state: absent
  when: var_hypothesis_tempdir.path is defined

- name: "[archlinux] Setup HPI - ensure docker config directory"
  become: true
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "755"
  when: inventory_hostname != 'localhost'

- name: "[archlinux] Setup HPI - configure docker for guest networking"
  become: true
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "644"
    content: |
      {
        "iptables": false,
        "ip6tables": false
      }
  when: inventory_hostname != 'localhost'

- name: "[archlinux] Setup HPI - ensure docker service"
  become: true
  ansible.builtin.command: systemctl reset-failed docker.service
  changed_when: false
  failed_when: false

- name: "[archlinux] Setup HPI - start docker service"
  become: true
  ansible.builtin.systemd_service:
    scope: system
    name: docker.service
    state: started
    enabled: true
    masked: false
    daemon_reload: true
  register: var_hpi_docker_service
  retries: 3
  delay: 5
  until: var_hpi_docker_service is succeeded
  failed_when: false

- name: "[archlinux] Setup HPI - ensure ansible docker config directory"
  ansible.builtin.file:
    path: ~/.config/ansible-docker
    state: directory
    mode: "700"

- name: "[archlinux] Setup HPI - configure ansible docker credential helper"
  ansible.builtin.copy:
    dest: ~/.config/ansible-docker/config.json
    mode: "600"
    content: |
      {
        "auths": {},
        "credsStore": "hpi-noop"
      }

- name: "[archlinux] Setup HPI - ensure ansible docker credential helper directory"
  ansible.builtin.file:
    path: ~/.local/share/ansible-docker-bin
    state: directory
    mode: "700"

- name: "[archlinux] Setup HPI - remove old ansible docker wrapper"
  ansible.builtin.file:
    path: ~/.local/share/ansible-docker-bin/docker
    state: absent

- name: "[archlinux] Setup HPI - configure ansible docker credential helper"
  ansible.builtin.copy:
    dest: ~/.local/share/ansible-docker-bin/docker-credential-hpi-noop
    mode: "700"
    content: |
      #!/bin/sh
      case "$1" in
        get)
          cat >/dev/null
          printf '{}\n'
          exit 0
          ;;
        store|erase)
          cat >/dev/null
          exit 0
          ;;
        list)
          printf '{}\n'
          exit 0
          ;;
        *)
          printf 'unsupported docker credential helper command: %s\n' "$1" >&2
          exit 1
          ;;
      esac

- name: "[archlinux] Setup HPI - inspect docker credential config"
  ansible.builtin.shell: |
    source ~/.bashrc
    export DOCKER_CONFIG="{{ ansible_facts.env.HOME }}/.config/ansible-docker"
    export PATH="{{ ansible_facts.env.HOME }}/.local/share/ansible-docker-bin:$PATH"
    printf 'HOME=%s\n' "$HOME"
    printf 'DOCKER_CONFIG=%s\n' "$DOCKER_CONFIG"
    printf 'helper=%s\n' "$(command -v docker-credential-hpi-noop)"
    printf 'docker=%s\n' "$(command -v docker)"
    docker --version
    docker compose version
    if grep -niE 'secretservice' "$DOCKER_CONFIG/config.json" 2>/dev/null; then
      exit 42
    fi
    printf 'docker credential helper is hpi-noop\n'
  args:
    executable: /bin/bash
  register: hpi_docker_credential_config
  changed_when: false
  failed_when: hpi_docker_credential_config.rc not in [0, 42]

- name: "[archlinux] Setup HPI - inspect docker credential config in docker group"
  ansible.builtin.shell: |
    sg docker -c 'source ~/.bashrc
    export DOCKER_CONFIG="{{ ansible_facts.env.HOME }}/.config/ansible-docker"
    export PATH="{{ ansible_facts.env.HOME }}/.local/share/ansible-docker-bin:$PATH"
    printf "HOME=%s\n" "$HOME"
    printf "DOCKER_CONFIG=%s\n" "$DOCKER_CONFIG"
    printf "DOCKER_AUTH_CONFIG=%s\n" "${DOCKER_AUTH_CONFIG:+set}"
    printf "helper=%s\n" "$(command -v docker-credential-hpi-noop)"
    printf "docker=%s\n" "$(command -v docker)"
    docker --version
    docker compose version
    if grep -niE "secretservice" "$DOCKER_CONFIG/config.json" 2>/dev/null; then
      exit 42
    fi
    printf "docker credential helper is hpi-noop\n"'
  args:
    executable: /bin/bash
  register: hpi_docker_group_credential_config
  changed_when: false
  failed_when: hpi_docker_group_credential_config.rc not in [0, 42]

- name: "[archlinux] Setup HPI - wait for docker daemon access"
  ansible.builtin.shell: >
    sg docker -c "docker info >/dev/null"
  register: var_hpi_docker_info
  changed_when: false
  retries: 10
  delay: 3
  until: var_hpi_docker_info.rc == 0
  failed_when: false

- name: "[archlinux] Setup HPI - set self hosted availability fact"
  ansible.builtin.set_fact:
    hpi_self_hosted_available: "{{ var_hpi_docker_info.rc == 0 }}"

- name: "[archlinux] Setup HPI - register docker dbs network exists"
  # The docker-compose file of the h repo needs this network to exist
  ansible.builtin.shell: >
    set -o pipefail &&
    sg docker -c "docker network ls --filter name=dbs --format 'json' | wc -l"
  register: docker_network_dbs_exists
  changed_when: false
  when: hpi_self_hosted_available

- name: "[archlinux] Setup HPI - create dbs network"
  ansible.builtin.command: sg docker -c "docker network create dbs"
  changed_when: false
  when:
    - hpi_self_hosted_available
    - docker_network_dbs_exists.stdout == "0"

- name: "[archlinux] Setup HPI - clean dependencies"
  ansible.builtin.file:
    path: ~/data/repos/h/.tox
    state: absent

- name: "[archlinux] Setup HPI - ensure h services"
  ansible.builtin.shell: >
    source ~/.bashrc &&
    sg docker -c 'source ~/.bashrc && export DOCKER_CONFIG={{ ansible_facts.env.HOME }}/.config/ansible-docker && export PATH={{ ansible_facts.env.HOME }}/.local/share/ansible-docker-bin:$PATH && PYENV_VERSION={{ var_h_python_version.stdout }} VIRTUALENV_PIP=24.0 make services'
  register: ensure_h_services_result
  args:
    chdir: ~/data/repos/h
  environment:
    PYENV_VERSION: "{{ var_h_python_version.stdout }}"
    VIRTUALENV_PIP: "24.0"
  changed_when: "'commands succeeded' in ensure_h_services_result.stdout"
  failed_when: ensure_h_services_result.rc not in [0, 2]
  timeout: 0
  notify:
    - "40-PKM : handler_ensure_hypothesis_self_hosted_service"
  when: hpi_self_hosted_available

- name: "[archlinux] Setup HPI - ensure h db"
  ansible.builtin.shell: >
    source ~/.bashrc &&
    sg docker -c 'source ~/.bashrc && export DOCKER_CONFIG={{ ansible_facts.env.HOME }}/.config/ansible-docker && export PATH={{ ansible_facts.env.HOME }}/.local/share/ansible-docker-bin:$PATH && PYENV_VERSION={{ var_h_python_version.stdout }} VIRTUALENV_PIP=24.0 make db'
  register: ensure_h_db_result
  args:
    chdir: ~/data/repos/h
  environment:
    PYENV_VERSION: "{{ var_h_python_version.stdout }}"
    VIRTUALENV_PIP: "24.0"
  changed_when: "'commands succeeded' in ensure_h_db_result.stdout"
  timeout: 0
  notify:
    - "40-PKM : handler_ensure_hypothesis_self_hosted_service"
  when: hpi_self_hosted_available

- name: "[archlinux] Setup HPI - add CHROME_EXTENSION_ID env to bouncer"
  ansible.builtin.template:
    src: hypothesis-bouncer-self-hosted.service
    dest: ~/.config/systemd/user/
    mode: "644"
  notify: "40-PKM : handler_ensure_hypothesis_bouncer_self_hosted_service"
  when: hpi_self_hosted_available

- name: "[archlinux] Setup HPI - ensure hypothesis user"
  # These credentials will not be used on production environments
  ansible.builtin.command: >
    pyenv exec tox -qe dev -- sh bin/hypothesis --dev user add
      --username hypothesis
      --email hypothesis@hypothes.is
      --password hypothesis
  args:
    chdir: ~/data/repos/h
  environment:
    PYENV_VERSION: "{{ var_h_python_version.stdout }}"
    VIRTUALENV_PIP: "24.0"
  register: ensure_hypothesis_user_result
  changed_when: "'commands succeeded' in ensure_hypothesis_user_result.stdout"
  failed_when:
    - "'stdout' in ensure_hypothesis_user_result"
    - "'duplicate key value violates unique constraint' not in ensure_hypothesis_user_result.stdout"
    - "'commands succeeded' not in ensure_hypothesis_user_result.stdout"
  when: hpi_self_hosted_available

- name: "[archlinux] Setup HPI - ensure admin user"
  ansible.builtin.command: >
    pyenv exec tox -qe dev -- sh bin/hypothesis --dev user admin hypothesis
  register: ensure_admin_user_result
  changed_when: "'commands succeeded' in ensure_admin_user_result.stdout"
  args:
    chdir: ~/data/repos/h
  environment:
    PYENV_VERSION: "{{ var_h_python_version.stdout }}"
    VIRTUALENV_PIP: "24.0"
  when: hpi_self_hosted_available

- name: "[archlinux] Setup HPI - register authclient exists"
  ansible.builtin.command: >
    pyenv exec tox -qe dev -- sh bin/hypothesis --dev authclient find
      --name "Chrome Extension"
      --authority "localhost"
      --redirect-uri "chrome-extension://{{ local_hypothesis_extension }}"
  register: register_auth_client_exists_result
  args:
    chdir: ~/data/repos/h
  environment:
    PYENV_VERSION: "{{ var_h_python_version.stdout }}"
    VIRTUALENV_PIP: "24.0"
  changed_when: false
  when: hpi_self_hosted_available

- name: "[archlinux] Setup HPI - create new OAuth client"
  ansible.builtin.command: >
    pyenv exec tox -qe dev -- sh bin/hypothesis --dev authclient add
      --name "Chrome Extension"
      --authority "localhost"
      --type "public"
      --redirect-uri "chrome-extension://{{ local_hypothesis_extension }}"
      --grant-type "authorization_code"
  register: create_new_oauth_client_result
  args:
    chdir: ~/data/repos/h
  environment:
    PYENV_VERSION: "{{ var_h_python_version.stdout }}"
    VIRTUALENV_PIP: "24.0"
  when:
    - hpi_self_hosted_available
    - "'Auth client not found' in register_auth_client_exists_result.stdout"
  changed_when: "'commands succeeded' in create_new_oauth_client_result.stdout"

- name: "[archlinux] Setup HPI - set_fact hypothesis client id"
  ansible.builtin.set_fact:
    hypothesis_oauth_client_id: "{{ create_new_oauth_client_result.stdout | default(register_auth_client_exists_result.stdout) | regex_search('Client ID: ([\\w-]*)',
      '\\1') | first }}"
    cacheable: true
  when: hpi_self_hosted_available

- name: "[archlinux] Setup HPI: clone hypothesis client"
  ansible.builtin.git:
    repo: https://github.com/hypothesis/client
    dest: ~/data/repos/client
    version: "v{{ hypothesis_client_version }}"
    depth: 1
    force: true
    single_branch: true
  register: hypothesis_client_clone_result

- name: "[archlinux] Setup HPI: patch hypothesis client PDF source fixes"
  ansible.posix.patch:
    src: hypothesis-client-v{{ hypothesis_client_version }}-pdf-fixes.patch
    basedir: ~/data/repos/client
    strip: 1
  register: hypothesis_client_patch_result

- name: "[archlinux] Setup HPI: check hypothesis client dependency install"
  ansible.builtin.stat:
    path: ~/data/repos/client/node_modules/@hypothesis/frontend-build/package.json
  register: hypothesis_client_dependency_install_result

- name: "[archlinux] Setup HPI: install hypothesis client dependencies"
  ansible.builtin.shell: >
    source ~/.bashrc &&
    ./.yarn/releases/yarn-3.6.0.cjs install --mode=skip-build
  register: install_hypothesis_client_dependencies_result
  args:
    chdir: ~/data/repos/client
  when:
    - hypothesis_client_clone_result.changed
      or hypothesis_client_patch_result.changed
      or not hypothesis_client_dependency_install_result.stat.exists
  changed_when: true

- name: "[archlinux] Setup HPI: check hypothesis client build"
  ansible.builtin.stat:
    path: ~/data/repos/client/build/manifest.json
  register: hypothesis_client_build_result

- name: "[archlinux] Setup HPI: build hypothesis client"
  ansible.builtin.shell: >
    source ~/.bashrc &&
    ./.yarn/releases/yarn-3.6.0.cjs build
  register: build_hypothesis_client_result
  args:
    chdir: ~/data/repos/client
  when:
    - hypothesis_client_clone_result.changed
      or hypothesis_client_patch_result.changed
      or install_hypothesis_client_dependencies_result.changed | default(false)
      or not hypothesis_client_build_result.stat.exists
  changed_when: true

- name: "[archlinux] Setup HPI: ensure hypothesis client dist dir"
  ansible.builtin.file:
    path: ~/data/repos/client/dist
    state: directory
    mode: "755"

- name: "[archlinux] Setup HPI: check hypothesis client tarball"
  ansible.builtin.stat:
    path: ~/data/repos/client/dist/hypothesis-{{ hypothesis_client_version }}-local.tgz
  register: hypothesis_client_tarball_result

- name: "[archlinux] Setup HPI: pack hypothesis client tarball"
  ansible.builtin.shell: >
    source ~/.bashrc &&
    ./.yarn/releases/yarn-3.6.0.cjs pack --out dist/hypothesis-{{ hypothesis_client_version }}-local.tgz
  register: pack_hypothesis_client_result
  args:
    chdir: ~/data/repos/client
  when:
    - hypothesis_client_clone_result.changed
      or hypothesis_client_patch_result.changed
      or build_hypothesis_client_result.changed | default(false)
      or not hypothesis_client_tarball_result.stat.exists
  changed_when: true

- name: "[archlinux] Setup HPI: clone hypothesis browser extension"
  ansible.builtin.git:
    repo: https://github.com/hypothesis/browser-extension
    dest: ~/data/repos/hypothesis-extension
    version: "v{{ hypothesis_browser_extension_version }}"
    depth: 1
    force: true
    single_branch: true
  register: hypothesis_extension_clone_result

- name: "[archlinux] Setup HPI: patch hypothesis extension"
  ansible.posix.patch:
    src: ~/dotfiles/assets/patches/chrome_extensions/{{ item }}
    basedir: ~/data/repos/hypothesis-extension
    strip: 1
  loop:
    - extension_hypothesis_delete_welcome.patch
    - extension_hypothesis_active_by_default.patch

- name: "[archlinux] Setup HPI: generate hypothesis extension custom-dev.json"
  ansible.builtin.copy:
    src: ~/data/repos/hypothesis-extension/settings/chrome-dev.json
    dest: ~/data/repos/hypothesis-extension/settings/custom-dev.json
    mode: "644"
  notify: handler_ensure_hypothesis_oauth_client_id

- name: "[archlinux] Setup HPI: force handler_ensure_hypothesis_oauth_client_id trigger"
  ansible.builtin.meta: flush_handlers

- name: "[archlinux] Setup HPI: remove old hypothesis client patch resolution"
  ansible.builtin.replace:
    path: ~/data/repos/hypothesis-extension/package.json
    regexp: ',\n  "resolutions": \{\n    "hypothesis@\^[^"]+": "patch:[^"]+"\n  \}'
    replace: ''
  register: hypothesis_extension_remove_patch_resolution_result

- name: "[archlinux] Setup HPI: use local hypothesis client tarball in extension"
  ansible.builtin.replace:
    path: ~/data/repos/hypothesis-extension/package.json
    regexp: '"hypothesis": "[^"]+"'
    replace: '"hypothesis": "file:../client/dist/hypothesis-{{ hypothesis_client_version }}-local.tgz"'
  register: hypothesis_extension_local_client_dependency_result

- name: "[archlinux] Setup HPI: check hypothesis extension dependency install"
  ansible.builtin.stat:
    path: ~/data/repos/hypothesis-extension/node_modules/hypothesis/build/manifest.json
  register: hypothesis_extension_dependency_manifest_result

- name: "[archlinux] Setup HPI: install hypothesis extension dependencies"
  ansible.builtin.shell: >
    source ~/.bashrc &&
    ./.yarn/releases/yarn-3.6.1.cjs install --mode=skip-build
  register: install_hypothesis_extension_dependencies_result
  args:
    chdir: ~/data/repos/hypothesis-extension
  when:
    - hypothesis_extension_clone_result.changed
      or hypothesis_extension_remove_patch_resolution_result.changed
      or hypothesis_extension_local_client_dependency_result.changed
      or pack_hypothesis_client_result.changed | default(false)
      or not hypothesis_extension_dependency_manifest_result.stat.exists
  changed_when: true

- name: "[archlinux] Setup HPI: prepare hypothesis extension"
  ansible.builtin.shell: >
    source ~/.bashrc &&
    make build SETTINGS_FILE=settings/custom-dev.json
  register: prepare_hypothesis_extension_result
  args:
    chdir: ~/data/repos/hypothesis-extension
  changed_when:
    - "'Nothing to be done' not in prepare_hypothesis_extension_result.stdout"
    - "'Nothing to be done' not in prepare_hypothesis_extension_result.stderr"

- name: "[archlinux] Setup HPI: version to extensionator path"
  ansible.builtin.shell: set -o pipefail && fd 'extensionator' ~/.local/share/gem/ruby -t x -1 | grep -oP "\/\K\d[^/]+" -m 1
  register: var_ruby_version
  changed_when: true

- name: "[archlinux] Setup HPI: build hypothesis external crx"
  # We have to do this because the `manifest.json` file is not on the root of the repo
  # Important: the `*.crx` file has to be at the same level of the `manifest.json` file
  ansible.builtin.shell: >
    ~/.local/share/gem/ruby/{{ var_ruby_version.stdout }}/bin/extensionator
    -d ~/data/repos/hypothesis-extension/build
    -i ~/data/apps/browser-tools/chrome/extensions/identity.pem
    -o ~/data/repos/hypothesis-extension/build/hypothesis.crx
  args:
    creates: ~/data/repos/hypothesis-extension/build/hypothesis.crx

- name: "[archlinux] Setup HPI: run handlers"
  ansible.builtin.command: echo
  changed_when: true
  notify: handler_ensure_backup_hypothesis_sql_service
